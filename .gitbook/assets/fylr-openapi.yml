                                                    description: |
                                                        The displayname of the collection is used as primary label for the user when this collection is displayed.
                                                    type: object
                                                    properties:
                                                        de-DE:
                                                            type: string
                                                        en-US:
                                                            type: string
                                                    example:
                                                        de-DE: Deutscher text
                                                        en-US: English text
                                                description:
                                                    description: |
                                                        The description of the collection is used as a more detail information block when presenting the collection.
                                                    type: object
                                                    properties:
                                                        de-DE:
                                                            type: string
                                                        en-US:
                                                            type: string
                                                    example:
                                                        de-DE: Deutscher text
                                                        en-US: English text
                                                create_object:
                                                    nullable: true
                                                    description: |
