            parameters:
                - name: poolID
                  in: path
                  required: true
                  schema:
                    type: integer
                    format: int64
                    minimum: 1
                  description: The pool's `_id`.
                - name: include_subpools
                  in: query
                  schema:
                    type: boolean
                    default: false
                  description: |
                    If `true`, the counts roll up the whole sub-tree below the
                    requested pool. Defaults to `false`.
            responses:
                "200":
                    description: |
                        Asset statistics for the pool — file counts and storage
                        usage scoped to this pool (and, with `include_subpools=true`,
                        its transitive sub-tree).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PoolStats'
                "401":
                    description: |
