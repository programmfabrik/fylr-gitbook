        x-path: /eas/zoom
        description: |
            The endpoint zoom is used to deliver tiles for images. Use the `/api/db` and `/api/search` endpoints to retrieve the base URL to zoom and add the parameters to pick the tile accordingly. Tiles can be of any size and position. This endpoint uses the default tile size `320`.
        get:
            parameters:
                - name: fileId
                  in: path
                  description: The ID of the file.
                  required: true
                  schema:
                    type: number
                    format: int64
                - name: hash
                  in: path
                  required: true
                  schema:
                    type: string
                  description: The `hash` is the `file.hash` as described [here](https://docs.fylr.io/for-developers/system-data-types/file#hash).
                - name: version
                  in: path
                  required: true
                  schema:
                    type: string
                  description: The `file.class_extension` as described [here](https://docs.fylr.io/for-developers/system-data-types/file#hash).
                - name: zoom_viewport
                  in: path
                  required: true
                  schema:
                    type: number
                  description: 'The viewport is the width of the desired rectangle for the tile selection. The minimum is 100. If the original image width is 4000px and the viewport is 40000px, the zoom factor will be 10. The image is zoomed so that the width of the resulting image is as large as this parameter. '
                - name: zoom_x
                  in: path
                  required: true
                  schema:
                    type: number
                  description: |-
                    Within the viewport zoomed image `zoom_x` is the tile number on the x-axis on
                    a tought grid. The tile size is 320 unless given otherwise. If an image is
                    3200px (width) x 16000px (height) and the viewport is 32000px, we have a zoom
                    factor of 10. With a tile size of 320, this results in a grid of 100 x 50
                    tiles.
                - name: zoom_y
                  in: path
                  required: true
                  schema:
                    type: number
                  description: |-
                    Within the viewport zoomed image `zoom_y` is the tile number on the y-axis on
                    a tought grid. The tile size is 320 unless given otherwise. If an image is
                    3200px (width) x 16000px (height) and the viewport is 32000px, we have a zoom
                    factor of 10. With a tile size of 320, this results in a grid of 100 x 50
                    tiles.
