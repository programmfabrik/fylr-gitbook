                                                                                size: 600
                                                                                format: png
                                                                                resize_mode: max
                                                                                jpegquality: 80
                                                                                strip: true
                                                                    example:
                                                                        imageconverter:browserthumbs:
                                                                            params:
                                                                                size: 1200
                                                                                format: webp
                                                                                resize_mode: max
                                                                        imageconverter:preview_pool_watermark:
                                                                            params:
                                                                                size: 600
                                                                                format: jpg
                                                        recognize_series:
                                                            type: boolean
                                                            default: false
                                                            description: |
