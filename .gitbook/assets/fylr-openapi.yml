    /collection/objects/{collection_id}:
        x-path: /collection/objects
        description: |
            Read or replace the objects linked to the collection identified by
            `collectionId`. `GET` returns the linked objects; `POST` replaces the
            entire list, linking exactly the objects in the body and unlinking any
            that are absent. The collection `_version` is not changed.
        get:
            summary: Retrieve objects of a collection.
            description: |
                * Requires an authenticated user with `BAG_READ` permission.
                * The linked objects of the addressed collection are returned in `position`
                  order, paginated by `offset` / `limit`.
            parameters:
                - name: offset
                  in: query
                  schema:
                    type: integer
                  description: The offset when requesting the collection object list.
                - name: limit
                  in: query
                  schema:
                    type: integer
                  description: The limit when requesting the collection object list. Default is _100_.
                - name: collection_id
                  in: path
                  required: true
                  schema:
                    type: integer
                  description: |
                    The collection id of the collection to access.
                - name: x-fylr-authorization
                  in: header
                  schema:
                    type: string
                  description: |
                    The access token in form of `Bearer <token>`. You can also use `authorization`
                    which does the same. `authorization` is looked at first.
                - name: authorization
                  in: header
                  schema:
                    type: string
                  description: |
                    The access token in form of `Bearer <token>`.
            responses:
                "200":
                    description: |
                        List of collection objects.
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    _version:
                                        type: integer
                                        readOnly: true
                                        description: |
                                            The `_version` of the collection.
                                    count:
                                        type: integer
                                        description: |
                                            The number of objects linked to this collection. In
                                            `/api/collection/splice` the number of objects to delete. Use `-1` to
                                            delete all objects.
                                    index:
                                        type: integer
                                        nullable: true
                                        description: |
                                            The index to use for `/api/collection/splice`. Index `0` is to the left of
                                            the first object. Index which equals the number of existing objects in the
                                            collection is to the right of the last object.
                                    offset:
                                        type: integer
                                        readOnly: true
                                        description: |
                                            The offset of list of objects.
                                    limit:
                                        type: integer
                                        readOnly: true
                                        description: |
                                            The maximum count of objects to list.
                                    objects:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                _global_object_id:
                                                    type: string
                                                    description: |
                                                        The object id identifying the object. This is considered a local object if has
                                                        the format `<system object id>@local` or `<system object id>@<db uuid>`. All other ids
                                                        are considered foreign and accepted without further checks. Local ids are checked
                                                        for existance.
                                                webfrontend_props:
                                                    type: object
                                                    additionalProperties: true
                                                    description: |
                                                        An object to store custom data for collections. Frontends are advised
                                                        to use their own top level property here and put all custom data
                                                        underneath. Other top level data should be stored back as is. The
                                                        server applies no processing to that data.
                                                lookup:_global_object_id:
                                                    type: object
                                                    description: |
                                                        Object lookups can use `_system_object_id` or `_uuid` to find existing objects. If objects are promised to
                                                        be injected into **fylr**, `_allow_defer` can be set. Custom columns can also be used to find an object.
                                                    properties:
                                                        _allow_defer:
                                                            type: boolean
                                                        _objecttype:
                                                            type: string
                                                        _system_object_id:
                                                            type: integer
                                                        _uuid:
                                                            type: string
                                                        additionalProperties:
                                                            type: string
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "403":
                    description: |
                        The authenticated user lacks a required permission (BAG_READ on
                        the collection for GET, plus LINK/UNLINK on the objects for
                        POST). See `code` for the specific reason.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/CollectionForbiddenError'
                "404":
                    description: |
                        The collection addressed by the URL does not exist.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/NotFoundError'
        post:
            summary: Replace objects of a collection.
            description: |
                * Replaces the entire object list: the collection is linked to exactly
                  the objects in the request body, and any object not present in the
                  body is unlinked.
                * Requires an authenticated user with `BAG_READ` permission.
                * Linking objects to a collection requires `LINK` permission.
                * If objects will be unlinked from the collection, the `UNLINK` permission is needed.
                * The `_version` of the collection is not changed.
            parameters:
                - name: collection_id
                  in: path
                  required: true
                  schema:
                    type: integer
                  description: |
                    The collection id of the collection to access.
                - name: allow_invalid_acl
                  in: query
                  schema:
                    type: string
                    format: boolean
                  description: |
