            description: |
                Same as `/export/{exportId}/file/` but addresses a particular
                production run identified by `uuid`. When `uuid` matches one of the
                export's transport UUIDs, access is granted via that transport
                (deep-link style) instead of the owner check. `HEAD` is also
                accepted.
            parameters:
                - name: exportId
                  in: path
                  required: true
                  schema:
                    type: integer
                    format: int64
                    minimum: 1
                - name: uuid
                  in: path
                  required: true
                  schema:
                    type: string
                  description: The export run / transport UUID.
            responses:
                "200":
                    description: |
                        The file bytes (when a file path is appended) or the HTML file
                        index (when the path is empty or ends in `/`).
                    content:
                        application/octet-stream:
                            schema:
                                type: string
                                format: binary
                        text/html:
                            schema:
                                type: string
                "403":
                    description: |
                        The authenticated user is neither the export's owner (matched by
                        `user_id`) nor a `system.root` user. The response carries code
                        `InsufficientRights` (package `api`); `parameters.resource` is the
                        literal `Export` here (the `DELETE` handler uses `export-{id}`).
                        A request with no authenticated user also lands here, except for
                        create / update / list, which surface a generic `400` instead.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ExportForbiddenError'
                "400":
                    description: |
                        The requested file could not be produced: e.g. the referenced
                        file is not yet in status `done` (`FileNotDone`), a file version
                        or group is unavailable (`FileVersionNotAvailable`,
                        `FileGroupNotAvailable`), an api-object path is invalid
                        (`ApiObjectPath`), or deep-link access is disabled
                        (`DeepLinkAccessByIdDisabled`, `DeepLinkAccessByColumnDisabled`).
                        All carry package `export`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ExportError'
                "404":
                    description: |
                        The requested file does not exist in the export (code
                        `FileNotFound`, package `export`). `parameters.file` carries
                        the requested path.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ExportError'
        head:
            summary: Headers for a single export file (or the file index) for a run UUID.
            description: |
                Same routing as the `GET` form but returns headers only, no body.
            parameters:
                - name: exportId
                  in: path
                  required: true
                  schema:
                    type: integer
                    format: int64
                    minimum: 1
                - name: uuid
                  in: path
                  required: true
                  schema:
                    type: string
                  description: The export run / transport UUID.
            responses:
                "200":
                    description: Headers for the file or the file index; no body.
                "403":
                    description: |
                        The authenticated user is neither the export's owner (matched by
                        `user_id`) nor a `system.root` user. The response carries code
                        `InsufficientRights` (package `api`); `parameters.resource` is the
                        literal `Export` here (the `DELETE` handler uses `export-{id}`).
                        A request with no authenticated user also lands here, except for
                        create / update / list, which surface a generic `400` instead.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ExportForbiddenError'
    /publish:
        description: |
            Record **publishings** of fylr objects in external systems.
            **fylr has no publishing layer of its own** — the publication
            itself (for example a DataCite DOI, an external gallery page or a
            share link) is produced and hosted elsewhere. A publish entry is
            fylr's record of such a publication: it ties an object's
            `system_object_id` to the **collector** it was published through
            (a target configured in the base config, e.g. `datacite`) and to
            the external `publish_uri` where the publication lives, plus a
            deep-link back into fylr (`easydb_uri`). These endpoints create,
            list and delete those records — they do not generate or serve the
            published artifacts.
        post:
            summary: Record one or more publishings.
            description: |
                The payload is an array of publish descriptors. Requires the
                `system.api.publish[post]` system right and a non-read-only
                instance.

                A descriptor that carries an existing `_id` **updates** that
                publish row in place; a descriptor without `_id` (or with `_id`
                `0`) inserts a new one. Both kinds may be mixed in one request.

                Differs from easydb 5: easydb 5 documents this endpoint as
                insert-only — "Only new publishing can be done using this API.
                There is no possibility to update an existing objects." (DELETE +
                re-POST is the documented way to change a publication there). fylr
                additionally updates the existing row when a descriptor's `_id` is
                set.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: '#/components/schemas/PublishApi'
            responses:
                "200":
                    description: The created publish entries.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/PublishApi'
                "400":
                    description: |
                        The publication could not be created. Returned as a
                        `PublishError` (`package: object`, `statuscode: 400`) when a
                        descriptor is invalid: `PublishUnknownCollector`,
                        `PublishInvalidData`, `PublishDeletedObject`. Returned as the
                        standard `Error` envelope (`package: ferrors`) when the
                        instance is in **read-only** mode (`ReadOnlyMode`, message
                        `Read-only mode is enabled.` — this check runs before the
                        rights check) or the request body is not a valid JSON array
                        of descriptors (`ServerGeneric`).
                    content:
                        application/json:
                            schema:
                                oneOf:
                                    - $ref: '#/components/schemas/PublishError'
                                    - $ref: '#/components/schemas/Error'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "403":
                    description: |
                        The authenticated user lacks the per-operation system right
                        (`system.api.publish[post]`, `system.api.publish[get]`, or
                        `system.api.publish[delete]`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
                "404":
                    description: |
                        An object referenced by a publish entry's `system_object_id`
                        could not be loaded from the object store — on `POST` the id
                        in the payload, on `DELETE` the target object of the publish
                        row being removed (e.g. the object was hard-deleted after the
                        publish was recorded). Code `ObjectNotFound`
                        (`package: ferrors`, `statuscode: 404`), message
                        `Object #<system_object_id> was not found`. Not raised by an
                        unknown id in the request URL — a single `GET` or a `DELETE`
                        for an unknown publish id returns `200`, not `404`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/NotFoundError'
        get:
            summary: List publish records.
            description: |
                Requires the `system.api.publish[get]` system right.
            responses:
                "200":
                    description: Array of publish descriptors.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/PublishApi'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "403":
                    description: |
                        The authenticated user lacks the per-operation system right
                        (`system.api.publish[post]`, `system.api.publish[get]`, or
                        `system.api.publish[delete]`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
    /publish/{systemObjectId}:
        x-path: /publish
        description: |
            Retrieve a single publish record by its `id`. Despite the path
            parameter name, the value is the publish entry's own `id`, not an
            object's `system_object_id`. The response is a single-element
            array, or an empty array (still `200`) when no entry has that id.
        get:
            summary: Retrieve a single publish record by its id.
            description: |
                The path parameter is named `systemObjectId` in the route for
                historical reasons; in fact the value is the publish entry's
                own `id`. The handler returns a single-element array (or an
                empty array if no publish has that id). Requires
                `system.api.publish[get]`.
            parameters:
                - name: systemObjectId
                  in: path
                  required: true
                  schema:
                    type: integer
                    format: int64
                    minimum: 1
                  description: |
                    Publish entry id (not the system_object_id of an object).
            responses:
                "200":
                    description: |
                        Array of zero-or-one publish entries that match the id. An
                        id matching no stored entry yields an empty array with `200`,
                        not a `404`.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/PublishApi'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "403":
                    description: |
                        The authenticated user lacks the per-operation system right
                        (`system.api.publish[post]`, `system.api.publish[get]`, or
                        `system.api.publish[delete]`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
    /publish/{publishId}:
        x-path: /publish
        description: |
            Delete a single publish record by its `_id`. Requires the
            `system.api.publish[delete]` system right and a non-read-only
            instance. An unknown id is a no-op that still returns `200` with
            `{"status":{"acknowledged":"ok"}}`.
        delete:
            summary: Delete a publish record.
            description: |
                Deletes the publish entry with the given `_id`. Requires the
                `system.api.publish[delete]` system right and a non-read-only
                instance. Deleting an unknown publish id is a no-op that still
                returns `200` with `{"status":{"acknowledged":"ok"}}`.
            parameters:
                - name: publishId
                  in: path
                  required: true
                  schema:
                    type: integer
                    format: int64
                    minimum: 1
                  description: The publish entry's `_id`.
            responses:
                "200":
                    description: |
                        The publication was deleted (or the id did not exist — the
                        delete is a no-op in that case).
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: object
                                        properties:
                                            acknowledged:
                                                type: string
                                                enum:
                                                    - ok
                "400":
                    description: |
                        The instance is in **read-only** mode, so no publication can
                        be deleted. Code `ReadOnlyMode` (`package: ferrors`), message
                        `Read-only mode is enabled.` This check runs before the
                        rights check.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "403":
                    description: |
                        The authenticated user lacks the per-operation system right
                        (`system.api.publish[post]`, `system.api.publish[get]`, or
                        `system.api.publish[delete]`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
                "404":
                    description: |
                        An object referenced by a publish entry's `system_object_id`
                        could not be loaded from the object store — on `POST` the id
                        in the payload, on `DELETE` the target object of the publish
                        row being removed (e.g. the object was hard-deleted after the
                        publish was recorded). Code `ObjectNotFound`
                        (`package: ferrors`, `statuscode: 404`), message
                        `Object #<system_object_id> was not found`. Not raised by an
                        unknown id in the request URL — a single `GET` or a `DELETE`
                        for an unknown publish id returns `200`, not `404`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/NotFoundError'
    /suggest:
        description: |
            Auto-suggest / autocomplete. Given the user's current input,
            returns candidate completions either as token frequencies
            (`tokens`) or as per-field value matches (`fields`), plus
            optionally the full linked-object descriptors for picker UIs
            (`linked_objects`). Backed by the search index — the same
            language settings apply.

            Read-only: the request runs in a read transaction; nothing is
            written. The handler enforces no specific right and no login —
            an anonymous request is accepted; results are scoped to whatever
            the session is allowed to see via the per-user best-mask filter.
        get:
            summary: Auto-suggest with the request encoded in the URL.
            description: |
                Identical semantics to `POST /suggest`; the JSON request is
                passed verbatim as the `BODY` query parameter. Useful for
                front ends that prefer not to send a GET body.

                The query parameter name is **`BODY`** (uppercase) — the
                handler reads `r.URL.Query().Get("BODY")` case-sensitively, so a
                lowercase `body=...` is not picked up; an absent or empty `BODY`
                then fails JSON parsing and returns a `400`.
            parameters:
                - name: BODY
                  in: query
                  required: true
                  schema:
                    type: string
                    format: json
                  description: |
                    JSON-encoded `SuggestRequest`. See the request schema on
                    `POST /suggest` for the field set.
            responses:
                "200":
                    description: Suggestion envelope.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SuggestResponse'
                "400":
                    description: |
                        Malformed request — invalid JSON in `BODY`, an objecttype in
                        `objecttypes` or `linked_objecttypes` that does not exist, an
                        unresolvable entry in `fields`, or an unknown `tokens_mode`
                        (the latter only rejects when token suggestions run, i.e.
                        unless `tokens` is `false`). All return `ServerGeneric` /
                        `400`; the handler emits no other status.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SuggestError'
        post:
            summary: Auto-suggest with the request as a JSON body.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/SuggestRequest'
            responses:
                "200":
                    description: Suggestion envelope.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SuggestResponse'
                "400":
                    description: |
                        Malformed request — invalid JSON in the request body, an
                        objecttype in `objecttypes` or `linked_objecttypes` that does
                        not exist, an unresolvable entry in `fields`, or an unknown
                        `tokens_mode` (the latter only rejects when token suggestions
                        run, i.e. unless `tokens` is `false`). All return
                        `ServerGeneric` / `400`; the handler emits no other status.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/SuggestError'
    /l10n/static/{lang}.json:
        x-path: /l10n
        description: |
            Static UI translations — the localisations the front-end and admin
            pages need before a user is signed in. Returned as
            `{<lang>: {key: text}}` — a single top-level entry keyed by the
            requested language tag whose value is the flat translation map.
        get:
            summary: Static UI translations for a language.
            parameters:
                - name: lang
                  in: path
                  required: true
                  schema:
                    type: string
                  description: |
                    Language tag (e.g. `de-DE`, `en-US`). Per key, if the requested
                    tag has no value the handler falls back to `en-US`, then to any
                    other known language; a key with no value in any language is
                    omitted. The result is always keyed by the requested tag.
            responses:
                "200":
                    description: |
                        Single top-level entry keyed by the requested language tag whose
                        value is the flat translation map. An unknown `lang` still yields
                        `{<lang>: {...}}` with fallback-filled values.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties:
                                    type: object
                                    additionalProperties:
                                        type: string
                                description: |
                                    `{<lang>: {key: translated_text}}` — one entry, keyed by the
                                    requested language tag.
                                example:
                                    de-DE:
                                        language.de-DE: Deutsch (DE-DE)
                                        language.en-US: Änglisch (EN-US)
                                        language.da-DK: Dänisch (DA-DK)
    /l10n/user/{version}:
        x-path: /l10n
        description: |
            Datamodel translations — labels for objecttypes, masks, fields and
            enums of a specific datamodel version. `version` is `HEAD` (the
            working copy), `CURRENT` (the most recently committed version,
            resolved server-side), or a positive integer for a specific committed
            version. Reading requires only an authenticated user.
        get:
            summary: Datamodel translations for a version.
            parameters:
                - name: version
                  in: path
                  required: true
                  schema:
                    type: string
                    pattern: ^(HEAD|CURRENT|[1-9][0-9]*)$
            responses:
                "200":
                    description: |
                        The datamodel translations as a flat `{key: LocaValue}`
                        document.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/LocaApi'
                "400":
                    description: |
                        The requested datamodel version does not exist, or the supplied
                        `version` is not `HEAD`, `CURRENT`, or a positive integer
                        (`code: DatamodelVersionNotFound`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/L10nVersionError'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
    /l10n/user/HEAD:
        x-path: /l10n
        description: |
            Write the working-copy (`HEAD`) datamodel translations. The handler does
            not check any user right — it is guarded only by read-only mode. **This is
            a full replace**: any generated key omitted from the body is cleared, so
            always send the complete document (typically the body returned by
            `GET /l10n/user/HEAD`). The write lands on the uncommitted `HEAD` datamodel
            (a fresh working copy is started when `HEAD` was previously committed), so
            the change reaches `CURRENT` and committed versions only after
            `POST /schema/commit`.

            Differs from easydb 5: easydb 5 requires the system right `system.datamodel`
            with level `development` to update localizations; fylr checks no user right
            here (the write is guarded only by read-only mode). easydb 5 also accepts
            `POST /api/v1/l10n/user/{CURRENT|HEAD}` (both `CURRENT` and `HEAD`); fylr
            only exposes `HEAD` — writing always lands on the working copy.
        post:
            summary: Update HEAD datamodel translations.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/LocaApi'
            responses:
                "200":
                    description: |
                        The HEAD translations were updated. The response carries
                        the resulting translation document — the same shape as
                        `GET /l10n/user/HEAD`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/LocaApi'
                "400":
                    description: |
                        The submitted document is malformed (`code: ServerGeneric`), or
                        the instance is in read-only mode (`code: ReadOnlyMode`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/L10nPostError'
    /plugin:
        description: |
            Read information about installed plugins, and download the bundled
            plugin assets (JavaScript, CSS, HTML templates, translations).
        get:
            summary: List installed plugins.
            description: |
                Returns the descriptors of all **enabled** plugins (disabled
                plugins are not exposed here) and — when bundling is enabled
                on the instance — the URLs of the concatenated front-end
                asset bundles.

                This endpoint is public: no access token is required.
            responses:
                "200":
                    description: |
                        The plugin inventory and the front-end bundle URLs.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PluginApiGET'
    /plugin/bundle.js:
        x-path: /plugin
        description: |
            Serves the concatenated JavaScript of every enabled plugin, in
            dependency load-order. Public (no access token) and cached
            client-side via the standard fylr cache-id header.
        get:
            summary: Concatenated plugin JavaScript bundle.
            description: |
                Returns the JavaScript bundle of every enabled plugin, in
                load-order. Cached client-side using the standard fylr
                cache-id header.
            responses:
                "200":
                    description: The JavaScript bundle.
                    content:
                        text/javascript:
                            schema:
                                type: string
    /plugin/bundle.css:
        x-path: /plugin
        description: |
            Serves the concatenated CSS of every enabled plugin, in dependency
            load-order. Public (no access token) and cached client-side via the
            standard fylr cache-id header.
        get:
            summary: Concatenated plugin CSS bundle.
            responses:
                "200":
                    description: The CSS bundle.
                    content:
                        text/css:
                            schema:
                                type: string
    /plugin/bundle.html:
        x-path: /plugin
        description: |
            Serves the concatenated HTML templates of every enabled plugin, in
            dependency load-order. Public (no access token) and cached
            client-side via the standard fylr cache-id header.
        get:
            summary: Concatenated plugin HTML templates.
            responses:
                "200":
                    description: The HTML template bundle.
                    content:
                        text/html:
                            schema:
                                type: string
    /plugin/bundle/l10n/{lang}.json:
        x-path: /plugin
        description: |
            Serves the front-end translations of all enabled plugins for the
            requested `{lang}`, merged into one flat translation map. Public:
            no access token is required.
        get:
            summary: Concatenated plugin translations for a language.
            parameters:
                - name: lang
                  in: path
                  required: true
                  schema:
                    type: string
                  description: Language tag (e.g. `de-DE`, `en-US`).
            responses:
                "200":
                    description: |
                        Flat translation map merged across all enabled plugins.
                    content:
                        application/json:
                            schema:
                                type: object
                                additionalProperties:
                                    type: string
    /plugin/static/{plugin}/{path}:
        x-path: /plugin
        description: |
            Serves a single bundled static asset of the named `{plugin}` by its
            `{path}` relative to the plugin's static root. The mount is a prefix,
            so `{path}` may span further `/` segments. Public (no access token);
            the plugin must be enabled.
        get:
            summary: Download a bundled static asset of a plugin.
            description: |
                Serves a file from the named plugin's static asset directory by
                its path relative to the plugin's static root. The route is a
                prefix mount, so `{path}` may contain further `/` segments.

                Public: no access token is required. The plugin must be enabled.
            parameters:
                - name: plugin
                  in: path
                  required: true
                  schema:
                    type: string
                  description: Plugin name (the manifest `name:`).
                - name: path
                  in: path
                  required: true
                  schema:
                    type: string
                  description: |
                    Path of the asset relative to the plugin's static root.
            responses:
                "200":
                    description: |
                        The requested asset. The content type depends on the file.
                    content:
                        application/octet-stream:
                            schema:
                                type: string
                                format: binary
                "400":
                    description: |
                        The plugin exists but is disabled (`code: PluginDisabled`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PluginError'
                "404":
                    description: |
                        No plugin with this name (`code: PluginNotFound`). A missing
                        asset within an existing, enabled plugin is reported by the
                        file server itself (a plain-text 404 for disk-backed plugins,
                        or a `code: ServerGeneric` 400 when the ZIP read fails for
                        zip/url-backed plugins) — not as `PluginNotFound`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PluginError'
    /plugin/extension/{plugin}/{path}:
        x-path: /plugin
        description: |
            Dispatches to a backend extension endpoint registered by the named
            plugin. The plugin declares extension routes in its manifest; this
            mount forwards a matching request to the plugin's callback, whose
            response (status code, headers and body) is entirely plugin-defined.

            The route is registered for **all** HTTP methods (GET, POST, PUT,
            PATCH, DELETE, …); which methods a given extension accepts is up to
            the plugin. The handler resolves the plugin first: an unknown name
            returns `code: PluginNotFound` (404) and a disabled plugin returns
            `code: PluginDisabled` (400), both before any auth check. Only then
            is an access token required (`code: UserRequired` / 401 when
            absent). A request whose `{path}` matches no extension of an
            enabled plugin returns a plain-text 404 (`http.NotFound`), not a
            JSON error body.
        parameters:
            - name: plugin
              in: path
              required: true
              schema:
                type: string
              description: Plugin name (the manifest `name:`).
            - name: path
              in: path
              required: true
              schema:
                type: string
              description: |
                Extension route path as declared in the plugin manifest. The
                mount is a prefix, so this may contain further `/` segments.
        get:
            summary: Call a plugin-defined backend extension endpoint.
            description: |
                Forwards to the plugin's extension callback. The response body and
                status are defined by the plugin; extensions may also set custom
                `X-Fylr-Error` / `X-Fylr-Error-Code` headers and return non-2xx
                status codes (e.g. 400, 402, 500) with their own body shape.

                The same mount also handles POST, PUT, PATCH and DELETE requests.
            responses:
                "200":
                    description: |
                        Plugin-defined success response. Shape depends entirely on the
                        extension implementation.
                "400":
                    description: |
                        The named plugin exists but is disabled
                        (`code: PluginDisabled`). Checked before the access-token
                        requirement.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PluginError'
                "401":
                    description: |
                        The request did not carry a valid access token
                        (`code: UserRequired`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "404":
                    description: |
                        No plugin with this name (`code: PluginNotFound`, JSON
                        `PluginError` body). When the plugin exists and is enabled but
                        has no extension matching `{path}`, the handler instead returns
                        a plain-text `404 page not found` with no JSON body.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PluginError'
    /plugin/manage:
        x-path: /plugin/manage
        description: |
            Management API for installed plugins. Every operation requires the
            system right `system.root` or `system.plugin`; a request lacking
            both (including an unauthenticated request) is rejected with
            `code: SystemRightRequired` (403).
        get:
            summary: List all installed plugins.
            description: |
                Returns every installed plugin — enabled and disabled — with its
                stored row and parsed manifest.
            responses:
                "200":
                    description: The list of installed plugins.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PluginManageList'
                "403":
                    description: |
                        The user holds neither `system.root` nor `system.plugin`
                        (`code: SystemRightRequired`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
        put:
            summary: Create (install) a plugin.
            description: |
                Installs a new plugin. The body must NOT carry an `id`; `type` is
                required and must be one of `disk`, `zip`, `url`. For a ZIP upload,
                set `type: zip` and reference a previously uploaded ZIP asset as
                `zip_file: { "_id": <fileId> }`. The plugin's enabled state is
                taken from the request `enabled` field, so a plugin can be created
                already enabled.

                Fails with `code: PluginDuplicateName` (400) if a plugin with the
                same name already exists, with `code: ReadOnlyMode` when the
                instance is in read-only mode, and with `code: ServerGeneric`
                (400) when the body carries an `id` or the payload cannot be
                parsed.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/PluginManageApi'
            responses:
                "200":
                    description: The created plugin.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PluginManageApi'
                "400":
                    description: |
                        A plugin with this name already exists
                        (`code: PluginDuplicateName`), the instance is read-only
                        (`code: ReadOnlyMode`), or the payload could not be parsed.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PluginError'
                "403":
                    description: |
                        The user holds neither `system.root` nor `system.plugin`
                        (`code: SystemRightRequired`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
    /plugin/manage/{id}:
        x-path: /plugin/manage
        description: |
            Read, update or delete a single installed plugin by its numeric
            `{id}`. Every operation requires the system right `system.root` or
            `system.plugin`; a request holding neither is rejected with
            `code: SystemRightRequired` (403).
        parameters:
            - name: id
              in: path
              required: true
              schema:
                type: integer
                format: int64
              description: Numeric id of the plugin.
        get:
            summary: Read one installed plugin.
            responses:
                "200":
                    description: The plugin.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PluginManageApi'
                "403":
                    description: |
                        The user holds neither `system.root` nor `system.plugin`
                        (`code: SystemRightRequired`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
                "404":
                    description: |
