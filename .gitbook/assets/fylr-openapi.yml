                  in: path
                  required: true
                  schema:
                    type: string
                  description: The `hash` is the `file.hash` as described [here](https://docs.fylr.io/for-developers/system-data-types/file#hash).
                - name: version
                  in: path
                  required: true
                  schema:
                    type: string
                  description: The `file.class_extension` as described [here](https://docs.fylr.io/for-developers/system-data-types/file#hash).
                - name: x-fylr-signature
                  in: query
                  schema:
                    type: string
                  description: The signature to omit file permission checks. It will be added to the URL when retrieved through `/api/db`, `/api/search` or other endpoints which deliver fylr URLs. The signature will be taken from the query parameter first and if not found, from the request header.
                - name: x-fylr-signature
                  in: header
                  schema:
                    type: string
                  description: |-
                    The signature to omit file permission checks. It will be added to the URL when
                    retrieved through `/api/db`, `/api/search` or other endpoints which deliver
                    fylr URLs. The signature will be taken from the query parameter first and if
                    not found, from the request header.
                - name: obj_uuid
                  in: query
                  description: |
                    The `_uuid` of the object the file is linked into. This is used for the permission check.
                  schema:
                    type: string
                - name: recipe
                  in: query
                  schema:
                    type: string
                  description: |
                    Name of recipe in the form of `<cookbook>:<recipe>`. If not given, the
                    system recipe `_produce:produce` is used. In that case, the other url
                    parameters are used as parameters for the recipe.
                - name: recipe_params
                  in: query
                  schema:
                    type: string
                    format: json
                  description: |
                    JSON formatted object which sets the parameters for the recipe. The parameter name is the `<key>` in the object.
                - name: format
                  in: query
                  schema:
                    type: string
                    enum:
                        - jpg
                        - jpeg
                        - jp2
                        - png
                        - tif
                        - tiff
                        - bmp
                        - gif
                        - psd
                  description: |
                    The target format of the produced file. Defaults to the extension of the file parent.
                - name: size
                  in: query
                  schema:
                    type: number
                    format: int
                  description: set the target size
                - name: width
                  in: query
                  schema:
                    type: number
                    format: int
                  description: set the target width
                - name: height
                  in: query
                  schema:
                    type: number
                    format: int
                  description: set the target height
                - name: resize_mode
                  in: query
                  schema:
                    type: string
                    enum:
                        - max
                        - min
                        - width
                        - height
                        - cover
                        - force
                        - contain
                  description: |
                    * "max": "size" is the maximum side
                    * "min": "size" is the minimum side
                    * "width": "size" is the width * "height"
                    * "size" is the height.

                    If "width" and "height" are given, `resize_mode`` can either be "cover"
                    or "force". "cover" will cut of overflowing pixels, "contain" will
                    not cut off any pixels and "force" will not preserve the aspect
