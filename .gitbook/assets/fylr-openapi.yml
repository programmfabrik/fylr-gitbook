                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
    /xmlmapping/list:
        x-path: /xmlmapping
        description: |
            Manage XML import/export **mappings** — transformations between
            fylr objects and external XML formats (METS/MODS, LIDO, custom
            profiles, ...). A mapping pairs an XML profile with field-level
            bindings; profiles describe the structure of the external XML.
        get:
            summary: List all profiles with the mappings built from each.
            description: |
                Returns every registered profile together with the concrete
                mappings derived from it (the `mappings` sub-array). Profiles
                with no mappings are still included.
            responses:
                "200":
                    description: Array of profile-with-mappings descriptors.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/XmlMappingProfile'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
    /xmlmapping/tags:
        x-path: /xmlmapping
        description: |
            Read the metadata tag catalog used by the mapping editor for
            tag-name autocompletion. The catalog is the output of the recipe named
            by `produceConfig.metadata.exif_list` (default `_metadata:_exif_list`),
            run and streamed straight to the response body. Requires `system.profile`.
        get:
            summary: List the metadata tags the exif-list recipe knows about.
            description: |
                Runs the recipe named by `produceConfig.metadata.exif_list` (default
                `_metadata:_exif_list`) and copies its output straight to the response
                body. The default recipe invokes `fylr metadata list -`, which runs
                `exiftool -listx` and converts the XML tag list to JSON — a structured
                list of every metadata tag exiftool understands, used by the mapping
                editor to autocomplete tag names.

                The response is the recipe's output streamed through unmodified,
                so a custom recipe determines its own shape. With the default
                recipe the response follows the `XmlMappingTagCatalog` schema:
                each entry in `tags` carries `path`, `group`, `writable`, `type`
                and two capability flags the mapping editor uses to offer only
                the value-shapes the tag actually supports — `l10n` (the tag is
                a localized **lang-alt**) and `list` (the tag is a repeatable
                list, with `list_type` `Bag` or `Seq`). The two combine into
                four container kinds: scalar (neither), list (`list`), lang-alt
                (`l10n`), and list-of-lang-alt (both — e.g. `XMP-plus:Custom1`).
                Requires `system.profile`.
            responses:
                "200":
                    description: |
                        The recipe's JSON output, streamed through unmodified
                        (`Content-Type: application/json; charset=utf-8`). With the
                        default `exif_list` recipe this is the exiftool tag catalog.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/XmlMappingTagCatalog'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "403":
                    description: |
                        The authenticated user has neither the `system.profile` nor the
                        `system.root` right. One of them is required for `GET /tags`,
                        `GET /mapping/{mapping}`, `PUT /mapping`, `POST /mapping/{mapping}`
                        and `DELETE /mapping/{mapping}`. (`GET /list` and
                        `GET /profile/{profile}` require only an authenticated user — no
                        right.) Response `code` is `SystemRightRequired`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
    /xmlmapping/profile/{profile}:
        x-path: /xmlmapping
        description: |
            Retrieve a single XML **profile** by name. A profile describes the
            structure of an external XML format (METS/MODS, LIDO, custom, ...)
            that mappings are built from. The `{profile}` segment is the stable
            profile name as returned by `GET /xmlmapping/list`, including the
            source file extension (e.g. `dc.yml`).
        get:
            summary: Retrieve a single XML profile.
            parameters:
                - name: profile
                  in: path
                  required: true
                  schema:
                    type: string
                  description: |
                    Stable profile name exactly as returned by `GET /xmlmapping/list`
                    — it includes the source file extension, e.g. `dc.yml`. The full
                    list is reachable via `GET /xmlmapping/list`.
            responses:
                "200":
                    description: The profile descriptor.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/XmlMappingProfile'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "400":
                    description: |
                        The `{mapping}` id (or `{profile}` name) in the URL does not match
                        any stored entry. The handler returns a plain error, so the
                        response `code` is `ServerGeneric` with status `400` — there is no
                        `404`/`NotFoundError` for this endpoint.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /xmlmapping/mapping:
        x-path: /xmlmapping
        description: |
            Create a new XML **mapping** — the field-level bindings that pair an
            XML profile with fylr objects for import/export. The mapping is sent
            as an `XmlMappingApi` body. Requires `system.profile`. Use
            `POST /xmlmapping/mapping/{mapping}` to update an existing mapping.
        put:
            summary: Create a new mapping.
            description: |
                The body's `id` is ignored on create — a fresh id is drawn from the
                `mapping.id` sequence and the row is inserted into the `mapping` table
                (plus `mapping_field` / `mapping_field_easydb`). The same handler serves
                `POST /xmlmapping/mapping/{mapping}` for updates.

                Differs from easydb 5: easydb 5 stores each mapping as a JSON file in the
                schema folder (`schema/<db>/<current>/xmlmapping-mappings/<mapping_id>.json`).
                fylr stores mappings directly in the `mapping` / `mapping_field` /
                `mapping_field_easydb` database tables — there is no per-mapping file and
                no schema-folder path.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/XmlMappingApi'
            responses:
                "200":
                    description: The created mapping.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/XmlMappingApi'
                "400":
                    description: |
                        The body failed validation — for example an unknown `easydb` field
                        type, a `text_fixed`/`deep_link_url` source placed among the
                        text/custom sources, a field name that is not a valid target column,
                        an `idTable` (objecttype id) that does not exist, or a recipe config
                        that names a recipe the mapping does not use. A duplicate field
                        `name` within the mapping hits the `mapping_field` unique index and
                        surfaces as `DatabaseUniqueKeyViolation`. (An unknown `profile`
                        name is accepted silently — it is not validated on save.) Returned
                        with `code` `ReadOnlyMode` when the instance is in read-only mode —
                        this read-only check runs first, before the right check and before
                        the body is decoded.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "403":
                    description: |
                        The authenticated user has neither the `system.profile` nor the
                        `system.root` right. One of them is required for `GET /tags`,
                        `GET /mapping/{mapping}`, `PUT /mapping`, `POST /mapping/{mapping}`
                        and `DELETE /mapping/{mapping}`. (`GET /list` and
                        `GET /profile/{profile}` require only an authenticated user — no
                        right.) Response `code` is `SystemRightRequired`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
    /xmlmapping/mapping/{mapping}:
        x-path: /xmlmapping
        description: |
            Retrieve (`GET`), update (`POST`) or delete (`DELETE`) a single XML
            **mapping**, addressed by its numeric `{mapping}` id. Mappings carry
            the field-level bindings between fylr objects and an XML profile.
            `POST` and `DELETE` require `system.profile`; deleting a mapping that
            is still linked from collections' upload settings needs the
            `delete_policy=delete` confirmation.
        get:
            summary: Retrieve an XML mapping.
            parameters:
                - name: mapping
                  in: path
                  required: true
                  schema:
                    type: string
                  description: |
                    The mapping's numeric id (parsed with `pflib.GetInt`); a non-numeric
                    or `0` value resolves to id `0`, which matches no mapping.
            responses:
                "200":
                    description: The mapping descriptor.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/XmlMappingApi'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "403":
                    description: |
                        The authenticated user has neither the `system.profile` nor the
                        `system.root` right. One of them is required for `GET /tags`,
                        `GET /mapping/{mapping}`, `PUT /mapping`, `POST /mapping/{mapping}`
                        and `DELETE /mapping/{mapping}`. (`GET /list` and
                        `GET /profile/{profile}` require only an authenticated user — no
                        right.) Response `code` is `SystemRightRequired`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
                "400":
                    description: |
                        The `{mapping}` id (or `{profile}` name) in the URL does not match
                        any stored entry. The handler returns a plain error, so the
                        response `code` is `ServerGeneric` with status `400` — there is no
                        `404`/`NotFoundError` for this endpoint.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
        post:
            summary: Update an existing XML mapping.
            parameters:
                - name: mapping
                  in: path
                  required: true
                  schema:
                    type: string
                  description: |
                    The mapping's numeric id, written into the body's `id` before saving.
                    Must be `> 0`, otherwise the request fails with `ServerGeneric` `400`.
                    An id that matches no row makes the `UPDATE` a no-op (no `404`).
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/XmlMappingApi'
            responses:
                "200":
                    description: The updated mapping.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/XmlMappingApi'
                "400":
                    description: |
                        The body failed validation — for example an unknown `easydb` field
                        type, a `text_fixed`/`deep_link_url` source placed among the
                        text/custom sources, a field name that is not a valid target column,
                        or a recipe config that names a recipe the mapping does not use. A
                        duplicate field `name` within the mapping hits the
                        `mapping_field` unique index and surfaces as
                        `DatabaseUniqueKeyViolation`. Returned with `code` `ReadOnlyMode`
                        when the instance is in read-only mode — this read-only check runs
                        first, before the right check and before the body is decoded.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "403":
                    description: |
                        The authenticated user has neither the `system.profile` nor the
                        `system.root` right. One of them is required for `GET /tags`,
                        `GET /mapping/{mapping}`, `PUT /mapping`, `POST /mapping/{mapping}`
                        and `DELETE /mapping/{mapping}`. (`GET /list` and
                        `GET /profile/{profile}` require only an authenticated user — no
                        right.) Response `code` is `SystemRightRequired`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
        delete:
            summary: Delete an XML mapping.
            parameters:
                - name: mapping
                  in: path
                  required: true
                  schema:
                    type: string
                  description: The mapping's numeric id.
                - name: delete_policy
                  in: query
                  required: false
                  schema:
                    type: string
                    enum:
                        - delete
                  description: |
                    Resolves the `202` confirmation that is returned when the mapping
                    is still linked from one or more collections' upload settings.
                    The only accepted value is `delete`, which **unlinks** the mapping
                    from every affected collection (sets
                    `collection_create_object.mapping_id` to `NULL`) and then deletes
                    the mapping — it is a save-side-effect switch, not a no-op
                    confirmation. Omit it on the first call to receive the `202`
                    listing the affected collections.
            responses:
                "200":
                    description: |
                        The mapping was deleted (no collections linked it, or the unlink
                        was confirmed with `delete_policy=delete`).
                    content:
                        application/json:
                            schema:
                                type: object
                                required:
                                    - acknowledged
                                properties:
                                    acknowledged:
                                        type: boolean
                                        description: Always `true` when the mapping was deleted.
                                example:
                                    acknowledged: true
                "202":
                    description: |
                        The mapping is still linked from one or more collections' upload
                        settings. Re-send the same request with `?delete_policy=delete` to
                        unlink it from those collections and delete it.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/XmlMappingDelete202'
                "400":
                    description: |
                        Returned with `code` `ReadOnlyMode` when the instance is in
                        read-only mode — this is checked before the right check and before
                        the mapping is loaded. With `code` `UnknownDeletePolicy` when
                        `delete_policy` is present but not `delete`. With `code`
                        `ServerGeneric` when the `{mapping}` id matches no stored mapping
                        (the loader returns a plain error — there is no `404`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "403":
                    description: |
                        The authenticated user has neither the `system.profile` nor the
                        `system.root` right. One of them is required for `GET /tags`,
                        `GET /mapping/{mapping}`, `PUT /mapping`, `POST /mapping/{mapping}`
                        and `DELETE /mapping/{mapping}`. (`GET /list` and
                        `GET /profile/{profile}` require only an authenticated user — no
                        right.) Response `code` is `SystemRightRequired`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
    /oai:
        description: |
            [OAI-PMH](https://www.openarchives.org/OAI/openarchivesprotocol.html)
            endpoint. Implements the Open Archives Initiative Protocol for
            Metadata Harvesting (version 2.0) so external harvesters can pull
            metadata from fylr. The protocol uses a single URL with a `verb`
            query parameter and returns XML.

            Must be enabled in the base config (`fylr.oai_pmh.enabled = true`),
            otherwise every request returns HTTP 400 with `code: OAIpmhNotEnabled`.
            Protocol-level errors are returned inside the XML response body as an
            `<error code="…">` element AND carry the matching HTTP status:
            `badArgument` / `badVerb` / `cannotDisseminateFormat` /
            `badResumptionToken` → 400, `idDoesNotExist` → 404, internal failures
            → 500. Only a successful harvest is `200 OK`.

            The endpoint requires no rights and accepts anonymous requests: when no
            user can be derived from the session, the built-in `system:oai_pmh`
            user is used. There is no read-only-mode guard. A `ListRecords` or
            `GetRecord` harvest logs an `OBJECT_DOWNLOAD` event per record (written
            in a background transaction), but the request itself runs in a read
            transaction — nothing else is persisted.
        get:
            summary: OAI-PMH protocol entry point.
            description: |
                The behaviour depends on the `verb` query parameter. See the
                OAI-PMH specification for the full request/response shape.
            parameters:
                - name: verb
                  in: query
                  required: true
                  schema:
                    type: string
                    enum:
                        - Identify
                        - ListMetadataFormats
                        - ListSets
                        - ListIdentifiers
                        - ListRecords
                        - GetRecord
                  description: OAI-PMH verb.
                - name: identifier
                  in: query
                  schema:
                    type: string
                  description: |
                    OAI-PMH record identifier, e.g.
                    `oai:<namespace_identifier>:<uuid>`. The prefix is `oai:` plus
                    the configured `fylr.oai_pmh.namespace_identifier` (just `oai:`
                    when unset). Required for `GetRecord`; ignored by the other
                    verbs.
                - name: metadataPrefix
                  in: query
                  schema:
                    type: string
                  description: |
                    Metadata format prefix. Required by fylr for `GetRecord` and
                    `ListRecords`; per the OAI-PMH spec it is also expected for
                    `ListIdentifiers`, though fylr does not currently reject a
                    `ListIdentifiers` request that omits it. Built-in values:
                    `oai_dc` and `easydb`. Each XSLT sheet enabled for OAI-PMH in
                    the base config adds a `xslt-<name>` prefix. Call
                    `verb=ListMetadataFormats` to enumerate the prefixes available
                    on a given instance. An unknown prefix yields
                    `<error code="cannotDisseminateFormat">` (HTTP 400).
                - name: set
                  in: query
                  schema:
                    type: string
                  description: |
                    Set spec (optional for `ListIdentifiers`, `ListRecords`).
                - name: from
                  in: query
                  schema:
                    type: string
                    format: date-time
                  description: |
                    UTC datestamp lower bound (UTC date or full datetime
                    accepted, per the OAI-PMH spec).
                - name: until
                  in: query
                  schema:
                    type: string
                    format: date-time
                  description: UTC datestamp upper bound.
                - name: resumptionToken
                  in: query
                  schema:
                    type: string
                  description: |
                    Resumption token issued by a previous `ListIdentifiers`,
                    `ListRecords` or `ListSets` response. Must not be combined with
                    `from`, `until`, `limit`, `set` or `metadataPrefix`, and must
                    match the verb of the request that issued it; an expired token
                    yields `<error code="badArgument">`.
                - name: limit
                  in: query
                  schema:
                    type: integer
                  description: |
                    fylr extension (not part of OAI-PMH). Maximum records per page
                    for `ListRecords` / `ListIdentifiers`. Defaults to the base
                    config `fylr.oai_pmh.records_limit` (else 100); values are
                    clamped to a maximum of 10000. Must not be combined with
                    `resumptionToken`.
                - name: offset
                  in: query
                  schema:
                    type: integer
                    default: 0
                  description: |
                    fylr extension (not part of OAI-PMH). Starting offset into the
                    result list. Normally supplied via `resumptionToken` instead.
                - name: event.info
                  in: query
                  schema:
                    type: string
                  description: |
                    fylr extension (not part of OAI-PMH). JSON object string
                    attached to the `OBJECT_DOWNLOAD` event logged for each record
                    harvested by a `ListRecords` or `GetRecord` request
                    (e.g. `{"custom_info":"..."}`).
            responses:
                "200":
                    description: |
                        Successful OAI-PMH response document. Protocol-level errors are
                        encoded inside the XML body as `<error code="…">` and also set
                        the matching HTTP status (400 / 404 / 500), so this 200 applies
                        to successful harvests only.
                    content:
                        text/xml:
                            schema:
                                type: string
                                description: An OAI-PMH XML response.
                "400":
                    description: |
                        Either OAI-PMH is disabled in the base config
                        (`fylr.oai_pmh.enabled = false`) — a JSON error envelope with
                        `code: OAIpmhNotEnabled` — or a protocol-level request error
                        (`badArgument`, `badVerb`, `cannotDisseminateFormat`,
                        `badResumptionToken`) returned as an OAI-PMH XML document with an
                        `<error code="…">` element.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/OaiError'
                        text/xml:
                            schema:
                                type: string
                                description: |
                                    OAI-PMH XML response carrying an `<error code="…">`
                                    element for the protocol-level error.
                "404":
                    description: |
                        Protocol-level error `idDoesNotExist` (the `GetRecord`
                        `identifier` matched no readable object) returned as an OAI-PMH
                        XML document with an `<error code="idDoesNotExist">` element.
                    content:
                        text/xml:
                            schema:
                                type: string
                                description: |
                                    OAI-PMH XML response carrying an `<error code="…">`
                                    element for the protocol-level error.
                "500":
                    description: |
                        Internal failure while building the response, returned as an
                        OAI-PMH XML document with `<error code="internalServerError">`.
                    content:
                        text/xml:
                            schema:
                                type: string
                                description: |
                                    OAI-PMH XML response carrying
                                    `<error code="internalServerError">`.
        head:
            summary: HEAD on the OAI-PMH endpoint.
            description: |
                Runs the same logic as `GET /oai` (same handler) but the harvester
                receives only the response headers and HTTP status — no body. A
                malformed request still yields the matching status, e.g. an unknown
                `verb` returns 400.
            parameters:
                - name: verb
                  in: query
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: |
                        OAI-PMH service is available and the request succeeded; no body
                        is returned.
                "400":
                    description: |
                        OAI-PMH is disabled, or the request is malformed
                        (e.g. an unknown `verb`); no body is returned.
                "404":
                    description: |
                        Protocol-level not-found error (`idDoesNotExist`); no body is
                        returned.
                "500":
                    description: |
                        Internal failure while building the response; no body is
                        returned.
    /WebDAV/{collectionUuid}/{path}:
        x-path: /WebDAV
        description: |
            The **read/write** [WebDAV](http://www.webdav.org/specs/rfc4918.html)
            (RFC 4918) interface to **fylr**'s collections, mounted at
            `/api/v1/WebDAV`. Each WebDAV directory maps to a **fylr** collection;
            each WebDAV file maps to a file linked from that collection — so you can
            browse, download, upload, rename and delete a collection's files live.
            For the separate **drop-only** ingest share, see `/api/v1/hotfolder`
            below; the two are independent mounts with independent enable flags.

            Must be enabled in the base config (`webdav.read_write_access =
            true`), otherwise every request returns 503 with `code:
            WebdavNotEnabled`. The same flag gates both reading and writing.

            This endpoint performs **no client authentication** — the route is
            registered with no token check. Knowledge of the collection's UUID,
            which forms the path, is the only access capability: anyone who can
            reach the URL with a valid collection UUID can mount it. Clients must
            connect **as guest** and send no credentials — for example, in macOS
            Finder's *Connect to Server* dialog, choose *Connect As: Guest*. There
            is no Bearer-token, `X-Fylr-Authorization`, `access_token` or HTTP
            Basic authentication here; the only gate is whether WebDAV is enabled
            (above). Server-side, the operation acts as the owner of the target
            collection.

            **WebDAV methods.** `GET`, `HEAD`, `OPTIONS`, `POST`, `PUT` and `DELETE`
            are documented as operations below. The collection-specific WebDAV verbs
            — which the OpenAPI renderer cannot list as operations — behave as
            follows:

              * `PROPFIND` — the WebDAV directory listing: list a collection's
                contents. The `Depth` header must be `0` or `1` (`400` otherwise);
                the response is a `207` multistatus XML body.
              * `PROPPATCH` — accepted for client compatibility only; no properties
                are stored. It behaves like `PROPFIND` and echoes the current
                property values.
              * `MKCOL` — create a collection (`201`; idempotent — also `201` if the
                collection already exists). `409` when a parent in the path is
                missing or the path already exists as a file.
              * `MOVE` — rename a collection within its parent (`201`). `409` for a
                missing source, an existing destination, a non-collection target, or
                a cross-parent move; files cannot be moved.
              * `LOCK` / `UNLOCK` — WebDAV write locks. `LOCK` returns `200` (refresh)
                or `201` (new) with a `Lock-Token` header and an XML lock-discovery
                body; `UNLOCK` returns `204`. A token mismatch returns `423`.

            `COPY` is not supported and returns `405`. As with the operations below,
            every verb returns `503` with `code: WebdavNotEnabled` when WebDAV is
            disabled, and writes return `400` `ReadOnlyMode` in read-only mode.
        parameters:
            - name: collectionUuid
              in: path
              required: true
              schema:
                type: string
              description: |
                The first path segment is the collection UUID. The WebDAV URL of
                a collection (its `_hotfolder_upload_urls` entry of type
                `webdav`) ends in this UUID. A request to a bare collection UUID
                lists that collection.
            - name: path
              in: path
              required: true
              schema:
                type: string
              description: |
                Any further path segments after the collection UUID are the
                display names of sub-collections, ending in a file display name.
                May be empty to address the collection itself.
        get:
            summary: Download a file (or list a collection — depending on path).
            responses:
                "200":
                    description: |
                        For a file path: the file contents. For a directory path:
                        an HTML index page listing the entries.
                    content:
                        application/octet-stream:
                            schema:
                                type: string
                                format: binary
                        text/html:
                            schema:
                                type: string
                "404":
                    description: The path does not exist.
                "503":
                    description: |
                        WebDAV is disabled in the base config. The response carries
                        `code: WebdavNotEnabled`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WebdavError'
        head:
            summary: Probe a file's existence and metadata.
            responses:
                "200":
                    description: The file exists.
                "404":
                    description: The path does not exist.
                "503":
                    description: |
                        WebDAV is disabled in the base config (`code:
                        WebdavNotEnabled`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WebdavError'
        options:
            summary: Advertise the supported WebDAV methods for this resource.
            responses:
                "200":
                    description: |
                        The `DAV:`, `Allow:` and related headers describe what is
                        supported. Body is empty. Note that the advertised `Allow`
                        set lists COPY and PROPPATCH for client compatibility, even
                        though COPY returns 405 and PROPPATCH behaves like PROPFIND.
                "503":
                    description: |
                        WebDAV is disabled in the base config (`code:
                        WebdavNotEnabled`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WebdavError'
        post:
            summary: |
                WebDAV POST — handled by the same code path as GET/HEAD. fylr
                accepts it for client compatibility.
            responses:
                "200":
                    description: The POST was processed.
                "404":
                    description: The path does not exist.
                "503":
                    description: |
                        WebDAV is disabled in the base config (`code:
                        WebdavNotEnabled`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WebdavError'
        put:
            summary: Upload a file and link it to the collection.
            responses:
                "201":
                    description: |
                        The file was uploaded and linked to a new or existing object.
                        The response carries an `X-Fylr-System-Object-Id` header for
                        each affected object.
                "400":
                    description: |
                        The upload was rejected — a dot-prefixed filename (`code:
                        DotFilenameNotAllowed`), the collection has no upload
                        configured or no matching object (`code:
                        CollectionUploadNoObjectFound`), or the instance is in
                        read-only mode (`code: ReadOnlyMode`).
                "409":
                    description: |
                        A parent collection in the path does not exist, or the target
                        cannot be resolved.
                "423":
                    description: |
                        The resource is locked and the request did not carry the
                        matching lock token (`code: ResourceLocked`).
                "503":
                    description: |
                        WebDAV is disabled in the base config (`code:
                        WebdavNotEnabled`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WebdavError'
        delete:
            summary: Delete a file.
            responses:
                "200":
                    description: The resource was deleted.
                "400":
                    description: |
                        The instance is in read-only mode (`code: ReadOnlyMode`).
                "404":
                    description: The path does not exist.
                "423":
                    description: |
                        The resource is locked and the request did not carry the
                        matching lock token (`code: ResourceLocked`).
                "503":
                    description: |
                        WebDAV is disabled in the base config (`code:
                        WebdavNotEnabled`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WebdavError'
    /hotfolder/{collectionUuid}/{path}:
        x-path: /hotfolder
        description: |
            A **drop-only** ingest share at `/api/v1/hotfolder`, distinct from the
            read/write `/api/v1/WebDAV` mount above. Where `/WebDAV` maps WebDAV
            operations onto collections live, the hotfolder is a real on-disk
            staging directory (the API service's `WebDAVHotfolderPath`) served by
            the Go standard-library `webdav.Handler`. You **drop files in**; a
            background crawler imports each one into the matching collection and
            deletes it. You do **not** read a collection's records back through it.

            **Layout.** The on-disk directory holds one sub-directory per
            collection, named by the collection UUID, created automatically for
            every collection that accepts objects (`objects_allowed`). A file is
            therefore dropped at
            `/api/v1/hotfolder/{collectionUuid}/<...>/<filename>`. A file placed at
            the top level (no collection UUID) is ignored.

            **Ingestion.** A single crawler walks the directory and imports a file
            only once it has settled — its size and modification time must be
            unchanged for a configurable delay (15 s by default) — so half-written
            uploads are not grabbed. Empty files, dot-files and `hotfolder.log` are
            skipped; when both a JPEG and a non-JPEG of the same name are pending,
            the non-JPEG is imported first. On import the file is renamed to
            `IMPORTING-<name>`, uploaded into the collection identified by the UUID
            (creating a record / linked file, exactly as a `PUT` on the `/WebDAV`
            mount would), then deleted. The path below the collection UUID is kept
            as the stored file path; files in sub-directories are imported flat. A
            failed import is renamed to `ERROR-<name>` with a `<name>.log` beside
            it. Every attempt is appended as a TSV row to `hotfolder.log` inside the
            collection's directory, with columns `date`, `user`, `path`, `file`,
            `size`, `system_object_id`, `file_eas_id`, `status`, `msg`.

            **Enablement.** Served only when `webdav.hotfolder = true`, a hotfolder
            path is configured, and the instance runs a **single backend**;
            otherwise every request returns 503 with `code: WebdavNotEnabled`. This
            gate is independent of `webdav.read_write_access`.

            **Authentication.** As with `/WebDAV`, the share performs **no client
            authentication** — connect as guest and send no credentials. The import
            runs server-side as the owner of the target collection.

            Being a stdlib `webdav.Handler` it accepts the full WebDAV method set,
            but only `PUT` (drop a file) and `MKCOL` (create a sub-directory) do
            anything meaningful; `GET` / `PROPFIND` expose the on-disk staging area
            (files still pending, plus any `IMPORTING-` / `ERROR-` markers and
            `hotfolder.log`), never the collection's actual contents.
        parameters:
            - name: collectionUuid
              in: path
              required: true
              schema:
                type: string
              description: |
                The collection to ingest into — the name of its auto-created
                hotfolder sub-directory, which is the collection UUID. A file must
                be dropped under a collection UUID to be imported; files at the
                hotfolder root are ignored.
            - name: path
              in: path
              required: true
              schema:
                type: string
              description: |
                Any further path below the collection UUID. Sub-directories are
                allowed (the crawler imports their files flat); the final segment is
                the dropped file's name.
        put:
            summary: Drop a file into the collection's hotfolder for ingestion.
            description: |
                The file is written to the on-disk staging directory. It is imported
                into the collection — creating a record / linked file — by the crawler
                once it has settled, **not** synchronously with this request. Watch
                `hotfolder.log` in the collection directory, or the new objects in the
                collection, for the outcome.
            responses:
                "201":
                    description: The file was written to the staging directory.
                "204":
                    description: An existing staged file was overwritten.
                "503":
                    description: |
                        The hotfolder share is not enabled (`code: WebdavNotEnabled`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WebdavError'
        get:
            summary: |
                Read the on-disk staging area (not the collection's objects).
            responses:
                "200":
                    description: |
                        The bytes of a staged file, an `IMPORTING-`/`ERROR-` marker, or
                        `hotfolder.log`.
                    content:
                        application/octet-stream:
                            schema:
                                type: string
                                format: binary
                "404":
                    description: The path does not exist on disk.
                "503":
                    description: |
                        The hotfolder share is not enabled (`code: WebdavNotEnabled`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/WebdavError'
    /objects/{path}:
        x-path: /objects
        description: |
            **Deep link** access to a stored object or one of its files via a
            **structured path grammar** (not an opaque token). The path after
            `/objects/` is an ordered sequence of selectors that **fylr** parses
            segment by segment and resolves directly against the object store.

            Must be enabled in the base config
            (`system.deep_link_access.enabled`); when it is off every request
            returns 400 with `code: DeepLinkAccessDisabled`.

            No system right is required to call the endpoint and no token is
            mandatory: if the request carries a valid session that user is used,
            otherwise the request runs as the built-in `deep_link` system user.

            **Differs from easydb 5:** there is no `auth` query parameter. easydb 5
            documents an `auth` parameter to select the system user (`deep_link`,
            default, or `oai_pmh`); **fylr** always uses the session user and falls
            back only to the `deep_link` system user — `oai_pmh` cannot be selected
            here.

            Object-level rights are still enforced once the object is resolved —
            a caller lacking the object read right, or (when no `mask/<name>` is
            given) having no accessible mask, gets 403
            `ObjectInsufficientRights`, and a missing asset-download right on a
            `file/...` selector gets 403 `ObjectInsufficientAssetDownloadRight`.

            Exactly **one** object selector is required:

              * `id/<system-object-id>` — requires
                `system.deep_link_access.allow_access_by_id`.
              * `uuid/<uuid>`.
              * `column/<objecttype>/<column>/<value>` — requires
                `system.deep_link_access.allow_access_by_column`. A value that
                matches more than one object is rejected.

            **Differs from easydb 5:** the config keys are
            `system.deep_link_access.allow_access_by_id` and
            `...allow_access_by_column`. easydb 5 documents these as
            `allow_access_by_ids` (plural) and `allow_access_by_unique_columns`.

            Optional selectors (each at most once):

              * `mask/<mask-name>` — render through a named mask.
              * a version qualifier after an `id`/`uuid` object selector:
                `/latest` or `/version/<n>`.
              * a file selector: `file/standard/<n>`, `file/all/<n>`,
                `file/id/<n>`, or `file/column/<column>[/<nth>]`.
              * `file_browser/preferred` or `file_browser/<n>`.
              * `file_version/name/<name>` or `file_version/group/<group>`.
              * `format/<fmt>` (see below).
              * `disposition/inline` or `disposition/attachment`.

            Supported `format` values: `json` (the default when no `format` and
            no `file/...` selector are given), `xml_easydb`, `csv`, `html`,
            `xslt/<sheet-name>` (the sheet must be enabled for `/api/objects`),
            and `iiif` (only as `format/iiif/v3/manifest.json`, with no `file/...`
            selector). When a `file/...` selector is present and no `format` is
            given, the raw file bytes are served.

            **Differs from easydb 5:** **fylr** also serves `html` and `iiif`
            (`iiif/v3/manifest.json`). easydb 5 documents only `json`,
            `xml_easydb`, `xslt`, and `csv`.

            The response `Content-Type` is set by the chosen format or the
            underlying EAS file's MIME type.

            Examples:

              * `GET /api/v1/objects/id/42`
              * `GET /api/v1/objects/uuid/nes1/format/html`
              * `GET /api/v1/objects/column/keywords/keyword/Gold`
              * `GET /api/v1/objects/id/42/latest/file/all/1`
              * `GET /api/v1/objects/id/42/version/1/format/xslt/style1`
              * `GET /api/v1/objects/id/42/mask/images__all_fields/format/iiif/v3/manifest.json`
        parameters:
            - name: path
              in: path
              required: true
              schema:
                type: string
              description: |
                The structured deep-link selector path, e.g. `id/42`,
                `uuid/nes1/format/html`, `column/keywords/keyword/Gold`, or
                `id/42/latest/file/standard/1`. This is **not** an opaque token;
                each segment is a selector resolved directly against the object
                store.
            - name: disposition
              in: query
              required: false
              schema:
                type: string
                enum:
                    - inline
                    - attachment
              description: |
                Force the `Content-Disposition`. `attachment` forces a download;
                any other value (or absent) yields the default inline
                disposition. OR-ed with an in-path `disposition/attachment`
                selector — only the value `attachment` changes behavior as a
                query parameter.
        get:
            summary: Resolve a deep link and serve the underlying resource.
            responses:
                "200":
                    description: |
                        The deep link resolved successfully. The response body is the
                        object export (`json`/`xml_easydb`/`csv`/`html`/`xslt`/`iiif`)
                        or, with a `file/...` selector, the file's raw bytes. The
                        response carries `Cache-Control: no-cache, must-revalidate` and
                        a `Content-Type` matching the chosen format or the underlying
                        EAS file's MIME type. Pass `?disposition=attachment` (or an
                        in-path `disposition/attachment` selector) to force a download.
                    content:
                        '*/*':
                            schema:
                                type: string
                                format: binary
                "400":
                    description: |
                        The request cannot be served. `code: DeepLinkAccessDisabled`
                        when deep-link access is off in the base config;
                        `DeepLinkAccessByIdDisabled` / `DeepLinkAccessByColumnDisabled`
                        when the corresponding `allow_access_by_id` /
                        `allow_access_by_column` flag is off; `ApiObjectPath` when the
                        selector path is malformed or the addressed object / version /
                        column cannot be resolved; `FileVersionNotAvailable` /
                        `FileGroupNotAvailable` when a `file_version/...` selector has
                        no matching version.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ObjectsError'
                "403":
                    description: |
                        The resolved object cannot be served to this caller.
                        `code: ObjectInsufficientRights` when the user (the session
                        user, or the `deep_link` system user) lacks the object read
                        right, or — with no `mask/<name>` selector — has no accessible
                        mask for it;
                        `code: ObjectInsufficientAssetDownloadRight` when a `file/...`
                        selector resolves but the user lacks the asset-download right
                        for that file.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ObjectsError'
                "404":
                    description: |
                        A `file/...` selector resolved to a file whose stored bytes are
                        missing. The response carries `code: ResourceNotFound`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ObjectsError'
        head:
            summary: Probe a deep link without downloading the resource.
            description: |
                Identical resolution to `GET` (the same handler serves both
                methods); the response carries the headers only, without the body.
            responses:
                "200":
                    description: The deep link resolved successfully.
                "400":
                    description: |
                        The request cannot be served (deep-link access disabled,
                        access-by-id / access-by-column disabled, or a malformed /
                        unresolvable selector path). See the `GET` 400 for the `code`
                        values.
                "403":
                    description: |
                        The resolved object cannot be served to this caller
                        (`code: ObjectInsufficientRights` or
                        `ObjectInsufficientAssetDownloadRight`). See the `GET` 403.
                "404":
                    description: |
                        A `file/...` selector resolved to a file whose stored bytes are
                        missing (`code: ResourceNotFound`).
    /tags:
        description: |
            Manages the complete set of tag groups and tags. `GET` returns every
            taggroup and its tags and requires only an authenticated user; `POST`
            replaces the entire set from the request body, deleting any group or tag
            absent from it, writes the `taggroup` and `tag` tables directly in the
            request transaction (effective immediately, no working copy or commit
            step), and requires the `system.tagmanager` system right.
        post:
            summary: Create, update or delete taggroups and tags
            description: |
                Replaces the **entire** set of tag groups and tags. The request body is
                the complete desired list: groups and tags present are created or
                updated; any group or tag currently in the database but **absent** from
                the request is deleted. The change is written directly to the `taggroup`
                and `tag` tables in the request transaction and is effective immediately;
                there is no working copy and no separate commit step. Deletions of
                still-referenced tags either return a `202` (auto-removable contexts,
                confirm with `delete_policy=remove_tags`) or a `400 TagsInUse` (must be
                resolved manually first). Changing a tag's `_acl` re-validates affected
                collection objects; if that re-validation exceeds the time limit a `202`
                is returned offering to run it in the background (confirm with
                `background_invalid_acl=true`). Requires the `system.tagmanager` system
                right. Rejected with `400 ReadOnlyMode` while the server is in read-only
                mode.

                Differs from easydb 5: deleting a still-referenced tag is confirmed with
                `delete_policy=remove_tags` (auto-removable contexts) or rejected with
                `400 TagsInUse` (manual-resolution contexts), and the collection-ACL
                re-validation is confirmed with `background_invalid_acl`. easydb 5
                documents neither a `delete_policy` nor a `TagsInUse` error; its only
                documented confirmation parameter for this save is
                `collection_rights_policy`.
            tags:
                - tags
            parameters:
                - name: delete_policy
                  in: query
                  schema:
                    type: string
                    enum:
                        - remove_tags
                  description: |
                    Confirmation flag for deleting tags that are still referenced only in
                    contexts where **fylr** can clean them up automatically
                    (`collection.create_object`, `objecttype_tag`, `pool_tag`). The only
                    recognized value is `remove_tags`. Without it, such a deletion returns
                    `202` asking for confirmation; resend the identical request with
                    `delete_policy=remove_tags` to proceed (the tag is removed from those
                    contexts and deleted). It has no effect on tags referenced in
                    manual-resolution contexts (records, ACLs, column/mask filters,
                    workflows, right presets, baseconfig), which always return
                    `400 TagsInUse`.
                - name: background_invalid_acl
                  in: query
                  schema:
                    type: boolean
                  description: |
                    Confirmation flag for the collection re-validation that runs when a
                    tag's `_acl` changes. If the synchronous re-validation of the
                    affected collection objects exceeds the time limit, the request
                    returns a `202` asking for confirmation; resend the identical request
                    with `background_invalid_acl=true` to apply the change immediately and
                    schedule the re-validation as a background index job instead.
                - name: background_invalid_acl_timelimit
                  in: query
                  schema:
                    type: string
                  description: |
                    Overrides the time limit for the synchronous collection re-validation
                    (a Go duration string such as `30s`). When the limit is exceeded a
                    `202` is returned; see `background_invalid_acl`.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                $ref: '#/components/schemas/TagGroup'
            responses:
                "200":
                    description: Success
                "202":
                    description: |
                        Request must be resent and confirmed. Two situations produce this response:

                        - One or more tags that would be deleted are still referenced in places where they can be cleaned up automatically (`collection.create_object`, `objecttype_tag`, `pool_tag`), but an explicit confirmation is required. Resend the identical request with the query parameter `delete_policy=remove_tags` to confirm.
                        - A changed tag `_acl` triggered collection re-validation that exceeded the time limit. Resend the identical request with `background_invalid_acl=true` to apply the change and run the re-validation in the background.

                        The `tasks[].buttons[].name`/`value` of the returned payload name the query parameter to resend with.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagsPost202'
                "400":
                    description: |
                        The request could not be processed. The `code` field identifies which
                        validation rejected the request. Codes include `TagsInUse` (a tag to
                        be deleted is still referenced in a manual-resolution context),
                        `ReadOnlyMode` (server in read-only mode), the rights-validation codes
                        raised while checking each tag's `_acl` (`UnknownRight`,
                        `UnknownRightParam`, `UnknownRightValue`, `ChoiceNotUnique`, …), and
                        `ServerGeneric` for a malformed body or an unknown taggroup `type`
                        (only `checkbox` and `choice` are accepted).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TagsError'
