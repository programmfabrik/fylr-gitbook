    /collection/list/{parentId}:
        x-path: /collection/list
        description: |
            Retrieve the immediate children of the collection identified by
            `parentId`. Only collections the user has `BAG_READ` for are returned.
        get:
            summary: Retrieve all children of the given parent collection. This returns only the immediate children.
            description: |
                * Requires an authenticated user.
                * Only collections the user has `BAG_READ` permissions for are returned.
                * This call is slow for non-root users if there are many collections in the system.
            parameters:
                - name: offset
                  in: query
                  schema:
                    type: integer
                  description: The offset when requesting the collection list.
                - name: limit
                  in: query
                  schema:
                    type: integer
                  description: The limit when requesting the collection list. Default is _1000_.
                - name: parentId
                  in: path
                  required: true
                  schema:
                    type: string
                  description: |-
                    The parent id of the collection to list the children for. Use `null` to
                    retrieve collections without parent.
                - name: x-fylr-authorization
                  in: header
                  schema:
                    type: string
                  description: |
                    The access token in form of `Bearer <token>`. You can also use `authorization`
                    which does the same. `authorization` is looked at first.
                - name: authorization
                  in: header
                  schema:
                    type: string
                  description: |
                    The access token in form of `Bearer <token>`.
            responses:
                "200":
                    description: The list of collections.
                    content:
                        application/json:
                            schema:
                                description: |
                                    Array of collections.
                                type: array
                                items:
                                    type: object
                                    properties:
                                        collection:
                                            type: object
                                            properties:
                                                _id:
                                                    type: number
                                                    format: int64
                                                    minimum: 1
                                                    description: |
                                                        The `_id` is issued from the fylr "sequence" table when a collection is created.
                                                _id_parent:
                                                    type: number
                                                    format: int64
                                                    minimum: 1
                                                    nullable: true
                                                    description: |
                                                        The `_id_parent` can be set to link a collection as sub collection to
                                                        another. The `_owner` if a child collection will always be set to the
                                                        owner of the parent collection.
                                                _version:
                                                    type: number
                                                    format: int64
                                                    description: |
                                                        The `_version` of the collection created or updated. New collections
                                                        must be inserted using version _1_. Version updates must provide the
                                                        current version + 1. The server rejects updates / insert if the
                                                        version doesn't match the expected version.
                                                children_allowed:
                                                    type: boolean
                                                    description: |
                                                        Flag to indicate if this collection can have children or not. This
                                                        is to keep compability with easydb 5 and has no effect in **fylr**.
                                                objects_allowed:
                                                    type: boolean
                                                    description: |
                                                        Flag to indicate if this collection can have link objects or not.
                                                        This is to keep compability with easydb 5 and has no effect in
                                                        **fylr**.
                                                is_system_collection:
                                                    type: boolean
                                                    readOnly: true
                                                    description: |
