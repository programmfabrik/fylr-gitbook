                _two_factor_passkey_enrolled:
                    type: boolean
                    description: |
                        Read-only. True when the user has a passkey (WebAuthn) second factor
                        enrolled (ticket #78550).
                _two_factor_last_method:
                    type: string
                    enum:
                        - email
                        - totp
                        - passkey
                    description: |
                        Read-only. The two-factor method the user last completed; a returning
                        user is sent straight to it at login (switchable on the page).
                _two_factor_reset_totp:
                    type: boolean
                    description: |
                        Write-only action. Set `true` to clear the user's authenticator (TOTP)
                        enrollment, forcing re-enrollment at next login. Available to admins via
                        the user editor and to the user themselves via the settings dialog
                        (self-service). The user's other two-factor state is preserved across
                        normal edits.
                _two_factor_reset_passkey:
                    type: boolean
                    description: |
                        Write-only action like `_two_factor_reset_totp`, clearing the user's
                        passkey (WebAuthn) enrollment.
                _created_at:
                    type: string
                    format: date-time
                    description: UTC time the user was created.
                _updated_at:
                    type: string
                    format: date-time
                    description: UTC time the user was last updated.
                _archived_at:
                    type: string
                    format: date-time
                    description: |
                        UTC time the user was archived. Archived users cannot sign in
                        (login fails with `LoginUserArchived`) and cannot be modified.
                _last_seen_at:
                    type: string
                    format: date-time
                    description: UTC time of the user's most recent activity.
        SessionApi:
            type: object
            description: |
                A **session** descriptor — returned by `GET /api/v1/user/session`.
                Carries the access token, the authenticated user and their groups,
                the system rights they hold, available authentication methods, and
                instance-wide defaults the front end needs to render correctly.
            required:
                - access_token
            properties:
                access_token:
                    type: string
                    description: |
                        The session's access token. Use it as the `Bearer` token (or in
                        the `x-fylr-authorization` / `Authorization` header) for
                        subsequent requests.
                user:
                    $ref: '#/components/schemas/UserApi'
                groups:
                    type: array
                    items:
                        $ref: '#/components/schemas/GroupApi'
                    description: Groups the authenticated user belongs to.
                config:
                    type: object
                    additionalProperties: true
                    description: |
                        Per-session configuration block — feature flags, theme,
                        cache-id, and other values the front end consults at every page
                        load.
                frontend_language:
                    type: string
                    description: |
                        The user's preferred UI language as a BCP-47 tag (`de-DE`,
                        `en-US`, ...).
                database_locales:
                    type: array
                    items:
                        $ref: '#/components/schemas/LocaleApi'
                    description: |
                        Locales the user is allowed to edit data values in (a richer
                        view of `user.database_languages` with locale metadata).
                system_rights:
                    description: |
                        Resolved system-right map. Keys are right names
                        (`system.root`, `system.export`, ...); values describe the
                        effective grant.
                    allOf:
                        - $ref: '#/components/schemas/SystemRightsApi'
                authentication_methods:
                    type: array
                    items:
                        $ref: '#/components/schemas/SessionAuthenticationMethodApi'
                    description: |
                        The authentication methods this instance exposes for the
                        session.
                authenticated:
                    description: |
                        The authentication method the current session was established
                        with. Omitted for anonymous sessions.
                    allOf:
                        - $ref: '#/components/schemas/SessionAuthenticationMethodApi'
                frontend_locale:
                    description: |
                        Locale metadata (number format, calendar patterns) for the
                        user's `frontend_language`.
                    allOf:
                        - $ref: '#/components/schemas/LocaleApi'
                current_max_event_id:
                    type: integer
                    format: int64
                    description: |
                        The latest `_id` issued in the event log when the session was
                        built. Pass it as `fromEventId` to `/api/v1/event/poll/{fromEventId}`
                        to subscribe to subsequent events.
                instance:
                    type: object
                    additionalProperties: true
                    description: |
                        Instance-wide settings the front end needs on every page load
                        (display name, external URL, support address, version, ...).
        PoolApi:
            type: object
            x-recursion: true
            description: |
                A storage **pool** — fylr's hierarchical container for objects, ACL
                rules, tag policy and per-objecttype default masks.
            required:
                - _basetype
                - pool
            properties:
                _basetype:
                    type: string
                    enum:
                        - pool
                    description: Fixed marker identifying this object as a pool.
                pool:
                    type: object
                    description: The mutable pool data.
                    additionalProperties: true
                    properties:
                        _id:
                            type: integer
                            format: int64
                            description: Server-issued numeric id. Required for updates.
                        _version:
                            type: integer
                            format: int64
                        reference:
                            type: string
                            description: |
                                Optional unique reference. Lets clients address the pool by a
                                stable string identifier instead of `_id`.
                        name:
                            $ref: '#/components/schemas/LocaValue'
                        shortname:
                            $ref: '#/components/schemas/LocaValue'
                        _id_parent:
                            type: integer
                            format: int64
                            description: |
                                Parent pool id. `null`/absent for root pools. Creating or
                                re-parenting a pool under a parent requires the `bag_create`
                                right on that parent; other changes may require additional
                                BAG rights (`bag_write`, `bag_acl`). A non-root pool saved
                                without a parent is rejected with code `PoolNeedsParent`.
                        lookup:_id_parent:
                            description: |
                                Optional lookup descriptor for `_id_parent` — resolve the
                                parent pool by `reference` server-side.
                            allOf:
                                - $ref: '#/components/schemas/LookupByReference'
                        comment:
                            type: string
                            description: Free-text comment on the pool.
                        description:
                            description: Localized long description of the pool.
                            allOf:
                                - $ref: '#/components/schemas/LocaValue'
                        contact:
                            description: |
                                The pool's contact principal (user or group).
                            allOf:
                                - $ref: '#/components/schemas/WhoApi'
                        is_system_pool:
                            type: boolean
                            description: |
                                Read-only marker for built-in system pools. It cannot be set
                                or changed through the API — sending a value that creates or
                                changes it is rejected with code `UnableToSetIsSystemPool`.
                        watermark:
                            description: |
                                Watermark configuration applied to image variants produced
                                from objects in this pool. Changing it on save can trigger a
                                202 re-sync prompt (see the `confirm` parameter on POST/PUT).
                            allOf:
                                - $ref: '#/components/schemas/WatermarkApi'
                        caption:
                            description: |
                                Per-field caption configuration for objects in this pool.
                                Changing it on save can trigger a 202 re-sync prompt.
                            allOf:
                                - $ref: '#/components/schemas/CaptionByFieldApi'
                        janitor_policy:
                            description: |
                                Janitor (retention/clean-up) policy applied to objects in
                                this pool.
                            allOf:
                                - $ref: '#/components/schemas/JanitorPolicyApi'
                        custom_data:
                            type: object
                            additionalProperties: true
                            description: |
                                Custom-data values attached to the pool (per the datamodel's
                                pool customisation).
                        mapping_dc_export:
                            oneOf:
                                - type: string
                                - type: integer
                                  format: int64
                            description: |
                                Dublin-Core export mapping for the pool — a mapping
                                `reference` (string) or its numeric id.
                        mapping_image_export:
                            oneOf:
                                - type: string
                                - type: integer
                                  format: int64
                            description: |
                                Image-export mapping for the pool — a mapping `reference`
                                (string) or its numeric id.
                        mapping_image_import:
                            oneOf:
                                - type: string
                                - type: integer
                                  format: int64
                            description: |
                                Image-import mapping for the pool — a mapping `reference`
                                (string) or its numeric id.
                _has_children:
                    type: boolean
                    description: |
                        Read-only flag indicating that at least one sub-pool exists.
                        Useful for tree-view rendering without an extra query.
                _private_acl:
                    type: boolean
                    description: |
                        If true, this pool's ACL is private — it does not inherit ACL
                        items from its parent.
                _acl:
                    type: array
                    items:
                        $ref: '#/components/schemas/RightApi'
                    description: ACL grants on this pool.
                _generated_rights:
                    description: |
                        Read-only per-session derivation of the rights the requester
                        holds on this pool.
                    allOf:
                        - $ref: '#/components/schemas/GeneratedRightsApi'
                _private_transitions:
                    type: boolean
                    description: |
                        If true, this pool's transitions are private — sub-pools do not
                        inherit them.
                _transitions:
                    type: array
                    items:
                        $ref: '#/components/schemas/TransitionApi'
                    description: Workflow transitions exposed on this pool.
                _private_tags:
                    type: boolean
                    description: |
                        If true, this pool's tags are private — sub-pools do not inherit
                        them.
                _tags:
                    type: array
                    items:
                        $ref: '#/components/schemas/Tag'
                    description: Per-pool tag definitions (override the global tag set).
                _level:
                    type: integer
                    description: 0 for root pools, +1 for every descent into the tree.
                _path:
                    type: array
                    items:
                        $ref: '#/components/schemas/PoolApi'
                    description: |
                        Array of ancestor pools from the root to the immediate parent,
                        each rendered in the `standard` format. Useful for breadcrumbs.
                        The recursion is broken at render time via PoolApi's
                        `x-recursion: true` marker.
                _owner:
                    description: |
                        The pool's owner. The grant `who._owner: true` resolves to
                        this principal.
                    allOf:
                        - $ref: '#/components/schemas/WhoApi'
                _compiled_tags:
                    type: array
                    items:
                        $ref: '#/components/schemas/Tag'
                    description: |
                        Effective tag set — the merge of this pool's tags with the
                        inherited tags from ancestors. Each entry is rendered in the
                        standard tag format.
                _standard_masks:
                    type: object
                    additionalProperties:
                        type: array
                        items:
                            type: integer
                            format: int64
                    description: |
                        Per-objecttype default mask preference. Map of objecttype id to
                        an ordered array of mask ids. The first entry is the preferred
                        mask for that objecttype within this pool.
                _created_at:
                    type: string
                    format: date-time
                _updated_at:
                    type: string
                    format: date-time
            example:
                _basetype: pool
                pool:
                    _version: 1
                    lookup:_id_parent:
                        reference: system:root
                    reference: testpool
                    comment: horst
                    name:
                        de-DE: Testpool [DE]
                        en-US: Testpool [EN]
        EventApi:
            type: object
            description: |
                An **event** record. fylr writes events for almost every server-side
                mutation (object insert/update, collection changes, ACL changes,
                email sends, login, ...).
            required:
                - _basetype
                - event
            properties:
                _basetype:
                    type: string
                    enum:
                        - event
                    description: Fixed marker identifying this object as an event.
                event:
                    type: object
                    description: The event payload.
                    required:
                        - _id
                        - timestamp
                    properties:
                        _id:
                            type: integer
                            format: int64
                            description: |
                                Server-issued, monotonically-increasing event id. Used as the
                                cursor by `/api/v1/event/poll/{fromEventId}`.
                        type:
                            type: string
                            description: |
                                Event type, e.g. `COLLECTION_INSERT`, `OBJECT_UPDATE`,
                                `EMAIL_SENT`, `USER_LOGIN`. The full set is defined by
                                fylr and grows over time — clients should treat unknown
                                values as opaque.
                        object_id:
                            type: integer
                            format: int64
                            description: |
                                Object id (per-objecttype) the event relates to. Omitted for
                                system-level events.
                        object_version:
                            type: integer
                            format: int64
                            description: Object version at the time the event was written.
                        global_object_id:
                            type: string
                            description: |
                                Cross-objecttype identifier (`<objecttype>:<object_id>`).
                        system_object_id:
                            type: integer
                            format: int64
                            description: |
                                The fylr-internal `_system_object_id` (unique across all
                                objecttypes).
                        schema:
                            type: string
                            description: |
                                Datamodel schema the event was recorded under (`user`,
                                `system`, ...).
                        basetype:
                            type: string
                            description: |
                                The basetype of the affected entity (`object`, `collection`,
                                `user`, `group`, ...).
                        objecttype:
                            type: string
                            description: |
                                Objecttype name when `basetype: object`.
                        timestamp:
                            type: string
                            format: date-time
                            description: UTC time the event was written.
                        pollable:
                            type: boolean
                            description: |
                                Whether this event is surfaced through the long-poll / stream
                                endpoints (vs. only being available via `/event/list`).
                        info:
                            type: object
                            additionalProperties: true
                            description: |
                                Event-specific structured payload. The keys depend on `type`
                                — for example object events carry `field`, `old_value` and
                                `new_value`; email events carry `from`, `to` and `subject`.
                        remote_addr:
                            type: string
                            description: |
                                IP address of the request that produced the event, when
                                available.
                        user_generated_displayname:
                            type: string
                            description: |
                                Rendered display name of the user that produced the event
                                (snapshot at event time — does not update when the user's
                                display name later changes).
                user:
                    description: |
                        Snapshot of the user (or group) that produced the event.
                        Omitted for system-generated events.
                    allOf:
                        - $ref: '#/components/schemas/WhoApi'
        MessageApi:
            type: object
            description: |
                An internal **message** addressed to one or more user groups. Used by
                fylr to display admin notifications, maintenance announcements and
                release notes inside the front end.
            required:
                - _basetype
                - message
            properties:
                _basetype:
                    type: string
                    enum:
                        - message
                    description: Fixed marker identifying this object as a message.
                _groups:
                    type: array
                    items:
                        $ref: '#/components/schemas/GroupApi'
                    description: |
                        Groups the message is addressed to. Only users in at least one
                        of these groups see the message.
                message:
                    type: object
                    description: The mutable message payload.
                    required:
                        - title
                        - message
                    properties:
                        _id:
                            type: integer
                            format: int64
                            description: Server-issued numeric id. Required for updates.
                        _version:
                            type: integer
                            format: int64
                            description: |
                                Object version. Send `1` to create a new message. To update,
                                send the existing version + 1 together with `_id`; a mismatch
                                returns `VersionMismatch` (400).
                        webfrontend_props:
                            type: object
                            additionalProperties:
                                type: string
                            description: |
                                Free-form key/value pairs for the front end to consume
                                (display location, theme, dismiss button text override, ...).
                        webfrontend_type:
                            type: string
                            description: |
                                The front-end rendering kind (e.g. `banner`, `modal`,
                                `toast`).
                        confirm_every_version:
                            type: boolean
                            description: |
                                If true, a confirmation only counts for the exact `_version`
                                it was made on, so each new version must be confirmed again.
                                If false, any prior confirmation counts.
                        show_always:
                            type: boolean
                            description: |
                                If true, the message is shown on every page load until
                                confirmed (or until the `end_time` passes). For `show_always`
                                messages, a confirmation older than 60s is ignored so the
                                message reappears.
                        reference:
                            type: string
                            description: |
                                Optional unique reference. Useful when seeding messages from
                                tooling.
                        title:
                            $ref: '#/components/schemas/LocaValue'
                        message:
                            $ref: '#/components/schemas/LocaValue'
                        confirmation:
                            $ref: '#/components/schemas/LocaValue'
                        client_ids:
                            type: array
                            items:
                                type: string
                            description: |
                                Restrict the message to specific front-end client ids
                                (e.g. mobile app only). Empty means show in every client.
                        start_time:
                            type: object
                            nullable: true
                            properties:
                                value:
                                    type: string
                                    format: date-time
                            description: |
                                When the message becomes visible, wrapped as
                                `{ "value": <date-time> }`. Null/omitted means visible
                                immediately. The value is truncated to whole seconds (UTC).
                        end_time:
                            type: object
                            nullable: true
                            properties:
                                value:
                                    type: string
                                    format: date-time
                            description: |
                                When the message stops being visible, wrapped as
                                `{ "value": <date-time> }`. Null/omitted means visible until
                                confirmed. Truncated to whole seconds (UTC). Must not be
                                before `start_time` (else `StartTimeAfterEndTime`, 400).
                _created_at:
                    type: string
                    format: date-time
                _updated_at:
                    type: string
                    format: date-time
        PublishApi:
            type: object
            description: |
                A **publish record** — fylr's note that an object was published in an
                external system. fylr does not produce or host the publication itself;
                this entry links the object to the **collector** it was published
                through and to the external URL where the publication lives.
            required:
                - _basetype
                - publish
            properties:
                _basetype:
                    type: string
                    enum:
                        - publish
                    description: Fixed marker identifying this object as a publish.
                _timestamp_created:
                    type: string
                    format: date-time
                    description: UTC time the publish entry was created.
                publish:
                    type: object
                    required:
                        - system_object_id
                        - collector
                        - publish_uri
                        - easydb_uri
                    properties:
                        _id:
                            type: integer
                            format: int64
                            description: Server-issued numeric id.
                        version:
                            type: integer
                            format: int64
                            description: |
                                Optional. When set (> 0) the publication is pinned to that
                                exact object version; when omitted it tracks the object's
                                current version. Echoed in responses only when an exact
                                version was pinned. **fylr** performs no range validation on
                                this value.
                        system_object_id:
                            type: integer
                            format: int64
                            description: |
                                The `_system_object_id` of the object being published.
                        collector:
                            type: string
                            description: |
                                Name of the publish collector — must match a collector
                                configured in the base config (`internalname`), otherwise the
                                request is rejected with `PublishUnknownCollector`. Example:
                                `datacite`.
                        publish_uri:
                            type: string
                            description: |
                                The URL clients can use to reach the published artifact.
                                Stored verbatim (only surrounding whitespace is trimmed); fylr
                                does not validate it as a URI. Must be non-empty, else the
                                request is rejected with `PublishInvalidData`.
                        easydb_uri:
                            type: string
                            description: |
                                The URL clients can use to reach the source object inside
                                fylr (deep-link back into the editor). Stored verbatim (only
                                surrounding whitespace is trimmed); fylr does not validate it
                                as a URI. Must be non-empty, else the request is rejected with
                                `PublishInvalidData`.
            example:
                _basetype: publish
                publish:
                    system_object_id: 1
                    _id: 1
                    publish_uri: co456-9885
                    collector: datacite
                    easydb_uri: /api/objects/UUID/8
        ExportApi:
            type: object
            description: |
                An **export** — a long-running job that bundles a set of objects
                (and optionally their files) into a downloadable archive (TAR.GZ or
                ZIP).
            required:
                - _basetype
                - export
            properties:
                _basetype:
                    type: string
                    enum:
                        - export
                    description: Fixed marker identifying this object as an export.
                export:
                    type: object
                    description: The mutable export configuration.
                    required:
                        - type
                        - name
                        - search
                    additionalProperties: true
                    properties:
                        _id:
                            type: integer
                            format: int64
                        _version:
                            type: integer
                            format: int64
                        type:
                            type: string
                            enum:
                                - export
                                - export_incremental
                                - download
                            description: |
                                Export kind. `export` produces a fresh archive every run.
                                `export_incremental` only includes objects that changed since
                                the last run. `download` is a single-shot package.
                        name:
                            type: string
                            description: Human-readable name.
                        search:
                            description: |
                                The search descriptor that selects which objects to include
                                (same shape as `POST /api/v1/search`).
                            allOf:
                                - $ref: '#/components/schemas/SearchRequest'
                        fields:
                            type: object
                            description: |
                                Per-field export selection. Each KEY is a search/column
                                api-name (e.g. `objecttype.field`); unknown keys are rejected,
                                and the field's required merge depth must not exceed
                                `merge_max_depth`. Each VALUE is an object whose only
                                meaningful property is `display_name`.
                            additionalProperties:
                                type: object
                                additionalProperties: false
                                properties:
                                    display_name:
                                        type: string
                                        description: Optional display name for the exported field.
                        eas_fields:
                            type: object
                            description: |
                                Per-asset-field export options, keyed by an asset field's
                                api-name (`objecttype.field`). The key must resolve to a
                                `files`-type column within `merge_max_depth`.
                            additionalProperties:
                                $ref: '#/components/schemas/ExportEasField'
                        classes:
                            type: object
                            description: |
                                Per-file-class rendition defaults. Keyed by file class name
                                (e.g. `image`, `audio`, `video`); each value is the ordered
                                list of renditions emitted for every file of that class,
                                unless overridden per file via `assets`.
                            additionalProperties:
                                type: array
                                items:
                                    $ref: '#/components/schemas/ExportVersion'
                        assets:
                            type: object
                            description: |
                                Per-file override, keyed by file id. Each value is `true`
                                (use the class defaults), `false` (skip the file), or an
                                object selecting an explicit version list.
                            additionalProperties:
                                oneOf:
                                    - type: boolean
                                    - $ref: '#/components/schemas/ExportAsset'
                        csv:
                            description: |
                                CSV output configuration. Either the literal boolean `false`
                                (no CSV output) or a configuration object. Absent CSV is
                                echoed back as `false`.
                            oneOf:
                                - type: boolean
                                  enum:
                                    - false
                                - type: object
                                  additionalProperties: false
                                  properties:
                                    localized_column_names:
                                        type: boolean
                                        default: false
                                        description: |
                                            If true, column headers use localized display names
                                            instead of api-names.
                                    hierarchy:
                                        type: string
                                        nullable: true
                                        enum:
                                            - column
                                            - '>'
                                            - /
                                            - null
                                        default: null
                                        description: |
                                            How object hierarchy/path is rendered in a column.
                                            Empty string is treated as unset; any other value is
                                            rejected.
                                    include_changelog:
                                        description: |
                                            Either a boolean (legacy: true enables the changelog
                                            with user, false clears it) or an object.
                                        oneOf:
                                            - type: boolean
                                            - type: object
                                              additionalProperties: false
                                              properties:
                                                with_user:
                                                    type: boolean
                                                    default: false
                                                    description: If true, include the changelog user column.
                                    delimiter:
                                        type: string
                                        description: CSV field delimiter.
                                    quote:
                                        type: string
                                        description: CSV quote character.
                                    escape:
                                        type: string
                                        description: CSV escape character.
                                    use_bom:
                                        type: boolean
                                        default: false
                                        description: If true, prepend a UTF-8 BOM to the CSV file.
                        xml:
                            type: boolean
                            description: Whether to include an XML representation.
                        xml_one_file_per_object:
                            type: boolean
                            description: |
                                If true, every object becomes its own XML file; otherwise a
                                single XML containing all objects.
                        mapping:
                            default: easydb
                            description: |
                                XML mapping selection. `null` defaults to `easydb`. Accepts
                                the string aliases `easydb` / `easydb_flat`, or a numeric
                                mapping-profile id (a positive integer). Other values are
                                rejected.
                            oneOf:
                                - type: string
                                  enum:
                                    - easydb
                                    - easydb_flat
                                - type: integer
                                  format: int64
                                  description: Numeric XML mapping-profile id.
                        xslt_xml_post_processing:
                            type: object
                            additionalProperties: false
                            required:
                                - _id
                            description: |
                                XSLT post-processing applied to the rendered XML. References a
                                stylesheet file by id; that file must have a `.xsl` or `.xslt`
                                extension.
                            properties:
                                _id:
                                    type: integer
                                    format: int64
                                    description: File id of the XSLT stylesheet to apply.
                        xlsx:
                            description: |
                                XLSX (Excel) output configuration. Either the literal boolean
                                `false` (no XLSX output) or a configuration object. Absent
                                XLSX is echoed back as `false`.
                            oneOf:
                                - type: boolean
                                  enum:
                                    - false
                                - type: object
                                  additionalProperties: false
                                  properties:
                                    localized_column_names:
                                        type: boolean
                                        default: false
                                        description: |
                                            If true, column headers use localized display names
                                            instead of api-names.
                                    hierarchy:
                                        type: string
                                        nullable: true
                                        enum:
                                            - column
                                            - '>'
                                            - /
                                            - null
                                        default: null
                                        description: |
                                            How object hierarchy/path is rendered in a column.
                                            Empty string is treated as unset; other values are
                                            rejected.
                                    include_changelog:
                                        description: |
                                            Either a boolean (legacy) or an object enabling the
                                            changelog.
                                        oneOf:
                                            - type: boolean
                                            - type: object
                                              additionalProperties: false
                                              properties:
                                                with_user:
                                                    type: boolean
                                                    default: false
                                                    description: If true, include the changelog user column.
                                    include_thumbnail:
                                        type: boolean
                                        default: false
                                        description: If true, embed object thumbnails in the XLSX output.
                        json:
                            type: boolean
                            description: Whether to include a JSON representation.
                        json_one_file_per_object:
                            type: boolean
                            description: |
                                If true, every object becomes its own JSON file; otherwise a
                                single JSON containing all objects.
                        merge_linked_objects:
                            type: string
                            enum:
                                - none
                                - in_main_search
                                - not_in_main_search
                                - not_in_main_search_unless_reverse
                                - all
                            description: |
                                Controls whether (and how) objects linked from the main
                                search result are pulled into the export.
                        merge_max_depth:
                            type: integer
                            description: |
                                Maximum recursion depth when following linked objects.
                        include_parents:
                            type: boolean
                            description: |
                                If true, include parent objects when an included object
                                references a parent.
                        file_url_expire_days:
                            type: integer
                            description: |
                                Number of days the file URLs embedded in the export remain
                                valid. Defaults to a server-side setting.
                        produce_options:
                            type: object
                            additionalProperties: true
                            description: |
                                Options for the export *producer*. Only the reserved key
                                `plugin` is interpreted by fylr; every other key is passed
                                through verbatim to the selected producer. `plugin` selects
                                the producer: a value containing a colon is resolved as
                                `<plugin-name>:<callback-name>` against the loaded plugins
                                (callback type `export`); a value without a colon is an
                                internal producer name (`json`, `xml`, `csv`, `file`, `iiif`,
                                `html`, `xlsx`). A non-string `plugin` is rejected.
                            properties:
                                plugin:
                                    type: string
                                    description: |
                                        Producer selector. `<plugin>:<callback>` resolves a plugin
                                        export callback; a colon-less value is an internal
                                        producer name.
                            example:
                                plugin: my-plugin:my_export
                        all_languages:
                            type: boolean
                            default: false
                            description: |
                                If true, export all configured languages for localized fields
                                instead of only the standard/requested languages.
                        file_metadata:
                            type: boolean
                            default: false
                            description: If true, include file (asset) metadata in the export output.
                        no_inheritance:
                            type: boolean
                            default: false
                            description: |
                                If true, do not resolve inherited field values; exported
                                objects carry only their own field values.
                        batch_size:
                            type: integer
                            format: int32
                            nullable: true
                            minimum: 0
                            maximum: 10000
                            default: null
                            description: |
                                Number of objects processed per batch. `null` (or omitted)
                                means no explicit batch size. When set it must be between 0
                                and 10000 inclusive, otherwise the save is rejected.
                        flat:
                            type: boolean
                            default: false
                            description: Flat-output flag.
                        filename_original:
                            type: boolean
                            default: false
                            description: |
                                If true, exported files keep their original filename. Mutually
                                exclusive with `filename_template`.
                        filename_template:
                            type: string
                            nullable: true
                            default: null
                            description: |
                                Template used to build exported filenames. Mutually exclusive
                                with `filename_original`.
                _date_created:
                    type: string
                    format: date-time
                    description: UTC time the export was created.
                _last_updated_at:
                    type: string
                    format: date-time
                    description: UTC time the export configuration was last updated.
                _last_run_at:
                    type: string
                    format: date-time
                    description: UTC time the most recent production run started.
                _last_relevant_object_count:
                    type: integer
                    description: |
                        Number of objects included in the most recent run that had at
                        least one change since the previous run.
                _last_relevant_run_at:
                    type: string
                    format: date-time
                    description: |
                        UTC time of the most recent run that actually produced output
                        (vs. a run that found nothing new).
                _next_run_at:
                    type: string
                    format: date-time
                    description: |
                        UTC time the next scheduled run is expected. Set by the
                        `_schedules` entries.
                _state:
                    type: string
                    enum:
                        - new
                        - pending
                        - processing
                        - done
                        - done_with_warnings
                        - failed
                    description: |
                        Current export run state. `new` after create/update; `pending`
                        once a run is scheduled; `processing` while a run is active;
                        `done` / `done_with_warnings` on success; `failed` on error or
                        after a stop.
                _plugin_log:
                    type: array
                    items:
                        type: string
                    description: |
                        Lines of plugin-emitted log output captured during the most
                        recent run. Cleared at the start of each run.
                _files:
                    type: array
                    description: |
                        Produced artifact files of the most recent run. Hidden files are
                        omitted from regular (non-plugin) API output.
                    items:
                        type: object
                        additionalProperties: false
                        required:
                            - path
                            - date_created
                        properties:
                            path:
                                type: string
                                description: |
                                    URL-path-escaped relative path of the produced file inside
                                    the export package.
                            size:
                                type: integer
                                format: int64
                                description: |
                                    File size in bytes. Omitted when the size is unknown (e.g.
                                    files produced on the fly); a missing `size` therefore means
                                    "unknown", distinct from a real 0.
                            date_created:
                                type: string
                                format: date-time
                                description: Creation timestamp (RFC3339).
                _log:
                    type: array
                    items:
                        $ref: '#/components/schemas/EventApi'
                    description: |
                        Per-run event log — start/stop, validation failures, transport
                        results.
                _transports:
                    type: array
                    description: |
                        Configured delivery transports and their per-transport result.
                        Round-trips between request and response.
                    items:
                        type: object
                        additionalProperties: false
                        required:
                            - plugin
                            - options
                        properties:
                            plugin:
                                type: string
                                description: |
                                    Transport selector. Empty string for an internal/download
                                    transport, otherwise `<plugin>:<callback>`.
                            options:
                                type: object
                                additionalProperties: true
                                description: |
                                    Free-form transport options whose accepted keys depend on
                                    the selected transport plugin. Secret values are hidden on
                                    output; an absent options object is rendered as `{}`.
                            email:
                                type: object
                                additionalProperties: false
                                description: |
                                    Email-delivery settings. Present only when a message or
                                    recipients exist.
                                properties:
                                    message:
                                        type: string
                                        description: Optional email body message.
                                    recipients:
                                        type: array
                                        description: User/group recipients.
                                        items:
                                            $ref: '#/components/schemas/WhoApi'
                            external_url:
                                type: string
                                description: External download URL for the transport (set server-side).
                            uuid:
                                type: string
                                description: |
                                    Transport UUID. Auto-assigned for pure download transports;
                                    may also be supplied on input and is used to log in to the
                                    export.
                _schedules:
                    type: array
                    items:
                        $ref: '#/components/schemas/ScheduleApi'
                    description: |
                        Schedules controlling automatic re-runs of the export. Same
                        shape as `user.mail_schedule`.
        PresetApi:
            type: object
            description: |
                A **right preset** — a reusable bundle of ACL grants (and an optional
                tag filter) that can be applied to objects or collections. Presets
                live per context (`object` or `collection`).
            required:
                - _basetype
                - right_preset
            properties:
                _basetype:
                    type: string
                    enum:
                        - right_preset
                    description: Fixed marker identifying this object as a right preset.
                right_preset:
                    type: object
                    required:
                        - preset
                    properties:
                        _id:
                            type: integer
                            format: int64
                            description: Server-issued numeric id. Required for updates.
                        _version:
                            type: integer
                            format: int64
                        _position:
                            type: integer
                            description: |
                                Display position. Lower positions render before higher ones
                                in the preset picker.
                        displayname:
                            $ref: '#/components/schemas/LocaValue'
                        description:
                            $ref: '#/components/schemas/LocaValue'
                        preset:
                            type: object
                            description: The actual permission bundle this preset represents.
                            properties:
                                default_expiration_hours:
                                    type: integer
                                    format: int64
                                    description: |
                                        How many hours after the preset is applied the granted
                                        ACL items expire. If null, grants are permanent until
                                        revoked.
                                rights:
                                    type: object
                                    description: |
                                        The right items the preset grants. Keys are right names
                                        (`read`, `write`, `delete`, `acl`, ...); each value is
                                        a RightItemApi (same per-right configuration shape used
                                        inside RightApi.rights).
                                    additionalProperties:
                                        $ref: '#/components/schemas/RightItemApi'
                                tagfilter:
                                    description: |
                                        Optional tag-filter that restricts which objects this
                                        preset can apply to (e.g. only objects tagged
                                        `confidential`).
                                    allOf:
                                        - $ref: '#/components/schemas/TagfilterApi'
                _created_at:
                    type: string
                    format: date-time
                _updated_at:
                    type: string
                    format: date-time
        BackupApi:
            type: object
            description: |
                A **backup** descriptor — a record of a single backup run produced by
                `PUT /api/v1/system/backup/new`.
            required:
                - id
                - created_at
                - status
            properties:
                id:
                    type: integer
                    format: int64
                    description: Server-issued numeric id.
                created_at:
                    type: string
                    format: date-time
                    description: UTC time the backup was created.
                finished_at:
                    type: string
                    format: date-time
                    description: |
                        UTC time the backup completed. Null while the backup is still
                        running.
                create_user:
                    description: |
                        The user that triggered the backup. Omitted for backups
                        triggered by the scheduler.
                    allOf:
                        - $ref: '#/components/schemas/WhoApi'
                status:
                    type: string
                    enum:
                        - running
                        - done
                        - error
                    description: |
                        Current backup state — `running`, `done`, `error`.
                stats:
                    description: |
                        Stats captured at the end of the run — file size, MIME type
                        and file name of the produced artifact.
                    allOf:
                        - $ref: '#/components/schemas/BackupStatsApi'
                opts:
                    description: |
                        The options the backup was started with — format and whether
                        the event log was included.
                    allOf:
                        - $ref: '#/components/schemas/BackupOptsApi'
                log:
                    type: array
                    items:
                        type: object
                        properties:
                            created_at:
                                type: string
                                format: date-time
                            msg:
                                type: string
                        required:
                            - created_at
                            - msg
                    description: Per-run log lines emitted by the backup pipeline.
        LocationApi:
            type: object
            description: |
                A **storage location** descriptor — an external bucket where fylr
                reads / writes files. Used by `/api/v1/system/location*` and
                surfaced read-only on every file download via the
                `X-Fylr-Storage-Location` response header.
            required:
                - id
                - kind
            properties:
                id:
                    type: integer
                    format: int64
                    description: |
                        Server-issued numeric id. On create, must be set to the same
                        value that appears in the URL `/system/location/{id}` (or
                        `0` for `POST /system/location/new`).
                created_at:
                    type: string
                    format: date-time
                    description: UTC time the location was created.
                name:
                    type: string
                    description: |
                        Human-readable label.
                kind:
                    type: string
                    enum:
                        - file
                        - s3
                        - azure
                    description: |
                        Storage driver — `file` (local disk), `s3` (AWS / S3-compatible),
                        or `azure` (Azure Blob Storage). Selects which `config` shape
                        (`file` / `s3` / `azure`) is expected.
                prefix:
                    type: string
                    description: |
                        Optional bucket prefix — every key written to the location is
                        prepended with it. Usually ends in `/`.
                config:
                    type: object
                    additionalProperties: true
                    description: |
                        Driver-specific configuration. Secrets (access keys, account
                        passwords, ...) are removed on read; they must be supplied
                        again on update.
                allow_purge:
                    type: boolean
                    description: |
                        Whether `POST /api/v1/system/purgeall` may delete files from
                        this location. Disable to keep an archival location intact.
                allow_redirect:
                    type: boolean
                    description: |
                        Whether file downloads from this location may use HTTP
                        `Location:` redirects (for remote buckets with their own URL
                        signers).
                read_only:
                    type: boolean
                    description: |
                        Whether this location accepts writes. If true, new files are
                        sent to the next writable location and only reads come from
                        here.
                status:
                    type: string
                    enum:
                        - connected
                        - not accessible
                        - error
                        - closed
                    description: |
                        Read-only connection state — `connected`, `not accessible`,
                        `error`, `closed`.
                status_msg:
                    type: string
                    description: |
                        Read-only diagnostic message attached to a non-`connected`
                        `status` — usually the underlying error from the driver.
        TransitionApi:
            type: object
            description: |
                A **workflow transition** descriptor — one rule in the
                admin-managed transition set. `GET` / `POST /api/v1/transitions`
                read and replace this set; the rules themselves fire implicitly
                through the object pipeline (insert / update / delete / tag), not
                via a separate call.
            example:
                type: process
                operations:
                    - INSERT
                    - UPDATE
                sticky: false
                objecttype_ids:
                    - 1
                actions:
                    - type: set_tags
                      info:
                        tags:
                            - _id: 5
                              set: true
                who:
                    - _basetype: user
                      user:
                        _id: 1
            required:
                - type
            properties:
                _id:
                    type: integer
                    format: int64
                    description: Server-issued numeric id.
                type:
                    type: string
                    enum:
                        - resolve
                        - reject
                        - exit_resolve
                        - exit_reject
                        - process
                    description: |
                        Transition kind. One of `resolve`, `reject`, `exit_resolve`,
                        `exit_reject`, `process`. Any other value is rejected with a
                        `ServerGeneric` error (HTTP 400).
                operations:
                    type: array
                    items:
                        type: string
                        enum:
                            - INSERT
                            - UPDATE
                            - DELETE
                    description: |
                        Object-pipeline operations the transition runs on. Each item is
                        one of `INSERT`, `UPDATE`, `DELETE` (uppercase). An empty array
                        is allowed and disables the transition. Any other value is
                        rejected with a `ServerGeneric` error (HTTP 400).

                        Differs from easydb 5: easydb 5 requires a non-empty array;
                        **fylr** accepts an empty array (which disables the transition).
                comment:
                    type: string
                    description: |
                        Admin-facing comment / note (not user-visible).

                        Differs from easydb 5: this field does not exist in easydb 5; it
                        is a **fylr** addition.
                confirm:
                    description: |
                        Confirmation prompt shown to the user before the transition
                        executes. Optional — empty for transitions that do not require
                        explicit confirmation.
                    allOf:
                        - $ref: '#/components/schemas/LocaValue'
                sticky:
                    type: boolean
                    description: |
                        Boolean flag stored on the transition and round-tripped
                        verbatim by this endpoint.
                who_not:
                    type: boolean
                    description: |
                        If true, the `who` list is interpreted as a deny-list instead
                        of an allow-list — every user EXCEPT those in `who` can
                        invoke the transition.

                        Differs from easydb 5: this field does not exist in easydb 5; it
                        is a **fylr** addition.
                objecttype_ids:
                    type: array
                    items:
                        type: integer
                        format: int64
                    description: |
                        Object types the transition applies to. Empty means it
                        applies to every object type.
                tagfilter:before:
                    description: |
                        Tagfilter the target object must satisfy BEFORE the transition
                        runs. The optional `changed` slot — set only on transitions —
                        identifies the tags whose addition / removal should *trigger*
                        the transition.
                    allOf:
                        - $ref: '#/components/schemas/TagfilterApi'
                tagfilter:after:
                    description: |
                        Tagfilter the target object will satisfy AFTER the transition
                        runs (used by the engine to enforce the post-condition).
                    allOf:
                        - $ref: '#/components/schemas/TagfilterApi'
                actions:
                    type: array
                    items:
                        type: object
                        required:
                            - type
                            - info
                        properties:
                            type:
                                type: string
                                description: |
                                    Action discriminator. Built-in values: `set_tags`,
                                    `change_owner`, `email`, `webhook`. Any other string is
                                    routed to a plugin action runner (e.g.
                                    `fylr_example:set_comment`).

                                    Differs from easydb 5: `change_owner` is a **fylr**
                                    addition (easydb 5's built-in actions are only `set_tags`,
                                    `email`, and `webhook`, plus plugin actions).
                            info:
                                type: object
                                additionalProperties: true
                                description: |
                                    Type-specific parameters. Shapes for built-in types:
                                    `set_tags` -> `{"tags":[{"_id":<tag id>,"set":true|false}]}`;
                                    `change_owner` -> `{"owner":<WhoApi>}`;
                                    `email` -> `{"subject":<LocaValue>,"message":<LocaValue>,"batchable":<bool>,"recipients":[<WhoApi>]}`;
                                    `webhook` -> `{"name":<configured webhook name>,"callback":"pre_save"|"after_commit_async"}`
                                    (callback defaults to `after_commit_async`).
                                    Plugin action types carry whatever the plugin declares.
                    description: |
                        Ordered list of actions the transition performs. Each action is
                        `{type, info}`; the parameters live under `info`, not at the top
                        level.
                who:
                    type: array
                    items:
                        $ref: '#/components/schemas/WhoApi'
                    description: |
                        Users / groups that may invoke this transition (or, if
                        `who_not` is true, the deny-list). Same shape as the `who`
                        slot on RightApi grants.
        SchemaApi:
            type: object
            description: |
                A fylr **datamodel** snapshot at a specific version — the JSON-Schema
                view that `/api/db` and `/api/search` validate against.

                This is the shape `GET /api/v1/schema/user/{version}` returns when
                the `format` query parameter is unset (or any value other than `svg`
                / `png`).
            required:
                - version
                - type
                - tables
            properties:
                version:
                    type: integer
                    format: int64
                    description: |
                        The datamodel version this snapshot represents. Every datamodel
                        record carries a version — HEAD's version equals the version a
                        future commit would produce. To distinguish HEAD from a committed
                        snapshot, check `committed_at` (null on HEAD).
                based_on_version:
                    type: integer
                    format: int64
                    description: |
                        The committed datamodel version this snapshot derives from. For
                        a committed version, equals `version - 1`. For `HEAD`, the last
                        committed version this working copy was forked off.
                based_on_base_version:
                    type: integer
                    format: int64
                    description: |
                        The base-version (pre-customisation) the snapshot derives from.
                        Used by upgrades to track the upstream baseline separately from
                        per-instance edits.
                max_table_id:
                    type: integer
                    format: int64
                    description: |
                        Highest `table_id` used in this snapshot. New tables added in a
                        subsequent edit start at `max_table_id + 1`.
                max_column_id:
                    type: integer
                    format: int64
                    description: |
                        Highest column id used in this snapshot. New columns added in a
                        subsequent edit start at `max_column_id + 1`.
                type:
                    type: string
                    enum:
                        - user
                    description: |
                        Always `user` — the user-defined datamodel. (fylr also has a
                        `system` datamodel; that one is not exposed through /schema.)
                tables:
                    type: array
                    items:
                        $ref: '#/components/schemas/SchemaTableApi'
                    description: |
                        The objecttypes (tables) in this datamodel. Each entry is a
                        `SchemaTableApi`. Which entries are present is
                        **instance-dependent** — it reflects the customer's actual
                        objecttypes (`picture`, `event`, `person`, ...).
        SchemaTableApi:
            type: object
            description: |
                A single **objecttype** (table) within a datamodel snapshot. Each
                entry in `SchemaApi.tables` is one of these.
            required:
                - name
                - table_id
                - columns
            properties:
                name:
                    type: string
                    description: |
                        Stable, machine-readable name of the objecttype (used as the
                        `{objecttype}` path parameter on `/api/v1/db/{objecttype}` and
                        as the key on `/api/v1/objecttype/{id}`).
                table_id:
                    type: integer
                    format: int64
                    description: |
                        Server-issued numeric id, unique within the datamodel. Survives
                        renames of the objecttype.
                pool_link:
                    type: boolean
                    description: |
                        If true, objects of this type live inside a pool — their `_pool`
                        property identifies the containing pool. If false, objects are
                        not pool-scoped (instance-global).
                owned_by:
                    description: |
                        When present, this table is a nested table — records ship
                        embedded inside top-level objects of the objecttype the
                        descriptor's `other_table_id` points at, and have no
                        independent ACL or owner. Absent on regular top-level
                        objecttypes.
                    allOf:
                        - $ref: '#/components/schemas/OwnedByApi'
                acl_table:
                    type: boolean
                    description: |
                        If true, objects of this type carry their own `_acl` and
                        respect per-object ACL grants. If false, ACL inheritance from
                        the parent pool / collection applies.
                has_tags:
                    type: boolean
                    description: |
                        If true, objects of this type accept `_tags` (tag references).
                        The available tags come from `/api/v1/tags`.
                is_hierarchical:
                    type: boolean
                    description: |
                        If true, this objecttype forms a **single-parent** tree —
                        each object can have at most one parent via `_id_parent`.
                        Mutually exclusive with `polyhierarchical`.
                polyhierarchical:
                    type: boolean
                    description: |
                        If true, this objecttype forms a **DAG** — each object can
                        have any number of parents, exposed through the
                        `_object_parents` system column. Mutually exclusive with
                        `is_hierarchical`; also incompatible with `acl_table: true`
                        (the datamodel validator rejects both combinations).
                in_main_search:
                    type: boolean
                    description: |
                        If true, objects of this type are indexed into the main search
                        index and surface in `/api/v1/search` results by default.
                comment:
                    type: string
                    description: Admin-facing comment — not user-visible.
                columns:
                    type: array
                    items:
                        $ref: '#/components/schemas/ColumnApi'
                    description: |
                        Ordered list of columns. The order matters for default rendering
                        in masks that don't explicitly reorder.
                foreign_keys:
                    type: array
                    items:
                        $ref: '#/components/schemas/ForeignKeyApi'
                    description: |
                        Foreign-key declarations on this table — references to other
                        objecttypes' records used to look up linked data.
                unique_keys:
                    type: array
                    items:
                        $ref: '#/components/schemas/UniqueKeyApi'
                    description: |
                        Unique-key constraints. Violations surface as
                        `DatabaseUniqueKeyViolation` on `POST /api/v1/db/{objecttype}`.
                bidirectional:
                    type: array
                    items:
                        $ref: '#/components/schemas/BidirectionalApi'
                    description: |
                        Bidirectional-link declarations — pairs of columns on different
                        objecttypes that mirror each other (writing the link on one side
                        automatically materialises the reverse link on the other).
        ObjecttypeApi:
            type: object
            description: |
                An **objecttype** descriptor — fylr's per-record-type configuration
                layered on top of the datamodel definition: per-objecttype default
                masks, exposure flags (frontend menus, collections, facets), ACL
                rules, tags, transitions, mask / column filters, asset filename
                policy, watermark and janitor (cleanup) policy.

                Returned by `/api/v1/objecttype` and `/api/v1/objecttype/{id}`. The
                same shape is accepted as the request body of `POST /api/v1/objecttype`
                (only the fields the requester is allowed to mutate are honoured).
            required:
                - _basetype
                - objecttype
            properties:
                _basetype:
                    type: string
                    enum:
                        - objecttype
                    description: Fixed marker identifying this object as an objecttype.
                objecttype:
                    type: object
                    description: The mutable objecttype data.
                    properties:
                        _id:
                            type: integer
                            format: int64
                            description: |
                                Server-issued numeric id of the objecttype. Required for
                                updates. Stable across renames of `name`.
                        _version:
                            type: integer
                            format: int64
                            description: Version; increment on each update.
                        name:
                            type: string
                            description: |
                                Stable, machine-readable name (used as the `{objecttype}`
                                path parameter on `/api/v1/db/{objecttype}`).
                        contact:
                            type: object
                            nullable: true
                            description: |
                                Vestigial field. Not backed by any objecttype storage: it is
                                always returned as `null` and ignored on `POST`. (Unlike the
                                pool's `contact`, this is never resolved to a user / group.)
                        mapping_image_export:
                            description: |
                                Reference to the image-export mapping: either the integer id
                                of a mapping, or the string `"none"`. Returned as `"none"`
                                when no mapping is set; any other value is rejected.
                        mapping_image_import:
                            description: |
                                Reference to the image-import mapping: either the integer id
                                of a mapping, or the string `"none"`. Returned as `"none"`
                                when no mapping is set; any other value is rejected.
                        mapping_image_import_recipe_configs:
                            description: |
                                Per-recipe configuration for the image-import mapping. Only
                                accepted when `mapping_image_import` names a mapping (not
                                `"none"`).
                            allOf:
                                - $ref: '#/components/schemas/RecipeConfigs'
                        mapping_dc_export:
                            description: |
                                Reference to the Dublin Core export mapping: either the
                                integer id of a mapping, or the string `"none"`. Returned as
                                `"none"` when no mapping is set; any other value is rejected.
                        show_in_collections:
                            type: boolean
                            description: |
                                Whether objects of this type can be linked into collections.
                        show_in_facet_grouping:
                            type: boolean
                            description: |
                                Whether the type appears as a top-level facet in the search
                                UI's grouping.
                        show_in_main_menu_with_icon:
                            type: string
                            description: |
                                Icon name to show next to the objecttype entry in the
                                front-end main menu. Empty / null suppresses the entry.
                        empty_placeholder_icon:
                            type: string
                            description: |
                                Icon shown in the detail view when an object of this type
                                has no file attached.
                        standard_numbering:
                            type: string
                            description: |
                                Legacy field. Present in the response (always empty) and
                                accepted in a `POST` body, but the value is ignored — it is
                                never stored or applied.
                        description:
                            $ref: '#/components/schemas/LocaValue'
                        custom_data:
                            type: object
                            additionalProperties: true
                            description: |
                                Custom-data values attached to the objecttype itself (per
                                the datamodel's objecttype customisation).
                        watermark:
                            description: |
                                Watermark configuration applied to image variants produced
                                from objects of this type.
                            allOf:
                                - $ref: '#/components/schemas/WatermarkApi'
                        caption:
                            description: |
                                Per-field caption configuration burned into image variants
                                produced for objects of this type. Keys are field names on
                                the objecttype.
                            allOf:
                                - $ref: '#/components/schemas/CaptionByFieldApi'
                        janitor_policy:
                            description: |
                                Per-objecttype retention / purge policy enforced by the
                                janitor. Same shape as the pool-level janitor policy.
                            allOf:
                                - $ref: '#/components/schemas/JanitorPolicyApi'
                _standard_masks:
                    type: array
                    items:
                        type: integer
                        format: int64
                    nullable: true
                    description: |
                        Ordered list of mask ids to prefer when rendering objects of
                        this type. The first entry is the default mask. `null` (rather
                        than an empty array) signals "no preference defined" — the
                        datamodel's standard mask is then used.
                _export_asset_filenames:
                    type: object
                    additionalProperties:
                        $ref: '#/components/schemas/LocaValue'
                    description: |
                        Per-field filename templates used when exporting assets. Each key
                        is the full api name of a field on this objecttype that is either
                        a files column or a link to an objecttype that has files; an
                        unknown field is rejected with `UnknownField`, a field of any
                        other type with `UnsupportedFieldType`. The value is the
                        localised filename template (placeholders come from
                        `_filename_replacements`). Empty templates are dropped on save.
                _acl:
                    type: array
                    items:
                        $ref: '#/components/schemas/RightApi'
                    description: |
                        ACL grants on this objecttype — typically the
                        `objecttype.read` / `objecttype.write` / `objecttype.delete`
                        rights.
                _private_transitions:
                    type: boolean
                    description: |
                        If true, transitions configured directly on this objecttype do
                        not inherit transitions from the parent pool / global.
                _transitions:
                    type: array
                    items:
                        $ref: '#/components/schemas/TransitionApi'
                    description: Workflow transitions exposed on this objecttype.
                _private_tags:
                    type: boolean
                    description: |
                        If true, the tag set configured on this objecttype shadows the
                        inherited tags (does not merge with them).
                _tags:
                    type: array
                    items:
                        $ref: '#/components/schemas/Tag'
                    description: Per-objecttype tag definitions.
                _compiled_tags:
                    type: array
                    items:
                        $ref: '#/components/schemas/Tag'
                    description: |
                        Effective tag set — the merge of this objecttype's tags with
                        the inherited tags from pool / global.
                _maskfilters:
                    type: object
                    additionalProperties:
                        type: object
                        properties:
                            tagfilter:
                                $ref: '#/components/schemas/TagfilterApi'
                    description: |
                        Per-mask tag-filter overrides, keyed by mask id. A mask's
                        `tagfilter` restricts which objects the mask is offered for.
                _columnfilters:
                    type: array
                    items:
                        type: object
                        additionalProperties: true
                    description: |
                        Per-column visibility filters — used to hide individual fields
                        from users that lack a matching tag / right.
                _filename_replacements:
                    type: object
                    additionalProperties:
                        type: array
                        items:
                            type: string
                    readOnly: true
                    description: |
                        Read-only helper, computed server-side. Keys are the full api
                        names of the objecttype's files fields; each value is the list of
                        placeholder tokens (e.g. `%_asset.original_filename%`,
                        `%<field>%`) available for that field's `_export_asset_filenames`
                        template. Output only — ignored if sent in a `POST` body.
        XmlMappingProfile:
            type: object
            description: |
                A **profile** for XML / Exiftool / Dublin Core import or export — the
                template from which concrete `XmlMappingApi` mappings are derived.
                Profiles are loaded from `xmlmapping/<profile>.yml` files in the
                base config (and from plugins that contribute their own).

                Returned by `GET /api/v1/xmlmapping/profile/{profile}` and embedded
                in each entry of `GET /api/v1/xmlmapping/list` (with its concrete
                mappings appended under `mappings`).
            required:
                - profile
                - profile_type
            properties:
                profile:
                    type: string
                    description: |
                        Stable profile name as stored — this is the file's `profile:`
                        value and includes the source file extension, e.g. `dc.yml`.
                        This exact string is the `{profile}` path parameter of
                        `GET /xmlmapping/profile/{profile}` and the `XmlMappingApi.profile`
                        value of mappings built from it.
                displayname:
                    $ref: '#/components/schemas/LocaValue'
                profile_type:
                    type: object
                    description: |
                        Capability flags. Determine which targets this profile can be
                        bound to when creating a concrete mapping.
                    properties:
                        xml_export:
                            type: boolean
                            description: Profile can drive an XML export.
                        exiftool_export:
                            type: boolean
                            description: Profile can drive an Exiftool-based metadata export.
                        exiftool_export_omit_empty:
                            type: boolean
                            description: |
                                When set, exiftool export skips mapping fields with no
                                value and no source — instead of emitting an empty
                                `-Tag=` wipe. Inherited from the profile to new mappings.
                        exiftool_import:
                            type: boolean
                            description: Profile can drive an Exiftool-based metadata import.
                        dc_export:
                            type: boolean
                            description: Profile can drive a Dublin Core export.
                        plugins_import:
                            type: boolean
                            description: |
                                When set, plugin-contributed import mapping definitions are
                                automatically merged into the profile on read.
                xml_base:
                    type: string
                    description: |
                        Base XML namespace URL that the resulting XML documents anchor
                        themselves to. Mostly relevant for XML export.
                tabs:
                    type: array
                    description: |
                        The profile's field layout, grouped into tabs (each tab is one
                        page in the front-end editor).
                    items:
                        type: object
                        properties:
                            tab:
                                type: string
                                description: Stable tab id.
                            text:
                                $ref: '#/components/schemas/LocaValue'
                            custom:
                                type: boolean
                                description: |
                                    If true, the front end lets the user add custom fields
                                    inside this tab.
                            fields:
                                type: array
                                items:
                                    $ref: '#/components/schemas/XmlMappingProfileField'
                _compiled_recipes:
                    type: object
                    additionalProperties: true
                    description: |
                        Per-recipe compiled state — the recipes this profile uses at
                        runtime, keyed by recipe name. Read-only; managed by the
                        mapping pipeline.
                mappings:
                    type: array
                    items:
                        type: object
                        properties:
                            id:
                                type: integer
                                format: int64
                                description: The concrete mapping's id.
                            displayname:
                                $ref: '#/components/schemas/LocaValue'
                            _recipes_required:
                                type: array
                                items:
                                    type: string
                                description: |
                                    Recipe names the mapping needs at runtime. The instance
                                    must have all of them registered (via base config or a
                                    plugin) for the mapping to be usable.
                    description: |
                        Concrete mappings built from this profile. Always present
                        (possibly an empty array) on both `GET /xmlmapping/list` and
                        `GET /xmlmapping/profile/{profile}` — the list handler sets a
                        non-nil `mappings` slice for every profile and the per-profile
                        handler returns that same profile object unchanged.
        XmlMappingProfileField:
            type: object
            description: |
                A single field inside an XML-mapping profile tab. Describes the
                XML / Exiftool / JSON source / target plus the fylr-side target
                fields and the import strategy.
            properties:
                _id:
                    type: string
                    description: |
                        Stable field id (a slug derived from the profile file). Used
                        to correlate `XmlMappingApi.fields` entries with their profile
                        definition.
                name:
                    type: string
                    description: |
                        Human-facing field name (the front-end label).
                strategy_import:
                    type: string
                    description: |
                        How the field combines incoming values on import — e.g.
                        `replace`, `append`, `merge`, `skip_if_present`.
                type:
                    type: string
                    enum:
                        - Output
                        - Splitter
                        - Input
                        - Hidden
                    description: |
                        `Output` — exported; `Input` — imported only; `Splitter` — drives
                        sub-field decomposition; `Hidden` — internal helper, not exposed
                        in the editor.
                text:
                    description: |
                        Display text for the editor. Accepts either a plain string or a
                        `LocaValue` (`{<lang>: <text>}`) for localised labels.
                    oneOf:
                        - type: string
                        - $ref: '#/components/schemas/LocaValue'
                xml:
                    type: string
                    description: |
                        Free-form XML hint shown next to the field in the editor (for
                        reviewers who want to see the target XPath / element).
                xml_export:
                    type: array
                    items:
                        $ref: '#/components/schemas/XmlMappingFieldExport'
                    description: |
                        Per-source XML-export rules — XPath / attribute / value
                        formatters applied when this field's value is written out.
                xml_import:
                    type: array
                    items:
                        $ref: '#/components/schemas/XmlMappingFieldImport'
                    description: |
                        Per-source XML-import rules — the XPath / attribute / value
                        readers applied when an incoming document is parsed.
                json_import:
                    type: string
                    description: |
                        JSON pointer used to read the field's value during a JSON
                        import.
                json_import_type:
                    type: string
                    description: |
                        Column type the value should be coerced into when imported
                        (e.g. `text`, `number`, `date`).
                easydb:
                    type: array
                    items:
                        $ref: '#/components/schemas/XmlMappingFieldEasydb'
                    description: |
                        Fylr-side target fields the value flows into. Each entry
                        identifies a column path and any per-target transformation.
                custom:
                    type: boolean
                    description: |
                        Marker set on fields the user added (not declared in the
                        profile YAML). Custom fields can be edited and deleted from
                        the front end.
                x:
                    type: integer
                    description: |
                        Optional grid column position used by the front-end layout
                        editor.
                y:
                    type: integer
                    description: |
                        Optional grid row position used by the front-end layout
                        editor.
                recipe_name:
                    type: string
                    description: |
                        Recipe this field's compilation depends on. Set by the loader
                        when the profile references a recipe.
        XmlMappingApi:
            type: object
            description: |
                A concrete **XML mapping** — pairs a profile with a target
                objecttype, the field bindings and any recipe configuration the
                mapping needs at runtime.

                Used as the request body of `PUT /api/v1/xmlmapping/mapping` and
                `POST /api/v1/xmlmapping/mapping/{mapping}`, and as the response
                body of `GET /api/v1/xmlmapping/mapping/{mapping}`.
            required:
                - profile
            properties:
                id:
                    type: integer
                    format: int64
                    description: |
                        Server-issued numeric id. Empty / 0 on create; required on
                        update.
                idTable:
                    type: integer
                    format: int64
                    description: |
                        Objecttype id this mapping targets. Required for every mapping
                        except global / cross-objecttype ones.
                displayname:
                    $ref: '#/components/schemas/LocaValue'
                profile:
                    type: string
                    description: |
                        Profile name (`xmlmapping.Profile.profile`) the mapping is
                        built from. Must match an existing profile registered with the
                        instance.
                profile_type:
                    type: object
                    description: |
                        Snapshot of the profile's capability flags at the time the
                        mapping was created. Used to surface stale-mapping warnings
                        when the underlying profile is updated.
                    properties:
                        xml_export:
                            type: boolean
                            description: Read and persisted from the request body.
                        exiftool_export:
                            type: boolean
                            description: Read and persisted from the request body.
                        exiftool_export_omit_empty:
                            type: boolean
                            description: Read and persisted from the request body.
                        exiftool_import:
                            type: boolean
                            description: Read and persisted from the request body.
                        dc_export:
                            type: boolean
                            description: |
                                Read-only on a mapping: returned in responses (it reflects the
                                mapping's stored flag) but ignored in `PUT`/`POST` request
                                bodies — the request decoder does not copy it.
                        plugins_import:
                            type: boolean
                            description: |
                                Profile-level flag only (see `XmlMappingProfile.profile_type`).
                                It is not persisted on a mapping — neither read from the
                                request body nor written to the response — and is listed here
                                only because the request/response object shares the
                                `profile_type` shape.
                xml_base:
                    type: string
                    description: |
                        Override of the profile's `xml_base` namespace anchor for this
                        mapping. Optional.
                fields:
                    type: array
                    description: |
                        Per-field bindings — one entry per profile field this mapping
                        configures. Order is meaningful for export.
                    items:
                        $ref: '#/components/schemas/XmlMappingProfileField'
                limited_extensions:
                    type: array
                    items:
                        type: string
                    description: |
                        Optional whitelist of file extensions (e.g. `tif`, `jpg`)
                        this mapping should be offered for. Empty means no restriction.
                recipe_configs:
                    type: object
                    additionalProperties: true
                    description: |
                        Per-recipe configuration applied when this mapping runs.
                        Keys are recipe names; values are the recipe's configuration
                        object.
                custom:
                    type: boolean
                    description: |
                        Read-only marker set when the mapping was created by a user
                        (vs. loaded from a config file). Custom mappings are editable
                        and deletable through the API; config-loaded ones aren't.
        MaskApi:
            type: object
            x-recursion: true
            description: |
                A **mask** descriptor — projects an objecttype to a subset of fields,
                with per-field rendering / editability metadata. Masks are the unit
                through which the front-end renders forms and detail views.

                Returned inside the `masks` array of the `MaskSchemaApi` wrapper by
                `GET /api/v1/mask/{version}` and `GET /api/v1/mask/{version}/{mask}`.

                Masks can recursively contain sub-masks via `fields[].mask`; the
                `x-recursion: true` marker tells the renderer to stop at one level
                of nesting.
            properties:
                name:
                    type: string
                    description: |
                        Stable mask name. The special name `_all_fields` returns the
                        objecttype's complete field set (available to any authenticated
                        user).
                mask_id:
                    type: integer
                    format: int64
                    description: Server-issued numeric id; stable across renames.
                table_id:
                    type: integer
                    format: int64
                    description: |
                        Numeric id of the objecttype this mask belongs to (matches
                        `SchemaTableApi.table_id`).
                table_name_hint:
                    type: string
                    description: |
                        Convenience copy of the objecttype name — saves clients an
                        objecttype lookup when rendering breadcrumbs.
                is_preferred:
                    type: boolean
                    description: |
                        Whether this mask is one of the pool / objecttype's preferred
                        masks. Omitted on sub-mask entries (nested in another mask).
                hide_in_detail:
                    type: boolean
                    description: |
                        Suppress this mask from the front-end detail-view picker.
                hide_in_editor:
                    type: boolean
                    description: |
                        Suppress this mask from the front-end editor picker.
                hide_in_print_dialog:
                    type: boolean
                    description: |
                        Suppress this mask from the print / export dialog.
                standard_numbering:
                    type: string
                    description: |
                        Numbering scheme applied to objects produced through this mask
                        (overrides the objecttype-level setting when non-empty).
                require_comment:
                    type: string
                    description: |
                        Optional rule that forces the user to add a comment when saving
                        through this mask. Empty / omitted means no requirement.
                        Recognised values include `always`, `on_change`, ...
                comment:
                    type: string
                    description: |
                        Admin-facing free-text comment on the mask itself. Not shown
                        to end users.
                system_fields:
                    description: |
                        Per-mask system-field overrides (visibility, label, default).
                        Only present on top-level masks; omitted on sub-masks.
                    allOf:
                        - $ref: '#/components/schemas/SystemFieldApi'
                fields:
                    type: array
                    description: |
                        The ordered list of fields included in this mask. Each entry
                        identifies the underlying column plus per-field mask
                        configuration (required, read-only, default, embedded sub-mask).
                    items:
                        $ref: '#/components/schemas/FieldApi'
                name_localized:
                    $ref: '#/components/schemas/LocaValue'
                table_name_localized:
                    $ref: '#/components/schemas/LocaValue'
                custom_settings:
                    type: object
                    additionalProperties:
                        type: string
                    description: |
                        Free-form key/value pairs for plugin / theme consumers. Keys
                        and values are strings; semantics are owned by the consumer.
        MaskSchemaApi:
            type: object
            description: |
                The full **mask schema** document — the wrapper returned by
                `GET /mask/{version}` and `GET /mask/{version}/{mask}` and the body
                that `POST /mask/HEAD` expects and returns: schema-level metadata
                (`type`, `version`, `based_on_schema_version`, `max_mask_id`) plus
                the array of masks. The single-mask GET returns the same wrapper
                with `masks` filtered to the one requested mask.

                This is what the working datamodel writes to and reads from; once
                the masks are saved into HEAD, they only become visible to other
                readers after a separate `POST /api/v1/schema/commit`.
            required:
                - type
                - masks
            properties:
                type:
                    type: string
                    enum:
                        - user
                    description: |
                        Always `"user"` — distinguishes mask-schema documents from
                        datamodel-schema documents on the same code path.
                version:
                    type: integer
                    description: |
                        Schema-format marker, always `1` on output. Not consumed on
                        input to `POST /mask/HEAD`.
                based_on_schema_version:
                    type: integer
                    description: |
                        On output, the datamodel version this mask set was read from
                        (the server sets it from the loaded datamodel). On input to
                        `POST /mask/HEAD` it is decoded but not consumed: the write
                        always applies to the current HEAD.
                max_mask_id:
                    type: integer
                    format: int64
                    description: |
                        Highest `mask_id` server has issued so far. New masks the
                        client adds without `mask_id` are assigned ids starting at
                        `max_mask_id + 1`.
                masks:
                    type: array
                    description: |
                        The full set of masks the datamodel HEAD should hold after
                        the write. Sending fewer masks than HEAD currently has
                        deletes the missing ones.
                    items:
                        $ref: '#/components/schemas/MaskApi'
            example:
                type: user
                version: 1
                based_on_schema_version: 1
                max_mask_id: 0
                masks:
                    - name: _all_fields
                      table_id: 1
                      table_name_hint: object
                      is_preferred: false
                      hide_in_detail: false
                      hide_in_editor: false
                      hide_in_print_dialog: false
                      standard_numbering: ""
                      comment: ""
                      system_fields:
                        object_id:
                            output:
                                mode: show
                            edit:
                                mode: show
                        tags:
                            output:
                                mode: off
                            edit:
                                mode: off
                        owner:
                            output:
                                mode: show
                            edit:
                                mode: edit
                        publish:
                            output:
                                mode: show
                      fields:
                        - kind: field
                          column_id: 1
                          column_name_hint: date
                          edit:
                            mode: edit
                          output:
                            detail: true
                            text: true
                            table: true
                            standard:
                                format: comma
                            standard_eas: {}
                          search:
                            expert: true
                            fulltext: true
                            facet: true
                            nested: false
                          custom_settings: {}
                          inheritance: null
                        - kind: field
                          column_id: 2
                          column_name_hint: text
                          edit:
                            mode: edit
                          output:
                            detail: true
                            text: true
                            table: true
                            standard:
                                format: comma
                                order: 1
                            standard_eas: {}
                          search:
                            expert: true
                            fulltext: true
                            facet: false
                            nested: false
                          custom_settings: {}
                          inheritance: null
                        - kind: field
                          column_id: 3
                          column_name_hint: pic
                          edit:
                            mode: edit
                          output:
                            detail: true
                            text: true
                            table: true
                            standard:
                                format: comma
                            standard_eas:
                                order: 1
                          search:
                            expert: true
                            fulltext: true
                            facet: false
                            nested: false
                          custom_settings: {}
                          inheritance: null
        FieldApi:
            type: object
            x-recursion: true
            description: |
                One **field** entry inside a mask — the per-mask configuration for
                one column (or for an embedded sub-mask). Carries the underlying
                column's id and name hint, link / reverse-link metadata, the mask's
                per-field edit / output / search behaviour, plus any nested sort
                and inheritance settings.
            properties:
                kind:
                    type: string
                    description: |
                        Field kind — currently `column` (a regular field referencing one
                        column) or `link` (a navigation field that exposes a linked
                        objecttype's record through this mask). Empty / omitted when
                        the entry represents an inline placeholder.
                type:
                    type: string
                    description: |
                        The underlying column type (`text`, `select`, `link`, `nested`,
                        `reverse`, ...). Copy of the column's `Type` for client
                        convenience.
                options:
                    type: string
                    description: |
                        Free-form options string (typically per-column type-specific
                        flags). Empty / omitted for fields without options.
                column_id:
                    type: integer
                    format: int64
                    description: |
                        Numeric id of the column this field points at. Stable across
                        renames.
                column_name_hint:
                    type: string
                    description: |
                        Current column name — provided as a convenience so clients don't
                        need a separate column lookup when rendering. May be stale if
                        the column was just renamed.
                is_hierarchical:
                    type: boolean
                    description: |
                        Whether the underlying column is a hierarchical link (`_id_parent`-style).
                other_table_id:
                    type: integer
                    format: int64
                    description: |
                        For link / nested / reverse columns — the linked objecttype's
                        `table_id`.
                other_table_name_hint:
                    type: string
                other_column_id:
                    type: integer
                    format: int64
                    description: |
                        For reverse-link columns — the linked-back column's id on the
                        other table.
                other_column_name_hint:
                    type: string
                hierarchical_mask_hint:
                    type: boolean
                    description: |
                        Whether the linked record should be rendered through its
                        hierarchical mask (vs. the standard mask).
                inline:
                    type: string
                    description: |
                        Inline rendering directive (front-end-defined). Controls whether
                        the linked record is shown inline next to the field or in a
                        separate panel.
                mask_id:
                    description: |
                        The mask the linked record should be rendered through. Either an
                        integer mask id, the string `"preferred"`, or `"standard"`.
                    oneOf:
                        - type: integer
                          format: int64
                        - type: string
                          enum:
                            - preferred
                            - standard
                edit:
                    type: object
                    description: Per-mask edit-mode settings for this field.
                    properties:
                        mode:
                            type: string
                            description: |
                                Edit mode — `edit`, `show` (read-only), `off` (hidden in
                                editor), `requireConfirm`, ...
                        append_only:
                            type: boolean
                            description: |
                                For collection-valued fields — entries can be added but
                                existing entries cannot be removed through this mask.
                        remove_only:
                            type: boolean
                            description: |
                                For collection-valued fields — existing entries can be
                                removed but no new entries may be added through this mask.
                output:
                    type: object
                    description: Where and how this field is rendered in output contexts.
                    properties:
                        detail:
                            type: boolean
                            description: Show in detail view.
                        text:
                            type: boolean
                            description: Include in plain-text rendering (search snippets, exports).
                        table:
                            type: boolean
                            description: Include in tabular rendering.
                        standard:
                            type: object
                            description: |
                                Field's contribution to the object's `_standard` rendering —
                                the short label fylr produces for an object in pickers and
                                breadcrumbs.
                            properties:
                                design:
                                    type: string
                                format:
                                    type: string
                                format_inner:
                                    type: string
                                order:
                                    type: integer
                                stop_if_set:
                                    type: boolean
                        standard_eas:
                            type: object
                            description: Field's `_standard` ordering for the EAS-rendered string.
                            properties:
                                order:
                                    type: integer
                        standard_geo:
                            type: object
                            description: Field's `_standard` ordering for the geo-rendered string. Geometries copied into `_standard` are simplified (Ramer-Douglas-Peucker) to at most `fylr.geo.standardMaxVertices` vertices per shape; the field value itself keeps full precision.
                            properties:
                                order:
                                    type: integer
                search:
                    type: object
                    description: Per-field search behaviour.
                    properties:
                        expert:
                            type: boolean
                            description: Available in the expert search.
                        fulltext:
                            type: boolean
                            description: Indexed for full-text search.
                        facet:
                            type: boolean
                            description: Available as a search facet.
                        nested:
                            type: boolean
                            description: |
                                Nested search — only meaningful on fields whose underlying
                                column is `nested` / `reverse`.
                custom_settings:
                    type: object
                    additionalProperties:
                        type: string
                    description: |
                        Plugin / theme-consumed key/value pairs. Keys and values are
                        strings; semantics are owned by the consumer.
                nested_sort:
                    type: array
                    description: |
                        For nested-link fields — sort directives applied to the linked
                        records when this field is displayed.
                    items:
                        type: object
                        properties:
                            field:
                                type: string
                                description: Column api-name to sort by.
                            order:
                                type: string
                                enum:
                                    - asc
                                    - desc
                nested_standard_first_only:
                    type: boolean
                    description: |
                        For nested-link fields — when true, only the first nested record
                        contributes to the object's `_standard` rendering.
                inheritance:
                    type: object
                    description: |
                        For fields backed by inheritable columns — controls whether the
                        field is inherited from parent records.
                    properties:
                        inherit:
                            type: boolean
                        show_in_detail:
                            type: boolean
                mask:
                    description: |
                        Embedded sub-mask used to render the linked record (for `link`
                        / `nested` / `reverse` fields). Recursion is broken at render
                        time via MaskApi's `x-recursion: true` marker (when set on the
                        schema).
                    allOf:
                        - $ref: '#/components/schemas/MaskApi'
                column:
                    description: |
                        The underlying column descriptor, surfaced for clients that
                        don't have the full datamodel in hand.
                    allOf:
                        - $ref: '#/components/schemas/ColumnApi'
                full_name:
                    type: string
                    description: |
                        Fully-qualified field path — `<table>.<column>` for top-level
                        fields, deeper for nested sub-mask fields.
        ColumnApi:
            type: object
            description: |
                A **column** — one field definition on an objecttype. Carries the
                column's identity (`name`, `column_id`, `type`), nullability,
                validation rules, and link metadata (for `link` / `nested` /
                `reverse` columns).
            properties:
                kind:
                    type: string
                    description: |
                        Column kind — typically empty for user columns, `system` for
                        fylr-managed columns (`_id`, `_pool`, `_owner`, ...).
                name:
                    type: string
                    description: |
                        Stable, machine-readable column name. Used as the JSON key on
                        objects of this type.
                type:
                    type: string
                    description: |
                        Column data type. Recognised types include `text`, `text-l10n`,
                        `select`, `link`, `nested`, `reverse`, `reverse_hierarchical`,
                        `date`, `daterange`, `number`, `boolean`, `tags`, `eas`, plus
                        `custom:*` types contributed by plugins. Enabled plugins
                        surface their custom types in the rights catalog
                        (`GET /api/v1/right`); the datamodel rejects unknown types
                        on save with `code: UnknownColumnType`.
                not_null:
                    type: boolean
                    description: |
                        Whether the column requires a non-null value on every write.
                column_id:
                    type: integer
                    format: int64
                    description: |
                        Server-issued numeric id; stable across renames.
                reverse_edit:
                    type: boolean
                    description: |
                        For `reverse` columns — whether the column can be edited from
                        this side (vs. read-only mirroring of the link).
                is_hierarchical:
                    type: boolean
                    description: |
                        For self-referential `link` columns — true if the column forms
                        a hierarchy (`_id_parent`).
                check:
                    type: string
                    description: |
                        Stored CHECK constraint expression (SQL fragment). Empty when
                        no constraint is set.
                check_regexp:
                    type: string
                    description: |
                        Regex the value must match (for `text` columns).
                check_regexp_flags:
                    type: string
                    description: |
                        Optional regex flags (`i` for case-insensitive, ...).
                check_range_lower:
                    description: Lower bound of an allowed value range.
                check_range_upper:
                    description: Upper bound of an allowed value range.
                check_range_lower_open:
                    description: |
                        When set, the lower bound is exclusive (`>`). Otherwise inclusive
                        (`>=`).
                check_range_upper_open:
                    description: |
                        When set, the upper bound is exclusive (`<`). Otherwise inclusive
                        (`<=`).
                check_range_not_empty:
                    type: boolean
                    description: |
                        For `daterange` / numeric range columns — whether an empty range
                        is rejected.
                length_min:
                    type: integer
                    description: Minimum string length (for `text` columns).
                length_max:
                    type: integer
                    description: Maximum string length (for `text` columns).
                other_table_id:
                    type: integer
                    format: int64
                    description: |
                        For link / nested / reverse columns — the linked objecttype's
                        `table_id`.
                other_table_name_hint:
                    type: string
                    description: Convenience copy of the linked objecttype's name.
                other_column_id:
                    type: integer
                    format: int64
                    description: |
                        For `reverse` columns — the linked-back column's id on the
                        other table.
                other_column_name_hint:
                    type: string
                    description: Convenience copy of the linked-back column's name.
                bidirectional_reverse:
                    type: boolean
                    description: |
                        For columns participating in a bidirectional link — true if
                        this column is the reverse half of the pair (writes to it
                        mirror through the forward half).
                custom_settings:
                    type: object
                    additionalProperties:
                        type: string
                    description: |
                        Plugin / theme-consumed key/value pairs on the column. Keys and
                        values are strings; semantics are owned by the consumer.
                name_localized:
                    description: |
                        Localised display name for the column. Shown wherever the
                        front-end surfaces the column label.
                    allOf:
                        - $ref: '#/components/schemas/LocaValue'
        OwnedByApi:
            type: object
            description: |
                Marks the table as a **nested table** of the objecttype identified
                by `other_table_id`. Nested rows have no independent identity:
                they ship as embedded values inside the top-level objects of the
                objecttype `other_table_id` points at, have no `_acl` of their
                own and don't carry an owner. On the wire they surface under
                `_nested:<table-name>` (or `_reverse_nested:<table-name>`) on the
                top-level object.

                The name `owned_by` is historical. fylr is an easydb 6 Go
                rewrite that targets the easydb 5 API contract; in easydb 5 every
                nested table was a real DB table with an owning-table foreign
                key. fylr keeps the nested values inside the top-level object's
                JSON instead, but the descriptor's name (and its `other_table_id`
                slot) stuck.

                Constraint: a nested table cannot declare `reverse_link` columns
                — the datamodel validator rejects that on save.
            required:
                - other_table_id
            properties:
                other_table_id:
                    type: integer
                    format: int64
                    description: |
                        `table_id` of the objecttype this table is a nested table of.
                        Must point at a table that exists in the same datamodel
                        snapshot.
                other_table_name_hint:
                    type: string
                    description: |
                        Convenience copy of that objecttype's name — saves clients a
                        separate lookup when rendering. May be stale if the
                        objecttype was just renamed.
        ForeignKeyApi:
            type: object
            description: |
                A **foreign-key** declaration on a table. Documents the DB-level
                reference between this table's `columns` and the `referenced_table`
                primary key, plus the cascade behaviour fylr applies on delete /
                update.
            required:
                - columns
                - referenced_table
            properties:
                name:
                    type: string
                    description: |
                        Database-level constraint name. Server-issued; clients should
                        treat it as opaque.
                on_delete:
                    type: string
                    description: |
                        Cascade action when a referenced row is deleted. Standard SQL
                        values: `CASCADE`, `RESTRICT`, `SET NULL`, `SET DEFAULT`,
                        `NO ACTION`.
                on_update:
                    type: string
                    description: |
                        Cascade action when a referenced row's primary key is updated.
                        Same values as `on_delete`.
                columns:
                    type: array
                    description: |
                        The column(s) on **this** table that participate in the foreign
                        key. Multi-column keys reference a composite key on the other
                        side, in the same order.
                    items:
                        type: object
                        required:
                            - column_id
                        properties:
                            column_id:
                                type: integer
                                format: int64
                                description: Numeric id of the column on this table.
                            column_name_hint:
                                type: string
                                description: Convenience copy of the column's current name.
                referenced_table:
                    type: object
                    required:
                        - table_id
                        - columns
                    description: The table this key points at and the columns on its side.
                    properties:
                        table_id:
                            type: integer
                            format: int64
                            description: |
                                `table_id` of the referenced table.
                        name_hint:
                            type: string
                            description: Convenience copy of the referenced table's name.
                        columns:
                            type: array
                            description: |
                                The referenced table's columns this FK targets — paired
                                positionally with this table's `columns` array.
                            items:
                                type: object
                                properties:
                                    auto_column_primary_key:
                                        type: boolean
                                        description: |
                                            True when the referenced column is the referenced
                                            table's auto-managed primary key (`_id`).
        UniqueKeyApi:
            type: object
            description: |
                A **unique-key** constraint on a table. Violations surface as
                `DatabaseUniqueKeyViolation` on `POST /api/v1/db/{objecttype}`.
            required:
                - columns
            properties:
                group:
                    type: string
                    description: |
                        Constraint-group label (`a` / `b` / `c`). Lets multiple unique
                        constraints be authored side-by-side on the same table — same
                        group label means they are alternatives, not all required.
                columns:
                    type: array
                    description: |
                        The column(s) that together must be unique. A multi-column key
                        requires the combination to be unique, not each column
                        individually.
                    items:
                        type: object
                        properties:
                            auto_column_parent:
                                type: boolean
                                description: |
                                    True when the column is the auto-managed `_id_parent`
                                    (hierarchical link).
                            auto_column_uplink:
                                type: boolean
                                description: |
                                    True when the column is the auto-managed uplink column
                                    for a hierarchical parent-child relationship.
                            column_id:
                                type: integer
                                format: int64
                                description: Numeric id of the column.
                            column_name_hint:
                                type: string
                                description: Convenience copy of the column's current name.
        BidirectionalApi:
            type: object
            description: |
                A **bidirectional link** declaration — a pair of columns on two
                different objecttypes that mirror each other. Writing the link on
                one side automatically materialises the reverse link on the other;
                reading either side returns the same connection.
            required:
                - columns
            properties:
                columns:
                    type: array
                    description: |
                        The two columns participating in the bidirectional link — the
                        forward column on this table and the reverse column on the
                        other (`bidirectional_reverse: true` on the other side's
                        ColumnApi).
                    items:
                        type: object
                        properties:
                            auto_column_uplink:
                                type: boolean
                                description: |
                                    True when the column is the auto-managed uplink column.
                            column_id:
                                type: integer
                                format: int64
                            column_name_hint:
                                type: string
                                description: Convenience copy of the column's current name.
        LookupByReference:
            type: object
            description: |
                Reference-based lookup descriptor — used on `lookup:_id` (or
                `lookup:_id_parent`) slots throughout the API. Lets clients
                address an existing user / group / pool by its stable
                `reference` string instead of by numeric `_id`. The lookup must
                resolve to exactly one record; zero or multiple matches cause
                the enclosing write to fail with `LookupNotFound` / `LookupNotUnique`.
            required:
                - reference
            properties:
                reference:
                    type: string
                    description: |
                        The target record's `reference` string. Must match a stored
                        reference on the addressed basetype exactly.
        GeneratedRightsApi:
            type: object
            description: |
                Read-only **generated rights** — the effective per-right
                configuration the requesting session holds on the resource that
                carries the field. Returned by fylr inside many top-level
                responses (objects, pools, groups, users, ...) so the front-end
                doesn't have to recompute the ACL.

                Keyed by right name (one of the values from the rights catalog
                at `GET /api/v1/right`). Each value mirrors the same per-right
                configuration shape used inside `RightApi.rights` —
                `RightItemApi`.
            additionalProperties:
                $ref: '#/components/schemas/RightItemApi'
        SystemRightsApi:
            type: object
            description: |
                **System rights** granted to a principal (a group, a user, …) —
                the instance-wide permissions the principal holds. The map is
                keyed by right name (matches the entries in the `system` context
                of `GET /api/v1/right`); each value is a map of right-parameter
                name to that parameter's value.

                Parameter value types are right-specific — the inner map carries
                whatever shape the right's parameter declares (`bool`, `string`,
                `string-list`, ...). For a fully-typed view of which parameters
                each right accepts, consult the rights catalog.
            additionalProperties:
                type: object
                description: |
                    Per-right parameter assignments. Keys are parameter names; value
                    type matches the parameter's declared type in the rights catalog.
                additionalProperties: true
            example:
                system.user:
                    read: true
                system.api.event:
                    get: true
                system.api.publish:
                    post: true
                    get: true
        AutomaticAuthApi:
            type: object
            description: |
                **Automatic-auth** descriptor — when set on a group, marks the
                group as one whose members can be granted a short-lived session
                through fylr's automatic-auth flow (action-code / email-link).
                Carries the auth method that issued the binding and a timestamp.
            required:
                - type
            properties:
                type:
                    type: string
                    description: |
                        Auth method that granted the automatic-auth binding. One of
                        `easydb`, `anonymous`, `collection`, `email`, `action_code`,
                        `auto` (and any auth method a plugin contributes).
                timestamp:
                    type: string
                    format: date-time
                    description: When the binding was issued. Set server-side.
        AuthMethodGroupMapsApi:
            type: object
            description: |
                **Auth-method group mappings** — rules that map external auth
                providers (SSO, LDAP) and fylr's built-in system groups onto this
                group. Used so signed-in users from those identity sources are
                automatically assigned to the group.

                Each entry is an array of rules. A rule succeeds when its `method`
                / `value` test against the incoming auth subject holds. The
                `system` array only supports `method: "eq"` (other methods are
                rejected on save).
            properties:
                sso:
                    type: array
                    description: Rules matched against SSO subjects.
                    items:
                        $ref: '#/components/schemas/AuthGroupRuleApi'
                ldap:
                    type: array
                    description: Rules matched against LDAP groups.
                    items:
                        $ref: '#/components/schemas/AuthGroupRuleApi'
                system:
                    type: array
                    description: |
                        Rules matched against fylr's built-in system groups. Only
                        `method: "eq"` is accepted; `value` must be the reference of
                        an existing system group.
                    items:
                        $ref: '#/components/schemas/AuthGroupRuleApi'
        AuthGroupRuleApi:
            type: object
            description: |
                One rule inside an `_auth_method_group_maps.<sso|ldap|system>`
                array. The rule's `method` says how to compare the incoming
                subject against `value`; if it matches, the user is assigned to
                the group.
            required:
                - method
                - value
            properties:
                method:
                    type: string
                    description: |
                        Comparison method. `eq` is supported everywhere; LDAP and SSO
                        contexts may also accept other comparison methods (regex /
                        glob, depending on configuration). The `system` array only
                        accepts `eq`.
                value:
                    type: string
                    description: |
                        The string the rule matches against. For `system` rules, the
                        reference of an existing system group; otherwise the value the
                        external provider supplies (LDAP group DN, SSO claim value, ...).
        GroupPseudoApi:
            type: object
            description: |
                **Pseudonymization** template for a group. When a user account
                belonging to this group is deleted, fylr replaces the user's
                identifying fields with the strings configured here so that
                event log entries and ACL grants remain attributable to "some
                user from this group" without leaking the original identity.
            properties:
                user:
                    type: object
                    description: |
                        Pseudonymised replacements for the user's identifying fields.
                        Empty / unset uses the per-instance defaults.
                    properties:
                        login:
                            type: string
                            description: Pseudonymised login name.
                        first_name:
                            type: string
                            description: Pseudonymised first name.
                        last_name:
                            type: string
                            description: Pseudonymised last name.
                        displayname:
                            type: string
                            description: Pseudonymised display name.
                        additional_info:
                            type: string
                            description: Pseudonymised additional-info text.
                        _emails:
                            type: string
                            description: |
                                Pseudonymised email — note the leading underscore in the
                                JSON key.
        ScheduleApi:
            type: object
            description: |
                A **schedule** — selector of when a recurring action should run.
                Used for the user's mail-notification schedule (`mail_schedule`)
                and elsewhere fylr lets users pick a recurrence in calendar terms
                rather than as a cron expression.

                All fields are arrays; emptier means "match any value" for that
                field. The schedule fires whenever the wall clock in `timezone`
                satisfies every non-empty constraint.
            properties:
                days_of_month:
                    type: array
                    items:
                        type: integer
                        minimum: 1
                        maximum: 31
                    description: Days of the month the schedule may fire on.
                weekdays:
                    type: array
                    items:
                        type: string
                        enum:
                            - mon
                            - tue
                            - wed
                            - thu
                            - fri
                            - sat
                            - sun
                    description: |
                        Weekdays the schedule may fire on. Lowercase three-letter
                        abbreviations.
                hours:
                    type: array
                    items:
                        type: integer
                        minimum: 0
                        maximum: 23
                    description: Hours of the day (in `timezone`).
                minutes:
                    type: array
                    items:
                        type: integer
                        minimum: 0
                        maximum: 59
                    description: Minutes of the hour.
                timezone:
                    type: string
                    description: |
                        IANA timezone identifier (`Europe/Berlin`, `UTC`, ...). When
                        omitted, the instance default timezone is used.
        UserCollectionPinCodeApi:
            type: object
            description: |
                A pin code the user holds for a pin-protected collection. Set by
                the user when they unlock the collection for the first time;
                re-verified on each subsequent access.
            required:
                - collection_id
                - pin_code
            properties:
                collection_id:
                    type: integer
                    format: int64
                    description: |
                        `_id` of the collection the pin applies to. Must be a
                        pin-protected collection (`pin_required: true`).
                pin_code:
                    type: string
                    description: |
                        The pin code as the user entered it. Stored hashed
                        server-side; the cleartext value is only present here on the
                        write path. Reads return the same shape with the cleartext
                        omitted when the requester is not the user themselves.
        LocaleApi:
            type: object
            description: |
                Locale metadata — number formatting and calendar text the front
                end uses to render localised values. Derived from CLDR for the
                user's `frontend_language` (and per `database_locales` entry, for
                each language the user is allowed to edit data in).
            properties:
                name:
                    type: string
                    description: |
                        Display name of the locale in its own language (`Deutsch`,
                        `English (United States)`, ...).
                numbers:
                    type: object
                    description: Number-formatting separators.
                    properties:
                        decimal:
                            type: string
                            description: |
                                Decimal separator (`","` in `de-DE`, `"."` in `en-US`).
                        grouping:
                            type: string
                            description: |
                                Grouping (thousands) separator (`"."` in `de-DE`,
                                `","` in `en-US`).
                calendar:
                    type: object
                    description: Calendar text and date-format patterns (CLDR-derived).
                    properties:
                        bc:
                            type: string
                            description: Era marker before common era (e.g. `v. Chr.`).
                        ad:
                            type: string
                            description: Era marker (e.g. `n. Chr.`).
                        year:
                            type: string
                            description: Format pattern for a bare year.
                        year_month:
                            type: string
                            description: Format pattern for a year-month value (`MMMM y`).
                        date:
                            type: string
                            description: Date format pattern (`dd.MM.yyyy`).
                        date_time:
                            type: string
                            description: Date+time format pattern.
                        date_time_sec:
                            type: string
                            description: Date+time+seconds format pattern.
                        date_time_sec_tz:
                            type: string
                            description: Date+time+seconds+timezone format pattern.
        SessionAuthenticationMethodApi:
            type: object
            description: |
                One authentication method the instance exposes (or the method the
                current session was established with).
            required:
                - method
            properties:
                method:
                    type: string
                    description: |
                        The auth method identifier. Recognised values include `easydb`,
                        `email`, `collection`, `action_code`, `auto`, `anonymous`, plus
                        any method a plugin contributes.
                timestamp:
                    type: string
                    format: date-time
                    description: |
                        When the session was authenticated through this method (only
                        set on `authenticated`, not in the `authentication_methods`
                        catalog).
                client_id:
                    type: string
                    description: |
                        Identifier of the client that drove the authentication (e.g.
                        the browser UUID). Empty for server-driven sessions.
        WatermarkApi:
            type: object
            description: |
                **Watermark** configuration applied to image variants produced by
                fylr's asset pipeline for objects in a given scope (a pool or an
                objecttype). The watermark image is fetched through `image` (a
                full file descriptor); the placement / appearance parameters
                follow the ImageMagick conventions.
            properties:
                image:
                    description: |
                        File descriptor of the watermark image. Setting `image: null`
                        (or omitting it) clears the watermark for this scope.
                    allOf:
                        - $ref: '#/components/schemas/file'
                gravity:
                    type: string
                    enum:
                        - nw
                        - n
                        - ne
                        - w
                        - c
                        - e
                        - sw
                        - s
                        - se
                        - ""
                    description: |
                        Anchor point on the produced image where the watermark is
                        placed, given as a short compass code. On save the API accepts
                        exactly these values; any other value is rejected with
                        `watermark.gravity "<value>" not supported`. fylr maps them
                        internally to the corresponding ImageMagick gravity:

                          * `nw` → NorthWest, `n` → North, `ne` → NorthEast
                          * `w` → West, `c` → Center, `e` → East
                          * `sw` → SouthWest, `s` → South, `se` → SouthEast
                          * `""` (empty) → no gravity (placement defaults / tiling)
                    example: se
                dissolve:
                    type: integer
                    minimum: 0
                    maximum: 100
                    description: |
                        Opacity of the watermark, in percent (`0` = invisible,
                        `100` = fully opaque). The 0–100 range is enforced when the
                        rendition is produced, not validated on save.
                size:
                    type: string
                    description: |
                        Target size of the watermark on the produced image. When the
                        rendition is produced fylr accepts a positive pixel size
                        (`200`), a percentage of the canvas's largest side (`30%`), a
                        fixed `<width>x<height>` (`200x100`), or `<width>%x<height>%`.
                        The value is not validated on save.
                tile:
                    type: boolean
                    description: |
                        When true, the watermark image tiles across the whole canvas
                        instead of being placed once at `gravity`.
        BackupStatsApi:
            type: object
            description: |
                Summary stats captured for one backup run — filesize and the
                content-type / filename the produced backup artifact carries.
            required:
                - filesize
                - mimetype
                - filename
            properties:
                filesize:
                    type: integer
                    format: int64
                    description: Size of the produced backup file, in bytes.
                mimetype:
                    type: string
                    description: |
                        MIME type of the produced backup file. Depends on the chosen
                        `opts.format` — typically `application/vnd.sqlite3; charset=binary`
                        for SQLite snapshots, `application/x-tar` for pg_dump archives.
                filename:
                    type: string
                    description: |
                        File name fylr assigns to the artifact —
                        `fylr-backup-<format>-<instance>-<YYYY-MM-DD HH:MM>.<ext>`.
        BackupOptsApi:
            type: object
            description: |
                Options the backup was started with. Echoed back on read so
                clients can tell which format the produced artifact is in.
            required:
                - format
            properties:
                format:
                    type: string
                    description: |
                        Backup format. The recognised values are configured per
                        instance and surface in `GET /api/v1/system/backup/list`;
                        typical values include `sqlite3_db` (single-file SQLite
                        snapshot) and `pg_dump` (PostgreSQL dump archive).
                include_events:
                    type: boolean
                    description: |
                        When true, the event log is included in the backup. When
                        false, only the datamodel and user data are dumped — useful
                        for migrating to a new instance without carrying the event
                        history along.
        CaptionApi:
            type: object
            description: |
                Per-field **caption** configuration — used by the asset-rendering
                pipeline to burn a text caption into image variants produced for
                an objecttype's records.
            properties:
                text:
                    type: string
                    description: |
                        Caption text template. Supports the same field-reference syntax
                        as other fylr text templates (`<no value>` etc.).
                size:
                    type: string
                    description: |
                        Caption font size. Either a positive pixel integer (`24`) or a
                        percentage of the canvas height (`1`–`50` followed by `%`).
                    example: "24"
                padding:
                    type: string
                    description: |
                        Padding around the caption, in pixels. `0` or higher; no
                        decimals, no leading zeros.
                    example: "8"
                multiline:
                    type: boolean
                    description: Allow the caption to wrap across multiple lines.
                overlay:
                    type: boolean
                    description: |
                        When true, the caption is drawn on top of the image; when
                        false, it's appended below.
        CaptionByFieldApi:
            type: object
            description: |
                Per-field caption configuration map — keyed by the field name on
                the objecttype whose record's caption should be rendered for the
                asset. Each entry is a CaptionApi.
            additionalProperties:
                $ref: '#/components/schemas/CaptionApi'
        JanitorPolicyApi:
            type: object
            description: |
                **Janitor policy** — controls automatic cleanup of historic file
                versions and soft-deleted objects under this scope (a pool or an
                objecttype). Both blocks are independently optional; `null` means
                the corresponding cleanup is disabled.
            properties:
                file_link_delete:
                    type: object
                    description: |
                        When set, the janitor removes historic file versions linked
                        from this scope's objects according to either time-based or
                        count-based retention. Set both fields to `0` to keep nothing
                        and clean up immediately.
                    properties:
                        keep_days_history_versions:
                            type: integer
                            minimum: 0
                            description: |
                                Keep historic versions newer than this many days. `0`
                                means "do not keep by time at all".
                        keep_count_history_versions:
                            type: integer
                            minimum: 0
                            description: |
                                Keep at most this many historic versions per file. `0`
                                means "do not keep any historic versions".
                object_purge:
                    type: object
                    description: |
                        When set, the janitor permanently purges soft-deleted objects
                        this scope owns once they have been deleted for at least
                        `min_deleted_days`.
                    properties:
                        min_deleted_days:
                            type: integer
                            minimum: 0
                            description: |
                                Number of days an object must have been soft-deleted
                                before the janitor purges it. `0` means "purge
                                immediately on soft-delete".
        XmlMappingFieldExport:
            type: object
            description: |
                One **XML-export rule** for a profile field. Targets an XML
                location (XPath / element / attribute) and the value-formatting
                options the writer applies.

                `list` and `l10n` control how multiple values and languages are
                written. With neither flag a single value is written (the preferred
                language of a multilingual source, joined with `; ` for a repeatable
                field). Set together they produce a **localized list** — an
                `rdf:Bag` whose entries are `rdf:Alt` language alternatives — for
                custom tags and for tags whose schema defines that shape (e.g.
                `XMP-plus:Custom1`). A built-in tag can only take the shapes its
                schema allows; the mapping editor offers the valid options per tag
                (see the `list`/`l10n` capability flags on `GET /xmlmapping/tags`).
            example:
                path: XMP-dc:Subject
                list: true
            properties:
                path:
                    type: string
                    description: |
                        XPath / element path the field's value is written to. May
                        include namespace prefixes declared on the parent profile.
                list:
                    type: boolean
                    description: |
                        When true, the field's values are written as an unordered
                        list — an XMP `rdf:Bag` with one `rdf:li` element per value.
                        For a multilingual (l10n) source field the bag collects the
                        values of **all** languages, not only the preferred one, and a
                        nested or repeatable field contributes every entry. Use this
                        when the target tag holds plain values without language
                        information, for example `dc:subject`.
                l10n:
                    type: boolean
                    description: |
                        When true, the field's value is written localized per language
                        as an XMP language alternative — an `rdf:Alt` carrying one
                        `rdf:li` with an `xml:lang` attribute per language plus an
                        `x-default`. Internally the writer emits one element per
                        language using the Exiftool-style `<path>-<lang>` suffix
                        convention, which Exiftool combines into the lang-alt. Use this
                        for a multilingual target tag such as `dc:title`.
                attributes:
                    type: object
                    additionalProperties:
                        type: string
                    description: |
                        Static XML attributes to add to the output element. Keys are
                        attribute names; values are the literal attribute strings.
                elements_js:
                    type: string
                    description: |
                        Optional JavaScript snippet used to post-process the output
                        element. Set by the loader; not serialised on profile YAML.
        XmlMappingFieldImport:
            type: object
            description: |
                One **XML-import rule** for a profile field. Tells the reader how
                to find the field's value in an incoming XML document.
            required:
                - search
            properties:
                search:
                    type: string
                    description: |
                        XPath / element search expression the reader runs against the
                        incoming document to extract this field's value.
                l10n_prefix:
                    type: string
                    description: |
                        Compatibility shim for easydb 5 — the language prefix used by
                        the legacy importer. Not consumed by fylr; kept on the wire
                        for round-trips with easydb-5 profile files.
        XmlMappingTag:
            type: object
            description: |
                One entry of the metadata **tag catalog** (`GET /xmlmapping/tags`):
                a tag exiftool understands, with the capability flags the mapping
                editor uses to offer only the value-shapes the tag supports.
            example:
                writable: true
                path: XMP-plus:Custom1
                group: XMP-plus
                description:
                    de-DE: Benutzerdefiniert 1
                    en-US: Custom 1
                type: lang-alt
                l10n: true
                list: true
                list_type: Bag
            properties:
                path:
                    type: string
                    description: |
                        Tag path as used in a mapping's `xml_export`/`xml_import` rules,
                        in the form `<group>:<tag>` (e.g. `XMP-dc:Subject`).
                group:
                    type: string
                    description: |
                        Tag group (exiftool family-1 group, e.g. `XMP-dc`, `IPTC`,
                        `ExifIFD`). Also the key into the response's `xmlns` map.
                description:
                    type: object
                    additionalProperties:
                        type: string
                    description: |
                        Localized display name of the tag, keyed by frontend language
                        (e.g. `de-DE`). May be empty for tags exiftool ships without
                        translations.
                writable:
                    type: boolean
                    description: |
                        When true, exiftool can write the tag — only writable tags are
                        offered for export mappings.
                type:
                    type: string
                    description: |
                        The exiftool value type, e.g. `string`, `integer`, `lang-alt`,
                        or `?` for tags without a declared type.
                l10n:
                    type: boolean
                    description: |
                        When true, the tag is a localized **lang-alt** (`rdf:Alt` with
                        one value per language). Derived from `type` being `lang-alt`.
                        Omitted when false.
                list:
                    type: boolean
                    description: |
                        When true, the tag is a repeatable list (an XMP `rdf:Bag` or
                        `rdf:Seq`). Together with `l10n` this classifies the tag's
                        container: scalar (neither), list, lang-alt, or list-of-lang-alt
                        (both — e.g. `XMP-plus:Custom1`, a localized list). Omitted when
                        false.
                list_type:
                    type: string
                    enum:
                        - Bag
                        - Seq
                    description: |
                        The concrete list container. Only present when `list` is true.
        XmlMappingFieldEasydb:
            type: object
            description: |
                One **fylr-side target** for an XML-mapping field. Identifies the
                column the value should land in and the display text the editor
                shows next to it.
            properties:
                text:
                    type: string
                    description: Display text shown for this target in the editor.
                type:
                    type: string
                    description: |
                        Column type hint. Currently unused by the server but mapped
                        through for client convenience.
                field:
                    type: string
                    description: |
                        The fylr column path the value flows into. Same syntax as
                        datamodel column references — `<objecttype>.<column>` for
                        regular fields, dotted for nested links.
        RecipeConfigs:
            type: object
            description: |
                Per-recipe configuration. This object is a map whose keys are **recipe
                names** and whose values configure that recipe for the current operation
                (e.g. producing a version or running a metadata mapping).

                Recipe name format:
                  * Built-in / config cookbooks: `COOKBOOK-NAME:RECIPE-NAME`
                    (for example `imageconverter:browserthumbs`).
                  * Plugin-provided recipes: `PLUGIN-NAME:COOKBOOK-NAME:RECIPE-NAME`.

                The `params` of each recipe are **recipe-specific**: the set of valid
                parameter keys, their value types, defaults, ranges and option lists are
                defined by each recipe individually, not by this API schema. That is why
                `params` is documented as an open object (`additionalProperties: true`)
                rather than a fixed schema — a closed schema cannot describe every recipe,
                and the available recipes additionally depend on which plugins are
                installed.

                To discover the parameters a recipe accepts on a running instance, use the
                recipe listing endpoint:

                    GET /inspect/apidocs/recipes/

                It lists every cookbook and recipe currently loaded (including
                plugin-provided ones) together with each parameter's key, description and
                type. Each value you send is validated against that recipe's parameter
                definition: unknown keys are rejected; a `string` param may be regex-
                constrained; an `int` param is bounded by its `min`/`max`; a `select`
                param must be one of the recipe's options; a `bool` param accepts a
                boolean or a string (`true`/`1`/`yes` mean true). Omitting a key (or
                sending `null`) applies the recipe's
                default; a parameter marked mandatory by the recipe must be supplied if it
                has no default.
            additionalProperties:
                type: object
                description: |
                    Configuration for a single recipe, keyed in the parent map by the recipe
                    name (see the parent description for the name format).
                properties:
                    params:
                        type: object
                        additionalProperties: true
                        description: |
                            Recipe-specific parameters as a map of parameter name to value.

                            The accepted keys and value types are defined by the recipe itself
                            and are listed, per recipe, at `GET /inspect/apidocs/recipes/`.
                            Validation rules applied per parameter, depending on the recipe's
                            declared parameter type:
                              * string  — value must be a string; may be constrained by a regex.
                              * int     — value must be an integer (a numeric string is also
                                          accepted); bounded by the parameter's `min`/`max`.
                              * select  — value must be a string equal to one of the parameter's
                                          allowed options.
                              * bool    — value must be a boolean (a string is also accepted:
                                          `true`/`1`/`yes` mean true, anything else false).
                            An absent key, or a `null` value, applies the recipe's default. A
                            parameter the recipe marks as mandatory must be provided unless it has
                            a default. Keys not defined by the recipe are rejected.
                        example:
                            size: 600
                            format: png
                            resize_mode: max
                            jpegquality: 80
                            strip: true
                example:
                    imageconverter:browserthumbs:
                        params:
                            size: 1200
                            format: webp
                            resize_mode: max
                    imageconverter:preview_pool_watermark:
                        params:
                            size: 600
                            format: jpg
        FileMetadata:
            type: object
            description: |
                Free-form **file metadata** document — a map of metadata groups
                to per-group key/value bags.

                The well-known group `_technical_metadata` carries the file's
                intrinsic properties (`width`, `height`, `dpi`, ...); other groups
                carry whatever the configured metadata recipes produce (EXIF, IPTC,
                XMP, custom extractors). Group names beginning with `_` are
                reserved for fylr-managed groups; user-defined groups should use
                unprefixed names.

                Each group's value is a flat key/value bag whose values can be
                strings, numbers, booleans, nested objects, or arrays — the type
                set per key is fixed by the producing recipe, not by fylr.
            properties:
                _technical_metadata:
                    $ref: '#/components/schemas/technical_metadata'
            additionalProperties:
                type: object
                description: |
                    A metadata group's key/value bag. Value types are recipe-defined.
                additionalProperties: true
            example:
                _technical_metadata:
                    width: 4096
                    height: 2048
                    dpi: 144
                    colorspace: sRGB
                exif:
                    Make: Canon
                    Model: EOS R5
                    DateTimeOriginal: 2024:08:15 14:22:01
        IiifImageInfo:
            type: object
            description: |
                IIIF Image API 2.0 **image information** document — the standard
                reply to a `/info.json` request, defined by the [IIIF Image API
                2.0 specification](https://iiif.io/api/image/2.0/#image-information).

                fylr serves this document so any IIIF-aware client (Mirador,
                Universal Viewer, OpenSeadragon, ...) can discover the image's
                dimensions, supported tile sizes and feature profile.
            required:
                - '@context'
                - '@id'
                - protocol
                - width
                - height
                - profile
            properties:
                '@context':
                    type: string
                    enum:
                        - http://iiif.io/api/image/2/context.json
                    description: JSON-LD context — always the IIIF Image API 2 URL.
                '@id':
                    type: string
                    format: uri
                    description: |
                        The image's IIIF service URL — `/info.json` without the
                        `/info.json` suffix.
                protocol:
                    type: string
                    enum:
                        - http://iiif.io/api/image
                    description: The IIIF protocol URI.
                width:
                    type: integer
                    description: The image's native width, in pixels.
                height:
                    type: integer
                    description: The image's native height, in pixels.
                profile:
                    type: array
                    description: |
                        Two-element array — the first item is a compliance-level URI
                        (`http://iiif.io/api/image/2/level1.json`, `level2.json`, ...);
                        the second (optional) is a free-form object describing the
                        additional features the service supports beyond the level.
                    items: {}
                tiles:
                    type: array
                    description: |
                        The tile geometries the service is willing to serve directly.
                        Clients use these to assemble deep-zoom mosaics without
                        downloading the full image.
                    items:
                        type: object
                        required:
                            - width
                            - scaleFactors
                        properties:
                            width:
                                type: integer
                                description: Tile width, in pixels (square unless `height` is given).
                            height:
                                type: integer
                                description: Tile height, in pixels. Defaults to `width`.
                            scaleFactors:
                                type: array
                                items:
                                    type: integer
                                description: |
                                    The downscaling factors the service can produce for these
                                    tiles (powers of two — `[1, 2, 4, 8, 16]`).
                sizes:
                    type: array
                    description: |
                        Pre-rendered fixed sizes the service can serve at full quality.
                        Clients should request from this list when they only need a
                        whole-image thumbnail.
                    items:
                        type: object
                        properties:
                            width:
                                type: integer
                            height:
                                type: integer
                service:
                    type: array
                    description: |
                        Optional related services (auth, search, ...) advertised by
                        the image. Shape is service-dependent.
                    items:
                        type: object
                        additionalProperties: true
        ObjectsError:
            type: object
            description: |
                Error returned by `GET`/`HEAD /api/v1/objects/*` when the deep-link
                request cannot be served.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code:

                          * `DeepLinkAccessDisabled` — deep-link access is turned off in
                            the base config (`system.deep_link_access.enabled = false`).
                            Returned before any path parsing.
                          * `DeepLinkAccessByIdDisabled` — an `id/<system-object-id>`
                            selector was used while `system.deep_link_access.allow_access_by_id`
                            is off.
                          * `DeepLinkAccessByColumnDisabled` — a `column/...` selector was
                            used while `system.deep_link_access.allow_access_by_column` is
                            off.
                          * `ApiObjectPath` — the selector path is malformed or the
                            addressed object/version/column cannot be resolved (e.g. no
                            object found, a column value matching multiple objects, an
                            unknown format or path element). The message embeds the
                            offending path.
                          * `FileNotFound` — a `file/...` selector addressed a file that
                            does not exist (`statuscode: 404`).
                          * `FileVersionNotAvailable` — the requested
                            `file_version/name/<name>` is not among the file's available
                            versions.
                          * `FileGroupNotAvailable` — the requested
                            `file_version/group/<group>` has no matching version for the
                            file.
                    enum:
                        - DeepLinkAccessDisabled
                        - DeepLinkAccessByIdDisabled
                        - DeepLinkAccessByColumnDisabled
                        - ApiObjectPath
                        - FileNotFound
                        - FileVersionNotAvailable
                        - FileGroupNotAvailable
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    enum:
                        - api
                        - export
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`. `DeepLinkAccessDisabled`
                        originates in `api`; the remaining codes originate in `export`.
                parameters:
                    type: object
                    additionalProperties: true
                realm:
                    type: string
                    enum:
                        - api
                statuscode:
                    type: integer
                    enum:
                        - 400
                        - 404
            example:
                code: DeepLinkAccessDisabled
                error: |-
                    The deep link access needs to be enabled in the base config.

                    Package: api
                    Code: DeepLinkAccessDisabled
                package: api
                parameters:
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        OaiError:
            type: object
            description: |
                Error returned by `/api/v1/oai` when the OAI-PMH endpoint is
                disabled at the instance level (HTTP 400). Protocol-level errors
                (bad `verb`, unknown identifier, ...) are encoded inside the XML
                body per the OAI-PMH 2.0 specification and carry the matching
                HTTP status (400 / 404 / 500) — they do **not** use this schema.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code:

                          * `OAIpmhNotEnabled` — the instance has the OAI-PMH
                            endpoint turned off in its base config
                            (`fylr.oai_pmh.enabled = false`).
                    enum:
                        - OAIpmhNotEnabled
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    enum:
                        - api
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                realm:
                    type: string
                    enum:
                        - api
                statuscode:
                    type: integer
                    enum:
                        - 400
            example:
                code: OAIpmhNotEnabled
                error: |-
                    The OAI/PMH endpoint is not enabled.

                    Package: api
                    Code: OAIpmhNotEnabled
                package: api
                parameters:
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        WebdavError:
            type: object
            description: |
                Error returned by `/api/v1/WebDAV/*` when the WebDAV endpoint is
                disabled at the instance level. Per-resource failures inside the
                WebDAV protocol (404, 423 lock-conflict, 207 multi-status with
                per-property errors) follow RFC 4918 and do **not** use this
                schema.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code:

                          * `WebdavNotEnabled` — the instance has the WebDAV
                            endpoint turned off in its base config
                            (`webdav.read_write_access = false`).
                    enum:
                        - WebdavNotEnabled
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    enum:
                        - api
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                realm:
                    type: string
                    enum:
                        - api
                statuscode:
                    type: integer
                    enum:
                        - 503
            example:
                code: WebdavNotEnabled
                error: |-
                    WebDAV access is not enabled

                    Package: api
                    Code: WebdavNotEnabled
                package: api
                parameters:
                    realm: api
                    statuscode: 503
                realm: api
                statuscode: 503
        RightPresetError:
            type: object
            description: |
                Error returned by `POST /api/v1/right/{context}/presets` when a
                preset cannot be saved. The codes here come from the right-check
                pipeline that validates each preset against the rights catalog
                for the addressed context before storage.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code raised by the rightcheck
                        pipeline:

                          * `UnknownRight` — the preset references a right name that
                            does not exist in the addressed context. `parameters.right`
                            carries the offending name, `parameters.context` the
                            context.
                          * `UnknownRightParam` — the preset sets a parameter that
                            the addressed right does not declare. `parameters.param`
                            carries the offending name, `parameters.right` /
                            `parameters.right_displayname` identify the right.
                          * `UnknownRightValue` — a parameter's value is not in the
                            right's `choices` (or fails the right's value validation).
                            `parameters.value` carries what was sent.
                          * `ChoiceNotUnique` — the preset enables more than one
                            option of a `choice` right; only one may be set.
                            `parameters.choice` identifies the choice group.

                        Generic 400 codes from the server pipeline (request parsing,
                        `ReadOnlyMode`, ...) may also surface here.
                    enum:
                        - UnknownRight
                        - UnknownRightParam
                        - UnknownRightValue
                        - ChoiceNotUnique
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`. Right-validation codes
                        carry `rightcheck`; generic server errors (e.g. an unknown context)
                        carry `ferrors`.
                parameters:
                    type: object
                    additionalProperties: true
                realm:
                    type: string
                    enum:
                        - api
                statuscode:
                    type: integer
                    enum:
                        - 400
            example:
                code: UnknownRight
                error: |-
                    The right "supervise" is not known in context "object"

                    Package: rightcheck
                    Code: UnknownRight
                package: rightcheck
                parameters:
                    right: supervise
                    context: object
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        WhoApi:
            type: object
            description: |
                **Who** — references a principal an ACL grant addresses (or names
                the owner of an object). Exactly one of `_owner`, `_pool_contact`,
                `user`, `group` resolves; the rest are absent.
            properties:
                _basetype:
                    type: string
                    enum:
                        - user
                        - group
                    description: |
                        The principal kind. Required for `user` / `group` references;
                        absent for `_owner` / `_pool_contact` synthetic principals.
                _owner:
                    type: boolean
                    description: |
                        When `true`, the grant addresses *whoever currently owns* the
                        resource (a synthetic principal that resolves per-object).
                _pool_contact:
                    type: boolean
                    description: |
                        When `true`, the grant addresses the pool's configured contact
                        user. Only valid for grants on objects living in a pool.
                user:
                    type: object
                    description: |
                        A specific user reference. Must carry either `_id` or
                        `lookup:_id`. Other fields (`login`, `type`,
                        `frontend_language`, `_generated_displayname`, ...) mirror the
                        embedded user record; `additionalProperties: true` reflects
                        that on read fylr returns a UserDataApi snapshot which carries
                        many optional fields beyond `_id`.
                    properties:
                        _id:
                            type: integer
                            format: int64
                        lookup:_id:
                            description: |
                                Reference-based lookup for the user. Resolved server-side.
                            allOf:
                                - $ref: '#/components/schemas/LookupByReference'
                        _generated_displayname:
                            type: string
                            description: |
                                Read-only compiled displayname for the user (login,
                                first/last name fallback chain).
                    additionalProperties: true
                group:
                    type: object
                    description: |
                        A specific group reference. Must carry either `_id` or
                        `lookup:_id`.
                    properties:
                        _id:
                            type: integer
                            format: int64
                        lookup:_id:
                            description: |
                                Reference-based lookup for the group. Resolved server-side.
                            allOf:
                                - $ref: '#/components/schemas/LookupByReference'
                        _generated_displayname:
                            type: string
                            description: Read-only compiled displayname for the group.
        RightApi:
            type: object
            description: |
                An **ACL grant** — one entry of an `_acl` array. Combines a
                principal (`who`), a set of rights with per-right configuration
                (`rights`), an optional time window (`when`) and an optional tag
                filter (`tagfilter`).
            required:
                - who
                - rights
            properties:
                _id:
                    type: integer
                    format: int64
                    description: |
                        Server-issued numeric id of the grant. Stable across updates;
                        absent when the grant is being created.
                who:
                    $ref: '#/components/schemas/WhoApi'
                sticky:
                    type: boolean
                    description: |
                        Sticky grants cannot be removed by lower-privileged updates —
                        a write that omits a sticky grant from the new ACL keeps it
                        in place. Only `system.root` (or another grant marked sticky
                        with `_grantable`) can clear a sticky grant.
                active:
                    type: boolean
                    nullable: true
                    description: |
                        Whether the grant is currently effective. Defaults to `true`
                        when omitted. Setting `false` suspends the grant without
                        deleting it. The capability map on the rights catalog says
                        which contexts respect `active`.
                _right_preset:
                    type: integer
                    format: int64
                    description: |
                        Id of the preset this grant was instantiated from (zero /
                        omitted for hand-crafted grants).
                when:
                    type: object
                    description: |
                        Optional time window outside of which the grant is treated
                        as inactive. Both bounds are ISO 8601 timestamps; either or
                        both may be omitted.
                    properties:
                        from:
                            type: string
                            format: date-time
                            description: Grant takes effect at or after this timestamp.
                        to:
                            type: string
                            format: date-time
                            description: Grant expires after this timestamp.
                rights:
                    type: object
                    description: |
                        Map of right name → per-right configuration. Keys are the
                        right names from the rights catalog
                        (`/api/v1/right`); each value is a `RightItemApi`.
                    additionalProperties:
                        $ref: '#/components/schemas/RightItemApi'
                tagfilter:
                    $ref: '#/components/schemas/TagfilterApi'
                send_email_notification:
                    type: object
                    description: |
                        Write-only — when set on creation, fylr sends a notification
                        email to the affected participants. Not part of the read
                        shape.
                    required:
                        - text
                    properties:
                        text:
                            type: string
                            description: Plain-text body of the notification email.
        RightItemApi:
            type: object
            description: |
                One **right item** inside an ACL grant — the per-right
                configuration that scopes the right (which masks, objecttypes,
                pools, file classes / extensions / versions it applies to) and
                whether the grant is grantable downward.

                A `RightApi.rights` value is a map of right name → `RightItemApi`.
                Unset fields mean "no constraint" (apply to all); set to an empty
                array means "no value matches" (effectively disabled). The
                per-field constraint semantics depend on the right — see the
                rights catalog (`GET /api/v1/right`).
            properties:
                _grantable:
                    type: boolean
                    description: |
                        If true, the grantee may grant this right onward to others.
                allow_update_and_remove:
                    type: boolean
                    description: |
                        For `update` / `remove` style rights, allow the grantee to
                        both modify and remove the resource (or only modify when
                        false).
                classes:
                    type: array
                    items:
                        type: string
                    description: |
                        Restrict to specific EAS classes (`image`, `document`, ...).
                        `null` / absent means any class.
                extensions:
                    type: array
                    items:
                        type: string
                    description: |
                        Restrict to specific file extensions. `null` / absent means
                        any extension.
                versions:
                    type: array
                    items:
                        type: string
                    description: |
                        Restrict to specific version names (`original`, `preview`,
                        `thumbnail`, ...). `null` / absent means any version.
                limit:
                    type: integer
                    format: int64
                    description: |
                        Upload size cap, in bytes (parsed from human-readable strings
                        like `"10MB"` on input). `0` means no cap.
                mask_ids:
                    type: object
                    description: |
                        Per-objecttype mask restriction. Map of objecttype api id to
                        an array of mask api ids (or the string `"standard"` for the
                        objecttype's standard mask).
                    additionalProperties:
                        type: array
                        items: {}
                column_ids:
                    type: array
                    items:
                        type: integer
                        format: int64
                    description: |
                        Restrict to specific column api ids. Empty array matches all
                        columns; absent means no constraint.
                objecttype_ids:
                    type: array
                    items:
                        type: integer
                        format: int64
                    description: |
                        Restrict to specific objecttype api ids.
                pool_ids:
                    type: array
                    items:
                        type: integer
                        format: int64
                    description: |
                        Restrict to specific pool ids. Empty array matches all pools;
                        absent means no constraint.
        TagfilterApi:
            type: object
            description: |
                **Tag filter** — a three-way set predicate over tag ids. Used by
                ACL grants, right presets and transitions to limit applicability
                to objects carrying (or not carrying) specific tags.

                A match succeeds when **all** non-empty conditions hold: every id
                in `all` is present on the object, *at least one* id in `any` is
                present, and *no* id in `not` is present.
            properties:
                all:
                    type: array
                    items:
                        type: integer
                        format: int64
                    description: Every listed tag must be present on the object.
                any:
                    type: array
                    items:
                        type: integer
                        format: int64
                    description: |
                        At least one listed tag must be present. Empty / absent means
                        "no any-constraint".
                not:
                    type: array
                    items:
                        type: integer
                        format: int64
                    description: None of the listed tags may be present.
                changed:
                    type: array
                    items:
                        type: integer
                        format: int64
                    description: |
                        Only used by transitions — the tags whose addition / removal
                        should *trigger* the transition. Omitted everywhere else.
        SystemFieldApi:
            type: object
            description: |
                Per-mask configuration for the **system fields** — the fields fylr
                attaches to every object regardless of the user datamodel
                (`_id_parent`, `_id`, `_tags`, `_acl`, `_owner`, `_pool`,
                `_collections`, `_publish`). Each present key carries the visibility
                / inline / edit settings the mask applies to that system field.
                Only present on top-level masks; sub-masks inherit.
            properties:
                parent:
                    description: Settings for the `_id_parent` field (hierarchical link).
                    allOf:
                        - $ref: '#/components/schemas/SystemFieldDefApi'
                object_id:
                    description: Settings for the `_id` (system object id) field.
                    allOf:
                        - $ref: '#/components/schemas/SystemFieldDefApi'
                tags:
                    description: Settings for the `_tags` field.
                    allOf:
                        - $ref: '#/components/schemas/SystemFieldDefApi'
                acl:
                    description: Settings for the `_acl` field.
                    allOf:
                        - $ref: '#/components/schemas/SystemFieldDefApi'
                owner:
                    description: Settings for the `_owner` field.
                    allOf:
                        - $ref: '#/components/schemas/SystemFieldDefApi'
                pool:
                    description: Settings for the `_pool` field.
                    allOf:
                        - $ref: '#/components/schemas/SystemFieldDefApi'
                collections:
                    description: Settings for the `_collections` field.
                    allOf:
                        - $ref: '#/components/schemas/SystemFieldDefApi'
                publish:
                    description: Settings for the `_publish` field.
                    allOf:
                        - $ref: '#/components/schemas/SystemFieldDefApi'
        SystemFieldDefApi:
            type: object
            description: |
                Per-system-field rendering / editing options on a mask. Each key
                controls one aspect of how the corresponding system field is
                presented in the front-end. All sub-fields are optional; omitted
                entries mean "use the default behaviour".
            properties:
                inline:
                    type: string
                    description: |
                        Inline rendering directive — when set, the front-end embeds
                        the system field's value alongside other fields rather than
                        in the standard sidebar. Recognised values are
                        front-end-defined.
                mask_id:
                    description: |
                        Mask the system field should render through (when the field
                        links to objects of another type, like `_owner`). Either an
                        integer mask id or the special string `"standard"`.
                    oneOf:
                        - type: integer
                          format: int64
                        - type: string
                          enum:
                            - standard
                output:
                    description: Output (detail / table / text) display mode for the field.
                    allOf:
                        - $ref: '#/components/schemas/SystemFieldDefModeApi'
                edit:
                    description: Edit mode for the field (`edit` / `show` / `off`).
                    allOf:
                        - $ref: '#/components/schemas/SystemFieldDefModeApi'
        SystemFieldDefModeApi:
            type: object
            description: |
                Per-mode display setting for a system field (output or edit). Used
                inside `SystemFieldDefApi.output` / `.edit`.
            properties:
                mode:
                    type: string
                    description: |
                        The mode the system field should use in this context.
                        Recognised values include `show`, `edit`, `off`,
                        `hide`, `inline`. The set is front-end-defined; unknown
                        values are silently ignored by the editor.
        SuggestRequest:
            type: object
            description: |
                Auto-suggest request — accepted as the JSON request body of
                `POST /api/v1/suggest`, and as the value of the `BODY` query
                parameter on `GET /api/v1/suggest`. Drives token and / or field
                completion through the search index.

                Each result kind is opted into independently: token suggestions
                (`tokens`, on by default unless `tokens` is `false`), per-field
                value matches (`fields_suggest: true`, which also needs a non-empty
                `fields`), and linked-object descriptors (a non-null
                `linked_objecttypes`).
            properties:
                query:
                    type: string
                    description: |
                        The user's current input. Optional; defaults to the empty
                        string. Tokenised (whitespace-split) unless
                        `tokens_dont_split_query` is set. The last token is treated as
                        the partial term to complete.
                tokens_dont_split_query:
                    type: boolean
                    default: false
                    description: |
                        If true, the query is sent verbatim — the engine does not split
                        it on whitespace. Useful when the input is a multi-word phrase
                        that should match as a single token.
                tokens:
                    type: boolean
                    nullable: true
                    description: |
                        If true, null, or omitted, return token completions in
                        `suggestions.tokens`. Set to false to suppress them. Independent
                        of `fields_suggest`.
                fields:
                    type: array
                    items:
                        type: string
                    description: |
                        Field paths whose values should be considered as completion
                        candidates. Each entry is a fully-qualified field name
                        (e.g. `picture.title`, `_tags.tag.name`). Must be non-empty to
                        get any per-field suggestions: combining `fields_suggest: true`
                        with an empty `fields` yields no `suggestions.fields` (it is a
                        silent no-op, not an error).
                fields_suggest:
                    type: boolean
                    default: false
                    description: |
                        If true, also return per-field completions in
                        `suggestions.fields` — one entry per matching value, with the
                        list of system-object ids that hold it.
                objecttypes:
                    type: array
                    items:
                        type: string
                    description: |
                        Restrict suggestions to objects of these objecttypes. Empty /
                        omitted means no restriction.
                pool_ids:
                    type: array
                    items:
                        type: integer
                        format: int64
                    description: |
                        Restrict suggestions to objects in exactly these pools — there
                        is no automatic sub-pool inclusion. Empty / omitted means no
                        restriction.
                languages:
                    type: array
                    items:
                        type: string
                    description: |
                        Restrict token / field matching to these language-tagged
                        sub-fields (e.g. `de-DE`, `en-US`). Empty means consider all
                        languages enabled on the instance.
                linked_objecttypes:
                    type: array
                    nullable: true
                    items:
                        type: string
                    description: |
                        If set, the engine also returns `linked_objects` — full
                        `ObjectApi` entries of the named objecttypes that match the
                        query. By default every match is returned, referenced or not;
                        set `linked_objects_referenced_by_objecttypes` to keep only the
                        ones actually in use. Useful for autocomplete pickers that need
                        to show the target object inline.
                linked_objects_referenced_by_objecttypes:
                    type: array
                    nullable: true
                    items:
                        type: string
                    description: |
                        Opt-in filter for `linked_objects`. When set, a linked-object
                        suggestion is kept only if at least one record of these
                        objecttypes links to it (directly, nested or reverse — the
                        `_linked.<ot>._id` closure the "in" filter queries when a
                        suggestion is clicked), so selecting the suggestion as a search
                        filter over these objecttypes always yields results. Absent /
                        empty returns every match. Pass the objecttypes the caller will
                        actually filter on click — kept separate from `objecttypes` on
                        purpose, since `objecttypes` may be widened with the linked
                        objecttypes so token matches inside linked objects are found.
                analyze_wildcards:
                    type: boolean
                    default: false
                    description: |
                        If true, the query string is interpreted as a wildcard pattern
                        (`*` and `?`) rather than a prefix. Applies to token
                        suggestions only; the field and linked-object searches ignore
                        it.
                tokens_mode:
                    type: string
                    enum:
                        - ""
                        - ngram
                        - edgengram
                        - exact
                    description: |
                        Token-matching mode. One of:

                          * `` (empty) / `ngram` — substring match (default).
                          * `edgengram` — prefix match.
                          * `exact` — exact-term match.

                        Any other value is rejected with a 400.
                timeout:
                    type: integer
                    description: |
                        Per-request timeout in milliseconds passed through to the
                        search index. Zero / omitted uses the indexer's default.
                limit:
                    type: integer
                    default: 10
                    description: |
                        Maximum number of suggestions to return (per kind). Defaults
                        to 10 when unset or zero.
            example:
                query: fahr
                fields:
                    - objects.title_loca
                fields_suggest: true
        SuggestResponse:
            type: object
            description: |
                Auto-suggest response — returned by `GET /api/v1/suggest` and
                `POST /api/v1/suggest`. Carries diagnostic timing info plus a
                `suggestions` envelope with the three optional result sets the
                request opted into.
            required:
                - suggestions
            properties:
                es_time:
                    type: integer
                    format: int64
                    description: |
                        Time the search index spent on the request, in milliseconds.
                        Excludes fylr-side serialisation overhead.
                timed_out:
                    type: boolean
                    description: |
                        True if the request reached the per-request `timeout`. Partial
                        results may still be present in `suggestions`.
                suggestions:
                    type: object
                    description: |
                        Result envelope. Each sub-field is present only when its
                        matching request flag opted in: `tokens` is present unless
                        `tokens` was `false`; `fields` is present when `fields_suggest`
                        is true; `linked_objects` is present whenever
                        `linked_objecttypes` is non-null (an empty `linked_objecttypes`
                        array yields an empty `linked_objects` list).
                    properties:
                        tokens:
                            type: array
                            nullable: true
                            items:
                                type: object
                                required:
                                    - suggest
                                    - tokens
                                    - count
                                properties:
                                    suggest:
                                        type: string
                                        description: |
                                            The rendered suggestion with the matched prefix
                                            wrapped in `<b>...</b>` tags — ready to drop into
                                            the front-end picker.
                                    tokens:
                                        type: array
                                        items:
                                            type: string
                                        description: |
                                            The individual tokens this suggestion is composed of
                                            (front-end uses this for keyboard navigation).
                                    count:
                                        type: integer
                                        description: Number of indexed documents the term occurs in.
                        fields:
                            type: array
                            nullable: true
                            items:
                                type: object
                                required:
                                    - field
                                    - suggest
                                    - count
                                properties:
                                    field:
                                        type: string
                                        description: |
                                            The complete matched field value, in plain text
                                            (HTML-unescaped). This is the value itself, not the
                                            field path the request asked for.
                                    suggest:
                                        type: string
                                        description: |
                                            The same value, HTML-escaped, with the matched part
                                            wrapped in `<b>...</b>` tags — ready to drop into the
                                            front-end picker.
                                    count:
                                        type: integer
                                        description: |
                                            Number of indexed documents that hold the value at
                                            that field.
                                    _system_object_id:
                                        type: array
                                        items:
                                            type: integer
                                            format: int64
                                        description: |
                                            System-object ids of the matching documents — capped
                                            by the request's `limit`. Lets the front end jump
                                            straight to the underlying object.
                        linked_objects:
                            type: array
                            nullable: true
                            items:
                                type: object
                                additionalProperties: true
                            description: |
                                Full object descriptors of the linked objects whose
                                objecttypes are in `linked_objecttypes`. Each entry is an
                                `ObjectApi` rendered in the search "standard" format — a
                                `_standard` map keyed by mask id, mirroring the search
                                output. Only objects that a record of the searched
                                `objecttypes` actually links to are returned, so selecting
                                one as a search filter yields results. Useful for picker
                                UIs that need to render a label alongside the suggestion.
                                Present whenever `linked_objecttypes` is non-null; an empty
                                `linked_objecttypes` array yields an empty list.
            example:
                suggestions:
                    tokens:
                        - suggest: <b>fahr</b>bar
                          tokens:
                            - fahrbar
                          count: 1
                        - suggest: <b>fahr</b>rad
                          tokens:
                            - fahrrad
                          count: 1
                    fields:
                        - field: fahrrad
                          suggest: <b>fahrrad</b>
                          count: 1
                          _system_object_id:
                            - 100
                        - field: fahrbar
                          suggest: <b>fahrbar</b>
                          count: 1
                          _system_object_id:
                            - 101
                    linked_objects:
                        - _standard:
                            "1":
                                text:
                                    de-DE: henk 18
        GroupError:
            type: object
            description: |
                Error returned by `/api/v1/group*` endpoints when the request cannot
                be processed.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code:

                          * `DeleteSystemGroup` — attempt to delete a group whose `type` is
                            `system`. System groups cannot be deleted.
                          * `GroupTypeNotAllowed` — the requested group `type` is not allowed
                            on create. In practice this is raised for `type: system`;
                            `parameters.type` carries the offending value.
                          * `GroupTypeChangeNotAllowed` — the group `type` cannot be
                            changed after the group exists.

                        Other 400 codes from the server pipeline may also surface here, for
                        example `ReadOnlyMode` (the instance is in read-only mode) and
                        `VersionMismatch` (on update, the supplied `group._version` does not
                        equal the stored version + 1).
                    enum:
                        - DeleteSystemGroup
                        - GroupTypeNotAllowed
                        - GroupTypeChangeNotAllowed
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                    description: Machine-readable, code-specific details.
                realm:
                    type: string
                    enum:
                        - api
                    description: The realm the error originates from. Always `api`.
                statuscode:
                    type: integer
                    enum:
                        - 400
                    description: Always `400`.
            example:
                code: GroupTypeNotAllowed
                error: |-
                    The group type "system" is not allowed

                    Package: acl
                    Code: GroupTypeNotAllowed
                package: acl
                parameters:
                    type: system
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        PoolError:
            type: object
            description: |
                Error returned by `/api/v1/pool*` endpoints when the request cannot
                be processed.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code. The pool endpoints raise:

                          * `IllegalPathForPool` — the requested parent placement would
                            make a pool its own parent/descendant. Raised on POST/PUT.
                            `parameters.id` is the offending pool id.
                          * `UnableToSetIsSystemPool` — `is_system_pool` cannot be set or
                            changed through the API; system pools are seeded at install
                            time only. Raised on POST/PUT.
                          * `PoolNotEmpty` — DELETE was attempted on a pool that still
                            contains objects (directly or via sub-pools).
                            `parameters.stats` lists the non-empty objecttypes.
                          * `PoolNeedsParent` — a non-root pool was saved without a
                            parent; pools cannot be saved at the top-level root.

                        Other 400 codes from the server pipeline may also surface here.
                    enum:
                        - IllegalPathForPool
                        - UnableToSetIsSystemPool
                        - PoolNotEmpty
                        - PoolNeedsParent
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`. Different pool errors
                        carry different origins (e.g. `pool`, `api`, `rightcheck`).
                parameters:
                    type: object
                    additionalProperties: true
                realm:
                    type: string
                    enum:
                        - api
                statuscode:
                    type: integer
                    enum:
                        - 400
            example:
                code: IllegalPathForPool
                error: |-
                    The pool #42 contains itself as parent and cannot be saved

                    Package: pool
                    Code: IllegalPathForPool
                package: pool
                parameters:
                    id: 42
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        ObjecttypeError:
            type: object
            description: |
                Error returned by `POST /api/v1/objecttype` when the submitted
                objecttype cannot be saved.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code raised by the objecttype
                        package. Both codes come from resolving an
                        `_export_asset_filenames` template:

                          * `UnknownField` — the template references a field name that
                            does not exist on the objecttype. `parameters.field` carries
                            the offending api field name. Message: `Unknown field
                            <field>`.
                          * `UnsupportedFieldType` — the template references a field that
                            is neither a files column nor a link to an objecttype that has
                            a files column. `parameters.field` and `parameters.type` carry
                            the field name and its column type. Message: `Unsupported type
                            <type> for field <field>`.

                        These are common values, not an exhaustive list: other 400 codes
                        from the save pipeline and the datamodel validator may also
                        surface here (see the operation's 400 description).
                    enum:
                        - UnknownField
                        - UnsupportedFieldType
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    enum:
                        - objecttype
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                realm:
                    type: string
                    enum:
                        - api
                statuscode:
                    type: integer
                    enum:
                        - 400
            example:
                code: UnknownField
                error: |-
                    Unknown field subtitel

                    Package: objecttype
                    Code: UnknownField
                package: objecttype
                parameters:
                    field: subtitel
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        DatamodelError:
            type: object
            description: |
                Error returned by the datamodel endpoints
                (`POST /api/v1/mask/HEAD`, `POST /api/v1/schema/user/HEAD`,
                `POST /api/v1/schema/commit`, and `GET /api/v1/schema/user/{version}`)
                when the submitted datamodel cannot be saved or committed, or the
                requested version does not exist.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code raised by the datamodel
                        validator. The list grows with each fylr release; treat unknown
                        values as opaque.

                          * `InvalidIdentifier` — an objecttype / mask / column name
                            does not match the identifier regex
                            (`^[a-z][a-z0-9\-_]{0,128}[a-z0-9]$`).
                          * `SchemaDuplicateObjecttypeName` — two objecttypes share a
                            name.
                          * `SchemaDuplicateMaskName` — two masks on the same
                            objecttype share a name.
                          * `ObjecttypeMustHaveExtactlyOnePreferredMask` — exactly one
                            mask per objecttype must have `is_preferred: true`. (The
                            wire spelling has the historical `Extactly` typo.)
                          * `LinkMaskNotFound` — a link column references a mask that
                            does not exist on the linked objecttype.
                          * `UnknownColumnType` — a column requests a type unknown to
                            this fylr release (or to the loaded plugins).
                          * `TypeChangeUnsupported` — an existing column's type
                            cannot be changed to the requested one — the conversion
                            path isn't implemented.
                          * `InvalidMaskMode` — a mask declares an unknown `mode`
                            value.
                          * `InheritanceNotSupported` — a mask attempts to inherit
                            from another mask in a way the datamodel does not allow
                            (cross-objecttype inheritance, cyclic inheritance, ...).
                          * `SchemaLoopingReverse` — a reverse-link column closes a
                            loop the indexer cannot resolve.
                          * `DatamodelVersionNotFound` — the requested datamodel
                            version does not exist (for example
                            `GET /schema/user/{version}` with an unknown or
                            non-positive version).
                          * `ObjecttypeNotEmpty` — a commit / HEAD write would delete
                            an objecttype that still holds objects; `parameters` names
                            the affected objecttypes.

                        Other 400 codes from the server pipeline (request parsing,
                        `ReadOnlyMode`, ...) may also surface here, and `package` is not
                        always `datamodel` (for example `ObjecttypeNotEmpty` is package
                        `api`, `ReadOnlyMode` is `ferrors`).
                    enum:
                        - InvalidIdentifier
                        - SchemaDuplicateObjecttypeName
                        - SchemaDuplicateMaskName
                        - ObjecttypeMustHaveExtactlyOnePreferredMask
                        - LinkMaskNotFound
                        - UnknownColumnType
                        - TypeChangeUnsupported
                        - InvalidMaskMode
                        - InheritanceNotSupported
                        - SchemaLoopingReverse
                        - DatamodelVersionNotFound
                        - ObjecttypeNotEmpty
                        - ReadOnlyMode
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`. (Not always `datamodel`
                        — pipeline errors carry their own origin, e.g. `api` or `ferrors`.)
                parameters:
                    type: object
                    additionalProperties: true
                realm:
                    type: string
                    enum:
                        - api
                statuscode:
                    type: integer
                    enum:
                        - 400
            example:
                code: SchemaDuplicateObjecttypeName
                error: |-
                    Objecttype "picture" is declared twice

                    Package: datamodel
                    Code: SchemaDuplicateObjecttypeName
                package: datamodel
                parameters:
                    name: picture
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        MessageError:
            type: object
            description: |
                Error returned by `/api/v1/message*` endpoints when the request
                cannot be processed.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code:

                          * `StartTimeAfterEndTime` — the message's `start_time` is
                            after its `end_time`; the validity window is empty.
                          * `VersionMismatch` — on update, the supplied `_version` was
                            not the stored version + 1.

                        Other 400 codes from the server pipeline (request parsing, ...)
                        may also surface here.
                    enum:
                        - StartTimeAfterEndTime
                        - VersionMismatch
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    enum:
                        - message
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                realm:
                    type: string
                    enum:
                        - api
                statuscode:
                    type: integer
                    enum:
                        - 400
            example:
                code: StartTimeAfterEndTime
                error: |-
                    The given start time 2000-01-01 00:00:00 +0000 UTC is after the given end time 1999-01-01 00:00:00 +0000 UTC

                    Package: message
                    Code: StartTimeAfterEndTime
                package: message
                parameters:
                    starttime: "2000-01-01T00:00:00Z"
                    endtime: "1999-01-01T00:00:00Z"
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        EventError:
            type: object
            description: |
                Error returned by `/api/v1/event*` write endpoints when the request
                cannot be processed.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code. The event-specific code is:

                          * `EventTypeNotAllowed` — the `type` in the payload is not one of
                            the user-event types that may be written through the API (i.e. it
                            is not a FRONTEND/PLUGIN type and `skip_constraints` was not set
                            by a root caller). `parameters.type` carries the offending value.

                        This is not a closed set: other `400` codes from the server pipeline
                        (e.g. JSON-decode or validation failures, the non-root
                        `skip_constraints` error) and the shared `401`/`403` codes can also
                        surface on these endpoints.
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    enum:
                        - userevent
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                realm:
                    type: string
                    enum:
                        - api
                statuscode:
                    type: integer
                    enum:
                        - 400
            example:
                code: EventTypeNotAllowed
                error: |-
                    The event type OBJECT_INSERT is not allowed

                    Package: userevent
                    Code: EventTypeNotAllowed
                package: userevent
                parameters:
                    type: OBJECT_INSERT
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        ExportError:
            type: object
            description: |
                Error returned by `/api/v1/export*` endpoints when the request
                cannot be processed.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code raised by the export
                        package:

                          * `ExportDuplicateName` — another export owned by the same
                            user already uses the requested `name` (statuscode `409`).
                            `parameters.name` carries the conflicting value.
                          * `FileNotFound` — a download path addressed a file that
                            does not exist in the export (statuscode `404`).
                            `parameters.file` carries the requested path.
                          * `FileNotDone` — the download was attempted while the
                            file being exported is not yet in status `done`.
                            `parameters.file` and `parameters.status` describe it.
                          * `FileVersionNotAvailable` — a request pointed at a
                            historic export run that has been cleaned up.
                          * `FileGroupNotAvailable` — the export run's grouping
                            structure no longer matches the requested path inside
                            the archive.
                          * `DeepLinkAccessByIdDisabled` — the export references
                            objects by id and the instance has deep-link-by-id
                            access disabled.
                          * `DeepLinkAccessByColumnDisabled` — same but for
                            deep-link-by-column access.
                          * `WarningExportFile` — a non-fatal warning surfaced
                            during a download — the response carries the message
                            so the front end can show it next to the file.
                          * `ApiObjectPath` — an invalid api-object path was
                            requested inside an export archive.

                        Other 400 codes from the server pipeline may also surface here.
                        Most of these codes are `400`; `ExportDuplicateName` is `409`
                        and `FileNotFound` is `404` — see `statuscode`.
                    enum:
                        - ExportDuplicateName
                        - FileNotFound
                        - FileNotDone
                        - FileVersionNotAvailable
                        - FileGroupNotAvailable
                        - DeepLinkAccessByIdDisabled
                        - DeepLinkAccessByColumnDisabled
                        - WarningExportFile
                        - ApiObjectPath
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    enum:
                        - export
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                realm:
                    type: string
                    enum:
                        - api
                statuscode:
                    type: integer
                    enum:
                        - 400
                        - 404
                        - 409
                    description: |
                        HTTP status, repeated here. `409` for `ExportDuplicateName`;
                        `404` for `FileNotFound`; `400` for the remaining
                        download / validation codes.
            example:
                code: ExportDuplicateName
                error: |-
                    Export name "weekly-press-kit" already exists

                    Package: export
                    Code: ExportDuplicateName
                package: export
                parameters:
                    name: weekly-press-kit
                    realm: api
                    statuscode: 409
                realm: api
                statuscode: 409
        PublishError:
            type: object
            description: |
                Error returned by `/api/v1/publish*` write endpoints when a
                publication cannot be created or updated.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code raised by the object /
                        publish pipeline:

                          * `PublishUnknownCollector` — the `collector` named in the
                            payload is not configured in this instance (checked first).
                            The base config registers the collectors that are valid
                            here. `parameters.collector` carries the offending value.
                            Message: `The collector "<name>" unknown and cannot be used.
                            It must be configured in the base config.`
                          * `PublishInvalidData` — `publish_uri` or `easydb_uri` is
                            missing or blank (the value is whitespace-trimmed and must
                            be non-empty). `parameters.field` is `publish_uri` or
                            `easydb_uri`; `parameters.value` is the empty string.
                            Message: `The value "" of field "<field>" is invalid.`
                          * `PublishDeletedObject` — the targeted object has been
                            (soft-)deleted and cannot receive a new publication.
                            `parameters.object` is the `#<system_object_id>` token.
                            Message: `Unable to publish deleted object "<object>".`

                        A read-only instance is rejected before any of these checks with
                        `ReadOnlyMode` (`package: ferrors`), returned as the standard
                        `Error` envelope, not as a `PublishError`.
                    enum:
                        - PublishUnknownCollector
                        - PublishInvalidData
                        - PublishDeletedObject
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    enum:
                        - object
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                realm:
                    type: string
                    enum:
                        - api
                statuscode:
                    type: integer
                    enum:
                        - 400
            example:
                code: PublishUnknownCollector
                error: |-
                    The collector "datacite" unknown and cannot be used. It must be configured in the base config.

                    Package: object
                    Code: PublishUnknownCollector
                package: object
                parameters:
                    collector: datacite
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        SuggestError:
            type: object
            description: |
                Error returned by `/api/v1/suggest` when the request cannot be
                processed.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code:

                          * `ServerGeneric` — a plain server-side error wrapped into the
                            API envelope. `error` carries the underlying message. The
                            suggest endpoint produces this for a malformed request:
                            invalid JSON (in the request body, or in the `BODY` query
                            parameter on the GET form), an objecttype in `objecttypes`
                            or `linked_objecttypes` that does not exist (`Objecttype %q
                            not found`), an unknown `tokens_mode` (`Unknown tokens_mode
                            %q`), or an entry in `fields` that cannot be resolved.
                    enum:
                        - ServerGeneric
                error:
                    type: string
                    description: Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    enum:
                        - ferrors
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                realm:
                    type: string
                    enum:
                        - api
                statuscode:
                    type: integer
                    enum:
                        - 400
            example:
                code: ServerGeneric
                error: |-
                    Server error occurred: Unknown tokens_mode "fuzzy"

                    Package: ferrors
                    Code: ServerGeneric
                package: ferrors
                parameters:
                    msg: Unknown tokens_mode "fuzzy"
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        LocaApi:
            type: object
            description: |
                Datamodel translation document — a flat map of dotted **loca keys**
                to per-language values (`LocaValue`).

                The key set is generated from the datamodel — every objecttype,
                mask, column, link and splitter contributes its own keys.
                Reading clients should treat any key as opaque and look it up
                by exact match. **`POST /l10n/user/HEAD` is a full replace**: any
                generated key omitted from the body is cleared, so always send the
                complete document (typically the body returned by
                `GET /l10n/user/HEAD`). Unknown keys are ignored (not rejected);
                language entries whose tag starts with `_` and empty-string values
                are dropped on write.

                Key patterns currently in use:

                  * `schema.<objecttype>.name` — objecttype label.
                  * `schema.<objecttype>.column.<column>` — column label.
                  * `schema.<objecttype>.column.<other_objecttype>` — link-column label
                    (`nested`).
                  * `schema.<objecttype>.column.reverse:<other_objecttype>.<other_column_api_id>`
                    — reverse-link column label.
                  * `schema.<objecttype>.column.reverse:<objecttype>` — hierarchical
                    reverse-link column label.
                  * `mask.<objecttype_api_id>.<mask>.name` — mask label.
                  * `mask.<objecttype_api_id>.<mask>.<other_objecttype_api_id>.field.<column_api_id>.{edit_user_hint|output_user_hint|search_user_hint}`
                    — user-hint texts for a regular field.
                  * `mask.<objecttype_api_id>.<mask>.<other_objecttype_api_id>.link.<column_api_id>.{edit_user_hint|output_user_hint|search_user_hint}`
                    — user-hint texts for a link field.
                  * `mask.<objecttype_api_id>.<mask>.<other_objecttype_api_id>.linked-table.<column_api_id>.{edit_user_hint|output_user_hint|search_user_hint}`
                    — user-hint texts for a nested link.
                  * `mask.<objecttype_api_id>.<mask>.<other_objecttype_api_id>.reverse-linked-table.<column_api_id>.{edit_user_hint|output_user_hint|search_user_hint}`
                    — user-hint texts for a reverse link.
                  * `mask.<objecttype_api_id>.<mask>.splitter.<index>` — splitter label.
            additionalProperties:
                $ref: '#/components/schemas/LocaValue'
            example:
                schema.category.name:
                    de-DE: Kategorie DE
                    en-US: Kategorie US
                schema.category.column.name:
                    de-DE: Name DE
                    en-US: Name US
                mask.4.category__all_fields.name:
                    de-DE: Kategorien
                mask.4.category__all_fields.4.field.10.edit_user_hint:
                    de-DE: Name Hinweis DE
                    en-US: Name Hinweis US
                    _comment: category.name
                mask.4.category__all_fields.splitter.2:
                    de-DE: Splitter DE
                    en-US: Splitter US
        RightsCatalog:
            type: object
            description: |
                The **rights catalog** — the full inventory of right definitions,
                capabilities and saved presets known to this fylr instance,
                partitioned by context.

                This is the response of `GET /right`. Clients use it to render
                permission UIs (preset editors, ACL bag editors) and to discover
                which rights are available in each context.

                Plugins extend the catalog by contributing additional rights to
                the `system` context (named `plugin.<plugin_name>.<right>`).
            required:
                - system
                - pool
                - object
                - collection
                - tag
                - user
                - group
                - objecttype-without-pool
            properties:
                system:
                    description: System rights (instance-wide permissions, plugin rights).
                    allOf:
                        - $ref: '#/components/schemas/RightsContextInfo'
                pool:
                    description: Rights that apply to objects via pool ACLs.
                    allOf:
                        - $ref: '#/components/schemas/RightsContextInfo'
                object:
                    description: Rights that apply to individual objects.
                    allOf:
                        - $ref: '#/components/schemas/RightsContextInfo'
                collection:
                    description: Rights that apply to collections.
                    allOf:
                        - $ref: '#/components/schemas/RightsContextInfo'
                tag:
                    description: Rights that apply to tags.
                    allOf:
                        - $ref: '#/components/schemas/RightsContextInfo'
                user:
                    description: Rights that apply to users.
                    allOf:
                        - $ref: '#/components/schemas/RightsContextInfo'
                group:
                    description: Rights that apply to groups.
                    allOf:
                        - $ref: '#/components/schemas/RightsContextInfo'
                objecttype-without-pool:
                    description: |
                        Rights that apply to objecttypes that don't participate in pool
                        ACLs (objecttypes whose `acl: false`).
                    allOf:
                        - $ref: '#/components/schemas/RightsContextInfo'
        RightsContextInfo:
            type: object
            description: |
                Per-context entry of the rights catalog — capabilities, the
                right definitions available in this context, and (where the
                context supports them) the saved presets.
            required:
                - capabilities
                - rights
            properties:
                capabilities:
                    $ref: '#/components/schemas/RightsCapabilities'
                rights:
                    type: array
                    description: |
                        The right definitions available in this context. Each entry
                        is either a regular right or a `choice` group whose `rights`
                        array carries the mutually-exclusive options.
                    items:
                        $ref: '#/components/schemas/RightDef'
                presets:
                    type: array
                    description: |
                        Saved presets for this context, in display order. Only
                        populated for contexts that support presets (`object`,
                        `collection`).
                    items:
                        $ref: '#/components/schemas/PresetApi'
        RightsCapabilities:
            type: object
            description: |
                Per-right capability flags for a context — which rights can be
                marked `active`, which are eligible for a preset, which accept a
                tag filter, which are considered structurally valid for the
                context, and which are sticky (cannot be removed once granted).

                Each map is keyed by right name; the value is currently a free-form
                string describing the capability flavour (commonly `"true"` or a
                policy keyword).
            properties:
                active:
                    type: object
                    additionalProperties:
                        type: string
                    description: |
                        Rights that may be enabled (`active: true`) in this context.
                preset:
                    type: object
                    additionalProperties:
                        type: string
                    description: Rights that may appear in a preset for this context.
                tagfilter:
                    type: object
                    additionalProperties:
                        type: string
                    description: Rights that accept a tag filter (`_tagfilter`) in this context.
                valid:
                    type: object
                    additionalProperties:
                        type: string
                    description: |
                        Rights that are structurally valid for this context. A grant
                        for a right not listed here is silently dropped by the ACL
                        pipeline.
                sticky:
                    type: object
                    additionalProperties:
                        type: string
                    description: |
                        Sticky rights — once granted, the ACL cannot have them removed
                        by lower-privileged updates.
        RightDef:
            type: object
            x-recursion: true
            description: |
                A **right definition** — one entry in the rights catalog. A
                definition is either a regular right (`type` empty or `"right"`)
                or a `choice` group whose `rights` array carries the
                mutually-exclusive options the user picks one of.
            properties:
                type:
                    type: string
                    enum:
                        - ""
                        - right
                        - choice
                    description: |
                        `""` and `"right"` mean a regular right. `"choice"` means a
                        group of mutually-exclusive sub-rights — the `rights` array
                        then carries the options.
                name:
                    type: string
                    description: |
                        Stable, machine-readable right name. For choice groups, the
                        name is shared by the picker; for regular rights, it's the
                        identifier used in ACL grants.
                comment:
                    type: string
                    description: Optional human-readable description.
                group:
                    type: string
                    description: |
                        Logical grouping the UI uses to lay the right out next to
                        related rights.
                has_grantable:
                    type: boolean
                    description: |
                        Whether this right may be marked grantable in an ACL grant
                        (the grantee can grant the same right onward).
                parameters:
                    type: array
                    description: |
                        Parameters this right accepts in an ACL grant. Defaults are
                        filled in by the server; choice lists may be dynamic (e.g. the
                        list of EAS classes the instance has configured).
                    items:
                        $ref: '#/components/schemas/RightDefParam'
                rights:
                    type: array
                    description: |
                        Sub-rights of a `choice` group — the mutually-exclusive
                        options the user picks one of. Only set when `type: choice`.
                    items:
                        $ref: '#/components/schemas/RightDef'
        RightDefParam:
            type: object
            description: |
                A parameter that an ACL grant may carry alongside a right —
                typically a per-grant constraint like the list of mask names
                the grant applies to, or a per-preset display setting.
            required:
                - name
                - type
            properties:
                name:
                    type: string
                    description: The parameter's identifier.
                type:
                    type: string
                    description: |
                        The parameter's data type. Common values:

                          * `bool` — boolean.
                          * `string` — single string.
                          * `string-list` — list of strings.
                          * `preview-versions` — list of `<class>.<version>` keys, with
                            `choices` populated from the instance's EAS configuration.
                          * `eas-class-list` — list of EAS class names, with `choices`
                            populated from the instance's EAS configuration.
                          * `mask-list` — list of mask names.
                    example: bool
                comment:
                    type: string
                    description: Optional human-readable description.
                choices:
                    type: array
                    items:
                        type: string
                    description: |
                        The closed list of allowed values (when applicable). For
                        dynamic types (`preview-versions`, `eas-class-list`), the
                        server fills this in from the instance configuration.
                merge_policy:
                    type: string
                    description: |
                        How conflicting values from multiple grants should be combined
                        into one effective value. Currently `less` is supported for
                        `bool` parameters — the effective value is the AND of all
                        grants. Empty string means default merge.
                    example: ""
        FileStatBucketItem:
            type: object
            description: |
                One leaf entry inside a `FileStatBucket.by_extension` /
                `by_class` map — the per-extension or per-class slice of the
                bucket's totals.
            required:
                - size
                - count
            properties:
                size:
                    type: integer
                    format: int64
                    description: Sum of file sizes, in bytes.
                count:
                    type: integer
                    format: int64
                    description: Number of files.
        FileStatBucket:
            type: object
            description: |
                One status bucket of file statistics — the totals for one
                lifecycle state (latest / history / deleted) of one storage
                category (originals / versions). The bucket carries the
                rolled-up `size` / `count` for the slice plus per-extension
                and per-class breakdowns.
            required:
                - size
                - count
            properties:
                size:
                    type: integer
                    format: int64
                    description: Sum of file sizes in this bucket, in bytes.
                count:
                    type: integer
                    format: int64
                    description: Number of files in this bucket.
                by_extension:
                    type: object
                    description: |
                        Per-file-extension breakdown of the bucket. Key is the
                        lowercase extension without leading dot (e.g. `jpg`, `pdf`).
                        Omitted when the bucket is empty.
                    additionalProperties:
                        $ref: '#/components/schemas/FileStatBucketItem'
                by_class:
                    type: object
                    description: |
                        Per-EAS-class breakdown of the bucket. Key is the EAS class
                        name (e.g. `image`, `document`, `audio`) as configured in
                        the base config. Omitted when the bucket is empty.
                    additionalProperties:
                        $ref: '#/components/schemas/FileStatBucketItem'
        FileStatBuckets:
            type: object
            description: |
                The three lifecycle buckets file statistics are sliced into —
                files that are still the current version of their object, files
                superseded by a newer version (history), and files belonging to
                soft-deleted objects.
            required:
                - latest
                - history
                - deleted
            properties:
                latest:
                    description: Files attached to the current version of live objects.
                    allOf:
                        - $ref: '#/components/schemas/FileStatBucket'
                history:
                    description: |
                        Files attached to historic (non-current) versions of live objects.
                    allOf:
                        - $ref: '#/components/schemas/FileStatBucket'
                deleted:
                    description: |
                        Files attached to soft-deleted objects (the object has a
                        non-NULL `deleted_at`).
                    allOf:
                        - $ref: '#/components/schemas/FileStatBucket'
        FileStats:
            type: object
            description: |
                Aggregated file statistics — the file counts and storage usage
                rolled up across all objects in some scope (an objecttype, a pool,
                a sub-tree, ...). The totals are sliced first by storage category
                (uploaded originals vs. derived versions) and then by lifecycle
                (latest / history / deleted).
            required:
                - count
                - size
                - originals
                - versions
            properties:
                count:
                    type: integer
                    format: int64
                    description: Total file count across both originals and versions.
                size:
                    type: integer
                    format: int64
                    description: Total file size across both originals and versions, in bytes.
                originals:
                    description: |
                        Statistics for **original** files — the file the user
                        uploaded.
                    allOf:
                        - $ref: '#/components/schemas/FileStatBuckets'
                versions:
                    description: |
                        Statistics for **derived** versions — previews, thumbnails,
                        converted formats produced from the originals.
                    allOf:
                        - $ref: '#/components/schemas/FileStatBuckets'
        ObjecttypeStats:
            type: object
            description: |
                Asset statistics for one objecttype — the rolled-up file counts
                and storage usage across every object of the type.
            required:
                - files
            properties:
                files:
                    $ref: '#/components/schemas/FileStats'
        PoolStats:
            type: object
            description: |
                Asset statistics for one pool — file counts and storage usage
                for the objects in this pool (and, when the request set
                `include_subpools=true`, the transitive sub-tree).
            required:
                - pool_id
                - created_at
                - files
            properties:
                pool_id:
                    type: integer
                    format: int64
                    description: The pool this stats document is for.
                created_at:
                    type: string
                    format: date-time
                    description: |
                        RFC 3339 timestamp of when these stats were collected (for example
                        `2024-01-01T00:00:00Z`). The pool stats query is expensive, so the
                        result may be served from a cache window.
                files:
                    $ref: '#/components/schemas/FileStats'
        PluginApiGET:
            type: object
            description: |
                Response of `GET /plugin` — the inventory of enabled plugins plus
                the URLs of their concatenated front-end bundles.
            required:
                - plugins
            properties:
                bundle:
                    description: |
                        URLs of the concatenated JS / CSS / HTML / l10n bundles, in
                        load order. Omitted when bundling is disabled in the instance
                        configuration.
                    allOf:
                        - $ref: '#/components/schemas/PluginBundle'
                plugins:
                    type: array
                    description: |
                        One descriptor per enabled plugin, ordered as loaded. Disabled
                        plugins are not included.
                    items:
                        $ref: '#/components/schemas/PluginBase'
            example:
                plugins: []
                bundle:
                    javascript: https://example.fylr.io/api/v1/plugin/bundle.js
                    css: https://example.fylr.io/api/v1/plugin/bundle.css
                    html: https://example.fylr.io/api/v1/plugin/bundle.html
                    l10n: https://example.fylr.io/api/v1/plugin/bundle/l10n
        PluginBundle:
            type: object
            description: |
                URLs of the concatenated plugin front-end bundles. The endpoints
                these point at (`/plugin/bundle.js`, `/plugin/bundle.css`,
                `/plugin/bundle.html`, `/plugin/bundle/l10n/{lang}.json`) merge
                the assets of every enabled plugin in load order.
            properties:
                javascript:
                    type: string
                    format: uri
                    description: URL of the merged JavaScript bundle.
                css:
                    type: string
                    format: uri
                    description: URL of the merged CSS bundle.
                html:
                    type: string
                    format: uri
                    description: URL of the merged HTML template bundle.
                l10n:
                    type: string
                    format: uri
                    description: |
                        Prefix URL of the merged l10n bundle, e.g.
                        `https://<host>/api/v1/plugin/bundle/l10n`. Clients append
                        `/<lang>.json` (for example `/de-DE.json`) to fetch
                        translations for a specific language.
        PluginBase:
            type: object
            description: |
                Descriptor of one plugin as exposed by `GET /plugin` — the
                publicly-visible parts of the plugin's manifest plus the URLs
                the front-end uses to fetch its assets.
            required:
                - name
                - version
                - displayname
            properties:
                name:
                    type: string
                    description: |
                        The plugin's unique identifier. Matches the directory name
                        in the plugins folder and the `name:` from the manifest.
                    example: fylr-plugin-wordpress
                version:
                    type: string
                    description: Plugin version, as declared in the manifest.
                    example: 2.3.4
                l10n:
                    type: string
                    description: |
                        Path (relative to the plugin's static URL) of the plugin's
                        l10n CSV file.
                server:
                    type: object
                    description: Server-side compatibility declarations.
                    properties:
                        api-version:
                            type: object
                            properties:
                                require:
                                    type: integer
                                    format: int64
                                    description: |
                                        The minimum fylr server API version this plugin
                                        supports.
                url:
                    type: string
                    description: |
                        Optional homepage URL for the plugin (linked from the
                        admin UI).
                displayname:
                    description: Localised display name.
                    allOf:
                        - $ref: '#/components/schemas/LocaValue'
                info:
                    description: |
                        Localised long description. Defaults to `"-"` in the
                        instance default language when the manifest does not
                        provide one.
                    allOf:
                        - $ref: '#/components/schemas/LocaValue'
                webfrontend:
                    type: object
                    description: |
                        Free-form metadata the plugin contributes to the front-end
                        (e.g. which routes / panels it registers). Shape is
                        plugin-specific.
                    additionalProperties: true
                custom:
                    type: object
                    description: |
                        Free-form `custom:` section from the manifest — published as-is
                        so the plugin's front-end code can read its own configuration.
                    additionalProperties: true
                base_url:
                    type: string
                    format: uri
                    description: |
                        URL the plugin's static assets are served from (set during
                        the API request).
                plugin_url:
                    type: string
                    format: uri
                    description: |
                        URL of the plugin's own backend mount point (set during the
                        API request).
                build_info:
                    $ref: '#/components/schemas/PluginBuildInfo'
                collection_upload:
                    type: object
                    description: |
                        Map of collection-upload integrations the plugin contributes
                        (key = integration name). Value is the plugin's configuration
                        definition for that integration.
                    additionalProperties:
                        type: object
                        additionalProperties: true
        PluginBuildInfo:
            type: object
            description: |
                Build-time provenance of a plugin — repository, revision,
                release tag, and dates. Populated from the plugin's
                `build_info.json` (or equivalent) and included only when those
                values are non-empty.
            properties:
                repository:
                    type: string
                    description: Repository URL the plugin was built from.
                rev:
                    type: string
                    description: Git revision the build was made from.
                release:
                    type: string
                    description: Release tag of the build, if any.
                lastchanged:
                    type: string
                    description: |
                        Last-changed timestamp of the build source (free-form text;
                        no fixed format).
                builddate:
                    type: string
                    description: |
                        Build timestamp (free-form text; no fixed format).
        SystemStats:
            type: object
            description: |
                System statistics — per-objecttype and per-basetype object counts,
                index-queue depth, file processing queues, and per-index storage
                stats. Returned by `GET /system/status`.

                Build / version / capability information is **not** in this body
                — it travels in the `x-fylr-status` response header, in the form
                `<config>-<instance>-<version> <build_commit>` plus per-component
                flags (use the inspect UI's status page for the rendered view).
            required:
                - objecttypes
                - basetypes
                - indices_objects
                - total_not_indexed
                - pending_files
                - queued_files
                - file_stats
                - indices_stats
            properties:
                objecttypes:
                    type: array
                    description: Per-user-objecttype counts.
                    items:
                        $ref: '#/components/schemas/SystemTypeStats'
                basetypes:
                    type: array
                    description: |
                        Per-basetype counts (`collection`, `event`, `group`,
                        `message`, `pool`, `term`, `user`).
                    items:
                        $ref: '#/components/schemas/SystemTypeStats'
                indices_objects:
                    type: object
                    description: |
                        Per-index object counts, broken down by basetype/objecttype.
                        Outer key is the index name (`BaseRead`, `BaseWrite`,
                        `ObjectRead`, `ObjectWrite`); inner key is the term value
                        (`_basetype` / `_objecttype` / `_masks`).
                    additionalProperties:
                        type: object
                        additionalProperties:
                            type: integer
                            format: int64
                total_not_indexed:
                    type: integer
                    description: |
                        Sum of objects still waiting in the index queue across all
                        types.
                pending_files:
                    type: integer
                    description: |
                        Number of files in the "pending" pipeline state (waiting to
                        be processed by the execserver).
                queued_files:
                    type: integer
                    description: |
                        Number of files queued for processing — superset of
                        `pending_files` that includes retries.
                file_stats:
                    type: array
                    description: Counts of files grouped by processing status.
                    items:
                        $ref: '#/components/schemas/SystemFileStat'
                indices_stats:
                    type: array
                    description: Per-index storage sizes.
                    items:
                        $ref: '#/components/schemas/SystemIndicesStats'
        SystemTypeStats:
            type: object
            description: |
                Aggregated counts for one objecttype or basetype — total stored
                objects, index status counts, and per-file timing / size averages.
            required:
                - type_name
            properties:
                type_name:
                    type: string
                    description: Objecttype or basetype name.
                total_count:
                    type: integer
                    description: Number of stored objects of this type.
                indexed_count:
                    type: integer
                    description: Subset of `total_count` that is currently in the search index.
                not_indexed_count:
                    type: integer
                    description: Subset of `total_count` still waiting in the index queue.
                error_count:
                    type: integer
                    description: Objects of this type whose last indexing attempt errored.
                avg_time:
                    type: number
                    description: Average indexing time per object, in seconds.
                avg_size:
                    type: integer
                    format: int64
                    description: Average serialised size per object, in bytes.
                total_size:
                    type: integer
                    format: int64
                    description: Sum of `avg_size * total_count`, in bytes.
        SystemFileStat:
            type: object
            description: |
                Count of files in one processing status. Used inside
                `SystemStats.file_stats`.
            required:
                - status
                - count
            properties:
                status:
                    type: string
                    description: |
                        File processing status — one of the values fylr's file
                        pipeline assigns (e.g. `pending`, `queued`, `done`, `error`).
                count:
                    type: integer
                    description: Number of files in this status.
        SystemIndicesStats:
            type: object
            description: |
                Storage size of one search index. Used inside
                `SystemStats.indices_stats`.
            required:
                - name
                - index
                - size
            properties:
                name:
                    type: string
                    description: |
                        Logical index role (`BaseRead`, `BaseWrite`, `ObjectRead`,
                        `ObjectWrite`).
                index:
                    type: string
                    description: The physical index name this role currently resolves to.
                size:
                    type: string
                    description: |
                        Storage size of the index, as reported by Elasticsearch
                        (human-readable string such as `42mb`).
        SearchResponse:
            type: object
            description: The result of a search.
            required:
                - count
                - offset
                - limit
                - objects
            properties:
                type:
                    type: string
                    description: The search domain, echoed from the request.
                objecttypes:
                    type: array
                    description: The object types that were searched.
                    items:
                        type: string
                language:
                    type: string
                    description: Primary language of the result.
                count:
                    type: integer
                    format: int64
                    description: Total number of objects matching the search.
                offset:
                    type: integer
                    description: Offset of the returned page within the full result.
                limit:
                    type: integer
                    description: Maximum number of objects in the returned page.
                format:
                    type: string
                    description: Render format of the objects in the response.
                merge_linked_objects:
                    type: string
                    description: The `merge_linked_objects` mode applied, echoed from the request.
                merge_max_depth:
                    type: integer
                    description: The `merge_max_depth` applied, echoed from the request.
                objects:
                    type: array
                    description: |
                        The page of matching objects. The shape of each item depends on the
                        search `type`: rendered objects for an object search, otherwise pools,
                        collections, events, messages or users/groups. Each object search hit
                        carries its relevance in `_score` (number): sort by `_score` to order
                        by relevance, raise it for selected search elements with their `boost`
                        parameter.
                    items: {}
                aggregations:
                    type: object
                    description: The computed aggregations, keyed by the names used in the request.
                    additionalProperties: true
                point_in_time:
                    type: object
                    description: The point-in-time context used or opened for this search.
                    properties:
                        id:
                            type: string
                        keep_alive:
                            type: string
        SearchRequestSort:
            type: object
            description: One sort criterion of a search.
            required:
                - field
            properties:
                field:
                    type: string
                    description: Field to sort by. Use `_score` to sort by relevance.
                order:
                    type: string
                    description: Sort direction. Defaults to `asc`.
                    enum:
                        - asc
                        - desc
                language:
                    type: string
                    description: For localized fields, the language to sort by.
                with_path:
                    type: boolean
                    description: Sort hierarchical fields by their full path.
                mode:
                    type: string
                    description: How to pick a sort value when the field has several values.
                numeric:
                    type: boolean
                    description: Sort the field numerically rather than as text.
                number_groups:
                    type: array
                    description: Number group boundaries used for numeric grouping.
                    items:
                        type: integer
                        format: int64
                width:
                    type: string
                    description: For date fields, the bucket width to sort by.
                    enum:
                        - year
                        - month
                        - week
                        - day
        SearchAggregation:
            type: object
            description: |
                One aggregation computed over the search result. Aggregations are keyed by a
                client-chosen name in the request and the response.
            properties:
                type:
                    type: string
                    description: |
                        Aggregation kind, for example a term aggregation, a date range
                        aggregation or a geo tile grid.
                field:
                    type: string
                    description: Field to aggregate over.
                value_field:
                    type: string
                    description: Field whose value is reported for each bucket.
                objecttype:
                    type: string
                    description: Restrict the aggregation to this object type.
                limit:
                    type: integer
                    description: Maximum number of buckets to return.
                offset:
                    type: integer
                    description: Number of buckets to skip.
                sort:
                    type: string
                    description: Bucket sort criterion.
                order:
                    type: string
                    description: Bucket sort direction.
                format:
                    type: string
                    description: Render format for objects reported in buckets.
                include:
                    type: string
                    description: Regular expression limiting which bucket keys are returned.
                language:
                    type: string
                    description: For localized fields, the language to aggregate.
                filter_parent:
                    type: integer
                    format: int64
                    description: Restrict buckets to children of this parent object.
                precision:
                    type: integer
                    description: Grid precision, for the `geotile_grid` aggregation.
                ranges:
                    type: array
                    description: Explicit ranges, for a date range aggregation.
                    items:
                        type: object
                        properties:
                            from:
                                type: string
                            to:
                                type: string
                bounds:
                    type: object
                    description: Bounding box that limits a geo aggregation.
        SearchRequestField:
            type: object
            description: |
                Selects a field whose values are collected for each hit when the search
                request uses `fields`.
            properties:
                key:
                    type: string
                    description: Name this field appears under in the response.
                field:
                    type: string
                    description: The field to collect.
                with_path:
                    type: boolean
                    description: Collect the full path for hierarchical fields.
                mode:
                    type: string
                    description: How to pick a value when the field has several values.
                language:
                    type: string
                    description: For localized fields, the language to collect.
        SearchParseOptions:
            type: object
            description: Options for parsing a query string at `/search/parse`.
            required:
                - query
            properties:
                query:
                    type: string
                    description: The query string to parse.
                objecttypes:
                    type: array
                    description: Restrict the search to these object types.
                    items:
                        type: string
                search:
                    type: boolean
                    description: |
                        If `true`, run the parsed search and return its result instead of the
                        parsed `SearchRequest`.
                limit:
                    type: integer
                    description: Maximum number of objects to return.
                offset:
                    type: integer
                    description: Number of objects to skip before the first returned object.
                format:
                    type: string
                    description: Render format for the objects in the result.
                timezone:
                    type: string
                    description: Timezone used when interpreting dates in the query string.
        XmlMappingTagCatalog:
            type: object
            description: |
                The metadata **tag catalog** returned by `GET /xmlmapping/tags`
                with the default `exif_list` recipe — the JSON conversion of
                `exiftool -f -listx`, produced by `fylr metadata list`.
            properties:
                tags:
                    type: array
                    items:
                        $ref: '#/components/schemas/XmlMappingTag'
                    description: |
                        One entry per known tag, deduplicated by `<group>:<tag>` path.
                xmlns:
                    type: object
                    additionalProperties:
                        type: string
                    description: |
                        XML namespace URI by tag group, following exiftool's
                        `http://ns.exiftool.ca/<family0>/<family1>/1.0/` convention.
                    example:
                        AAC: http://ns.exiftool.ca/AAC/AAC/1.0/
                exiftool_version:
                    type: string
                    description: The version of the exiftool binary that produced the catalog.
                    example: "13.50"
        SearchRequest:
            type: object
            x-recursion: true
            description: |
                Describes a search to run against **fylr**. The `search` property holds
                the query; the remaining properties control paging, sorting, the response
                format and aggregations.
            properties:
                type:
                    type: string
                    description: |
                        Domain to search. Omit (or use an empty string) to search indexed
                        objects. Each other domain has its own object shape in the response.
                    enum:
                        - pool
                        - collection
                        - event
                        - message
                        - user
                        - group
                        - acl
                objecttypes:
                    type: array
                    description: |
                        Restrict the search to these object types. When empty, all object
                        types are searched.
                    items:
                        type: string
                search:
                    type: array
                    description: |
                        The query: a list of search elements combined into a single boolean
                        query.
                    items:
                        $ref: '#/components/schemas/SearchObject'
                offset:
                    type: integer
                    description: Number of hits to skip before the first returned object.
                limit:
                    type: integer
                    description: Maximum number of objects to return.
                format:
                    type: string
                    description: |
                        Render format for the objects in the response, for example `standard`
                        or `long`.
                merge_linked_objects:
                    type: string
                    description: Controls whether linked objects are embedded into the hits.
                    enum:
                        - none
                        - in_main_search
                        - not_in_main_search
                        - not_in_main_search_unless_reverse
                        - all
                merge_max_depth:
                    type: integer
                    description: |
                        Maximum depth up to which linked objects are embedded when
                        `merge_linked_objects` is used.
                languages:
                    type: array
                    description: Languages to load for localized fields.
                    items:
                        type: string
                sort:
                    type: array
                    description: Sort order of the result. Criteria are applied in order.
                    items:
                        $ref: '#/components/schemas/SearchRequestSort'
                include_deleted:
                    type: boolean
                    description: If `true`, objects in the trash are included in the result.
                aggregations:
                    type: object
                    description: |
                        Aggregations to compute over the result, keyed by a name chosen by the
                        client. The same names appear in the response.
                    additionalProperties:
                        $ref: '#/components/schemas/SearchAggregation'
                fields:
                    type: array
                    description: |
                        Collect the values of specific fields for each hit, instead of (or in
                        addition to) returning whole objects.
                    items:
                        $ref: '#/components/schemas/SearchRequestField'
                field:
                    type: string
                    description: Field name used when this request is a sub search.
                include_fields:
                    type: array
                    description: If set, only these fields are included in the returned objects.
                    items:
                        type: string
                exclude_fields:
                    type: array
                    description: Fields to omit from the returned objects.
                    items:
                        type: string
                point_in_time:
                    type: object
                    description: |
                        Run the search against a point-in-time snapshot of the index, for
                        stable paging across requests. See `DELETE /search/point_in_time`.
                    properties:
                        id:
                            type: string
                            description: ID of the point-in-time context.
                        keep_alive:
                            type: string
                            description: How long the context is kept alive, for example `1m`.
                search_after:
                    type: array
                    description: |
                        Cursor for deep pagination: the `sort` values of the last hit of the
                        previous page. Use instead of a large `offset`.
                    items: {}
                file_url_expire:
                    type: integer
                    description: Number of days the signed file URLs in the response stay valid.
                timezone:
                    type: string
                    description: Timezone used when interpreting and bucketing dates.
                generate_rights:
                    type: boolean
                    description: If `true`, the effective rights are generated for each hit.
                best_mask_filter:
                    type: boolean
                    description: |
                        If `true`, each object is reduced to the best mask the user may see.
        SearchObject:
            type: object
            x-recursion: true
            required:
                - type
            description: |
                One element of a search query. The `type` selects how the element matches;
                which of the other properties apply depends on that `type`.
            properties:
                type:
                    type: string
                    description: |
                        Kind of match:
                          * `text`: full-text match of `string` / `query` against `fields`.
                          * `match`: like `text`, kept for compatibility.
                          * `in`: match a field against a set of values, an object type or a
                            `subsearch`.
                          * `range`: match a field against a `from` / `to` range.
                          * `changelog_range`: match objects by their changelog entries.
                          * `complex`: group nested elements in `search` as a boolean query.
                          * `nested`: like `complex`, but matches within the nested `path`.
                          * `geo_bounding_box`: match a geo field inside a bounding box.
                          * `geo_shape`: match a geo field against a shape.
                    enum:
                        - text
                        - match
                        - in
                        - range
                        - changelog_range
                        - complex
                        - nested
                        - geo_bounding_box
                        - geo_shape
                bool:
                    type: string
                    description: |
                        How this element combines with the other elements of the same `search`
                        list. Defaults to `must`.
                    enum:
                        - must
                        - must_not
                        - should
                boost:
                    type: number
                    description: |
                        Relative weight of this element: a higher boost results in a higher
                        `_score` for objects matching it (useful with `bool: should` and
                        sorting by `_score`). Applies to every `type`, must not be negative,
                        has no effect on `must_not` elements. Defaults to `1`.
                fields:
                    type: array
                    description: Fields this element queries.
                    items:
                        type: string
                string:
                    type: string
                    description: Search term, for `text` / `match`.
                query:
                    type: string
                    description: Alternative to `string` for `text` / `match`.
                phrase:
                    type: boolean
                    description: For `text`, match `string` as a phrase.
                mode:
                    type: string
                    description: Match mode for `text`, for example how tokens are combined.
                languages:
                    type: array
                    description: Restrict matching of localized fields to these languages.
                    items:
                        type: string
                in:
                    type: array
                    description: For `in`, the set of values to match against.
                    items: {}
                objecttype:
                    type: string
                    description: |
                        For `in`: match linked objects of this object type. Use `_pool` to
                        match against pools.
                include_path:
                    type: boolean
                    description: |
                        For `in` with `objecttype`: also match objects located on the path of
                        a hierarchical object type.
                subsearch:
                    $ref: '#/components/schemas/SearchRequest'
                field:
                    type: string
                    description: Single field, for `range` / `changelog_range`.
                from:
                    description: Lower bound, for `range` / `changelog_range`.
                to:
                    description: Upper bound, for `range` / `changelog_range`.
                from_equals:
                    type: boolean
                    description: Whether the `from` bound is inclusive. Defaults to `true`.
                to_equals:
                    type: boolean
                    description: Whether the `to` bound is inclusive. Defaults to `true`.
                path:
                    type: string
                    description: For `nested`, the nested field path the sub query runs in.
                search:
                    type: array
                    description: For `complex` / `nested`, the grouped sub elements.
                    items:
                        $ref: '#/components/schemas/SearchObject'
                operation:
                    type: string
                    description: For `changelog_range`, the changelog operation to match.
                comment:
                    type: string
                    description: For `changelog_range`, the changelog comment to match.
                user:
                    type: integer
                    format: int64
                    description: For `changelog_range`, ID of the user who made the change.
                geo_bounding_box:
                    type: object
                    description: |
                        Bounding box for `type: geo_bounding_box`. Only this property and the
                        companion `field` are used by that type; `field` is REQUIRED and must
                        resolve to a geo field (for example `_standard.geo.1`). The box is
                        forwarded to an OpenSearch `geo_bounding_box` query.

                        Provide the two corners in exactly ONE of two mutually exclusive forms:
                          * point form: `top_left` / `bottom_right` as `{ lat, lon }` objects.
                          * geohash form: `top_left` / `bottom_right` as geohash strings.
                        When decoding, the geohash (string) form is attempted first; if that
                        fails the point (object) form is used. Both corners must use the same
                        form.

                        Requires a license with geo support; otherwise the search is rejected.
                    required:
                        - top_left
                        - bottom_right
                    additionalProperties: false
                    properties:
                        top_left:
                            description: |
                                Top-left corner of the box: either a `{ lat, lon }` point or a
                                geohash string. Must use the same form as `bottom_right`.
                            oneOf:
                                - $ref: '#/components/schemas/GeoPoint'
                                - type: string
                                  description: Geohash string, for example `gcr648nj4c0r`.
                                  example: gcr648nj4c0r
                        bottom_right:
                            description: |
                                Bottom-right corner of the box: either a `{ lat, lon }` point or a
                                geohash string. Must use the same form as `top_left`.
                            oneOf:
                                - $ref: '#/components/schemas/GeoPoint'
                                - type: string
                                  description: Geohash string, for example `tbn4zdz0b8hb`.
                                  example: tbn4zdz0b8hb
                    example:
                        top_left:
                            lat: 71.18507
                            lon: -25.2966
                        bottom_right:
                            lat: 34.7982
                            lon: 41.7102
                geo_shape:
                    type: object
                    description: |
                        Polygon for `type: geo_shape`. Only this property and the companion
                        `field` are used by that type; `field` is REQUIRED and must resolve to
                        a geo field (for example `_standard.geo.1`).

                        The only input is `points`, the polygon vertices. fylr builds the
                        GeoJSON polygon itself and queries OpenSearch with a FIXED spatial
                        relation of `within` (the relation is not configurable, and a raw
                        GeoJSON `{ type, coordinates }` body is NOT accepted here). The ring is
                        closed automatically by repeating the first vertex, so the first and
                        last vertex must not be duplicated in the request.

                        Requires a license with geo support; otherwise the search is rejected.
                    required:
                        - points
                    additionalProperties: false
                    properties:
                        points:
                            type: array
                            minItems: 3
                            description: |
                                Vertices of the polygon, each a `{ lat, lon }` point. At least 3
                                vertices are required (fewer is rejected). Do not repeat the first
                                vertex; the polygon is closed automatically.
                            items:
                                $ref: '#/components/schemas/GeoPoint'
                    example:
                        points:
                            - lat: 43.665014696873186
                              lon: 30.656803322464196
                            - lat: 45.829179968624345
                              lon: 39.444228256278876
                            - lat: 42.90364411679292
                              lon: 54.41512692671907
                            - lat: 32.48178389631096
                              lon: 54.371264285779894
                            - lat: 35.97404030325093
                              lon: 29.49485713607544
        ExportApiList:
            type: object
            description: |
                A page of the authenticated user's **exports**, as returned by
                `GET /api/v1/export`. `count` is the total number of exports
                matching the filter, independent of `limit` / `offset`.
            required:
                - limit
                - offset
                - count
                - objects
            properties:
                limit:
                    type: integer
                    format: int64
                    description: The `limit` that was applied to this page.
                offset:
                    type: integer
                    format: int64
                    description: The `offset` that was applied to this page.
                count:
                    type: integer
                    format: int64
                    description: |
                        Total number of exports matching the filter, ignoring
                        `limit` / `offset`.
                objects:
                    type: array
                    items:
                        $ref: '#/components/schemas/ExportApi'
                    description: The exports on this page, newest first.
        EventBackgroundOrApi:
            description: |
                Response of `POST /event`. For a synchronous write this is the stored
                event (`EventApi`). With `background=true` the body is the acknowledgement
                object `{"background": "ok"}` and the event is saved asynchronously.
            oneOf:
                - $ref: '#/components/schemas/EventApi'
                - type: object
                  required:
                    - background
                  properties:
                    background:
                        type: string
                        enum:
                            - ok
                  example:
                    background: ok
        EventListBackgroundOrApi:
            description: |
                Response of `POST /event/list`. For a synchronous write this is the array
                of stored events (`EventApi`). With `background=true` the body is the
                acknowledgement object `{"background": "ok"}` and the events are saved
                asynchronously.
            oneOf:
                - type: array
                  items:
                    $ref: '#/components/schemas/EventApi'
                - type: object
                  required:
                    - background
                  properties:
                    background:
                        type: string
                        enum:
                            - ok
                  example:
                    background: ok
        ConfigParamBase:
            type: object
            required:
                - type
            properties:
                position:
                    type: number
                    format: int32
                    minimum: 0
                    description: |
                        Position of the parameter in the output.
                type:
                    type: string
                    description: type of the parameter
                name:
                    type: string
                    description: name of the parameter as used in the API
        ConfigParam:
            x-recursion: true
            discriminator:
                propertyName: type
                mapping:
                    bool: '#/components/schemas/ConfigParamBool'
                    email: '#/components/schemas/ConfigParamEmail'
                    file: '#/components/schemas/ConfigParamFile'
                    form: '#/components/schemas/ConfigParamForm'
                    int: '#/components/schemas/ConfigParamInt'
                    int-list: '#/components/schemas/ConfigParamIntList'
                    json: '#/components/schemas/ConfigParamJson'
                    license: '#/components/schemas/ConfigParamLicense'
                    location-select: '#/components/schemas/ConfigParamLocationSelect'
                    secret: '#/components/schemas/ConfigParamSecret'
                    select: '#/components/schemas/ConfigParamSelect'
                    string-list: '#/components/schemas/ConfigParamStringList'
                    string-list-sort: '#/components/schemas/ConfigParamStringListSort'
                    table: '#/components/schemas/ConfigParamTable'
                    tag-select: '#/components/schemas/ConfigParamTagSelect'
                    tagfilter-select: '#/components/schemas/ConfigParamTagfilterSelect'
                    text-l10n-multiline: '#/components/schemas/ConfigParamTextLocaMultiline'
                    text-l10n: '#/components/schemas/ConfigParamTextLoca'
                    text-multiline: '#/components/schemas/ConfigParamTextMultiline'
                    text: '#/components/schemas/ConfigParamText'
            oneOf:
                - $ref: '#/components/schemas/ConfigParamBool'
                - $ref: '#/components/schemas/ConfigParamEmail'
                - $ref: '#/components/schemas/ConfigParamFile'
                - $ref: '#/components/schemas/ConfigParamForm'
                - $ref: '#/components/schemas/ConfigParamInt'
                - $ref: '#/components/schemas/ConfigParamIntList'
                - $ref: '#/components/schemas/ConfigParamJson'
                - $ref: '#/components/schemas/ConfigParamLicense'
                - $ref: '#/components/schemas/ConfigParamLocationSelect'
                - $ref: '#/components/schemas/ConfigParamSecret'
                - $ref: '#/components/schemas/ConfigParamSelect'
                - $ref: '#/components/schemas/ConfigParamStringList'
                - $ref: '#/components/schemas/ConfigParamStringListSort'
                - $ref: '#/components/schemas/ConfigParamTable'
                - $ref: '#/components/schemas/ConfigParamTagSelect'
                - $ref: '#/components/schemas/ConfigParamTagfilterSelect'
                - $ref: '#/components/schemas/ConfigParamTextLoca'
                - $ref: '#/components/schemas/ConfigParamTextMultiline'
                - $ref: '#/components/schemas/ConfigParamText'
        ConfigParamBool:
