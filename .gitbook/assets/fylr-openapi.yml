                                                                description: |
                                                                    List of extensions this permission if given for. An empty list matches all.
                                                                items:
                                                                    type: string
                                                            versions:
                                                                type: array
                                                                description: |
                                                                    List of version names (renditions) this permission if given for. An empty list matches all.
                                                                items:
                                                                    type: string
                                                            limit:
                                                                type: string
                                                                description: |
                                                                    Byte size as string. For formats refer to (go-datasize](https://github.com/programmfabrik/go-datasize).
                                                            mask_ids:
                                                                type: object
                                                                additionalProperties:
                                                                    description: |
                                                                        The key is the object type ID.
                                                                    type: array
                                                                    items:
                                                                        oneOf:
                                                                            - type: string
                                                                              description: |
                                                                                Set to `standard` for the standard mask.
                                                                              enum:
                                                                                - standard
                                                                            - type: integer
                                                                              description: |
                                                                                The mask id given the permission for.
                                                                              minimum: 1
                                                            column_ids:
                                                                description: |
                                                                    List of column api ids to apply this permission to.
                                                                type: array
