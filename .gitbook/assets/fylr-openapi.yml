                tasks:
                    - title: Update renditions
                      message: 2 files need to update renditions. This may be done manually in /inspect/files.
                      form:
                        - label: ""
                          type: options
                          name: confirm
                          horizontal: false
                          options:
                            - text: Update now (recommended)
                              value: resync
                              disabled: false
                            - text: Skip
                              value: skip
                              disabled: false
                      buttons:
                        - text: Save
