                                                    reference:
                                                        type: string
                                                        description: |
                                                            The reference of the collection to lookup.
                                    _basetype:
                                        type: string
                                        enum:
                                            - collection
                                    _count:
                                        type: number
                                        format: int64
                                        readOnly: true
                                        description: |
                                            The number of objects in this collection.
                                    _count_recursive:
                                        type: number
                                        format: int64
                                        readOnly: true
                                        description: |
