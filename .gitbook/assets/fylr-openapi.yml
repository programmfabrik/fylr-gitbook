        Error:
            type: object
            description: |
                Standard error envelope. Every **fylr** API error is returned as a JSON object
                in this shape, together with the matching HTTP status code.
            required:
                - code
                - error
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code, for example `UnknownObjecttype` or
                        `VersionMismatch`. Use this to branch on errors in client code instead of
                        parsing the `error` message.
                error:
                    type: string
                    description: |
                        Human-readable error message. Intended for developers and log output, not
                        for display to end users.
                package:
                    type: string
                    description: |
                        Internal origin marker for the error, for **fylr** support and logs. It is
                        not part of the API contract and carries no meaning for clients — branch on
                        `code`, never on `package`.
                parameters:
                    type: object
                    additionalProperties: true
                    description: |
                        Additional, error-specific details. Which keys are present depends on the
                        `code`. An empty object when the error carries no extra information.
                realm:
                    type: string
                    description: |
                        Realm the error originates from. For API errors this is `api`.
                description:
                    type: string
                    description: |
                        Optional longer explanation of the error.
                statuscode:
                    type: integer
                    description: |
                        The HTTP status code, repeated here for convenience.
        UnauthorizedError:
            type: object
            description: |
                Error returned when the request has no authenticated user.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code. One of:

                          * `UserRequired` — the request did not carry a valid access token.
                    enum:
                        - UserRequired
                error:
                    type: string
                    description: |
                        Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    enum:
                        - ferrors
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                    description: Machine-readable details of the error.
                realm:
                    type: string
                    enum:
                        - api
                    description: The realm the error originates from. Always `api`.
                statuscode:
                    type: integer
                    enum:
                        - 401
                    description: The HTTP status code, repeated here. Always `401`.
            example:
                code: UserRequired
                error: |-
                    The API call requires an authenticated user

                    Package: ferrors
                    Code: UserRequired
                package: ferrors
                parameters:
                    realm: api
                    statuscode: 401
                realm: api
                statuscode: 401
        ForbiddenError:
            type: object
            description: |
                Error returned when the authenticated user lacks a required system right.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code. One of:

                          * `SystemRightRequired` — the user holds none of the system rights the
                            operation requires.
                    enum:
                        - SystemRightRequired
                error:
                    type: string
                    description: |
                        Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    enum:
                        - acl
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                    description: |
                        Machine-readable details. For `SystemRightRequired`, `rights` lists the
                        system rights that would have satisfied the check.
                realm:
                    type: string
                    enum:
                        - api
                    description: The realm the error originates from. Always `api`.
                statuscode:
                    type: integer
                    enum:
                        - 403
                    description: The HTTP status code, repeated here. Always `403`.
            example:
                code: SystemRightRequired
                error: |-
                    One of the system rights ["system.api.event[get], system.root"] is required.

                    Package: acl
                    Code: SystemRightRequired
                package: acl
                parameters:
                    rights: system.api.event[get], system.root
                    realm: api
                    statuscode: 403
                realm: api
                statuscode: 403
        SearchError:
            type: object
            description: |
                Error returned by `/search` when the search cannot be processed. Several
                distinct validations map to this `400`; the `code` field identifies which
                one rejected the request.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code. One of:

                          * `SearchFieldUnknown` — a `search` element references a field that
                            does not exist.
                          * `SearchFieldNotAllowed` — a `search` element uses a field that is
                            not allowed in the current search context.
                          * `NestedQueryIn` — an `in` query targets an entire nested object,
                            which is not supported.
                          * `WildcardOnlyNotAllowed` — a `text` search on this field consists
                            only of wildcards, which is not allowed.
                          * `WildcardExpandedToTooManyTerms` — a wildcard expanded to more
                            terms than the configured limit; narrow the term.
                          * `UnknownTimezone` — the request's `timezone` is not a known
                            timezone identifier.
                          * `DateWrongSyntax` — a date value in the query has the wrong
                            syntax.
                          * `UnsupportedInAggregation` — an aggregation uses an unsupported
                            combination of options.
                          * `ReindexInProgress` — a reindex is already running and the request
                            conflicts with it.
                          * `IndexErrorWaitForReindex` — language settings have changed; wait
                            for the re-index to complete.
                    enum:
                        - SearchFieldUnknown
                        - SearchFieldNotAllowed
                        - NestedQueryIn
                        - WildcardOnlyNotAllowed
                        - WildcardExpandedToTooManyTerms
                        - UnknownTimezone
                        - DateWrongSyntax
                        - UnsupportedInAggregation
                        - ReindexInProgress
                        - IndexErrorWaitForReindex
                error:
                    type: string
                    description: |
                        Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                    description: Machine-readable, code-specific details of the failure.
                realm:
                    type: string
                    enum:
                        - api
                    description: The realm the error originates from. Always `api`.
                statuscode:
                    type: integer
                    enum:
                        - 400
                    description: The HTTP status code, repeated here. Always `400`.
            example:
                code: SearchFieldUnknown
                error: |-
                    The search field "nonexistent_field" is unknown

                    Package: search
                    Code: SearchFieldUnknown
                package: search
                parameters:
                    context: text
                    field: nonexistent_field
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        SearchParseError:
            type: object
            description: |
                Error returned by `/search/parse` when the request cannot be processed.
                Several distinct failures map to this `400`; the `code` field identifies
                which one occurred.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code. `QueryParse` is raised by the
                        parser when the query string is not syntactically valid. Every other
                        code is raised while the parsed query is compiled — the same pipeline
                        as `/search`, so the same codes can surface here:

                          * `QueryParse` — the query string is not syntactically valid.
                          * `SearchFieldUnknown` — the query refers to a field that does not
                            exist.
                          * `SearchFieldNotAllowed` — the query uses a field that is not
                            allowed in the current search context.
                          * `NestedQueryIn` — an `in` query targets an entire nested object,
                            which is not supported.
                          * `WildcardOnlyNotAllowed` — a text search on this field consists
                            only of wildcards, which is not allowed.
                          * `WildcardExpandedToTooManyTerms` — a wildcard expanded to more
                            terms than the configured limit; narrow the term.
                          * `UnknownTimezone` — the request's `timezone` is not a known
                            timezone identifier.
                          * `DateWrongSyntax` — a date value in the query has the wrong
                            syntax.
                          * `UnsupportedInAggregation` — an aggregation uses an unsupported
                            combination of options.
                          * `ReindexInProgress` — a reindex is already running and the request
                            conflicts with it.
                          * `IndexErrorWaitForReindex` — language settings have changed; wait
                            for the re-index to complete.
                    enum:
                        - QueryParse
                        - SearchFieldUnknown
                        - SearchFieldNotAllowed
                        - NestedQueryIn
                        - WildcardOnlyNotAllowed
                        - WildcardExpandedToTooManyTerms
                        - UnknownTimezone
                        - DateWrongSyntax
                        - UnsupportedInAggregation
                        - ReindexInProgress
                        - IndexErrorWaitForReindex
                error:
                    type: string
                    description: |
                        Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                    description: Machine-readable, code-specific details of the failure.
                realm:
                    type: string
                    enum:
                        - api
                    description: The realm the error originates from. Always `api`.
                statuscode:
                    type: integer
                    enum:
                        - 400
                    description: The HTTP status code, repeated here. Always `400`.
            example:
                code: QueryParse
                error: |-
                    title ==: 1:9: error: expected one of "?", null, string, int, uint, or "["; got: end-of-file

                    Package: query
                    Code: QueryParse
                package: query
                parameters:
                    query: title ==
                    msg: '1:9: error: expected one of "?", null, string, int, uint, or "["; got: end-of-file'
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        DbObject:
            type: object
            description: |
                A **fylr** object as exchanged with the `/db/{objecttype}` endpoint. Every
                object carries the system fields below. The content fields live in a nested
                object whose key is the object type name; which fields are present depends on
                the object type and the `_mask`. The object-type-specific sections of this
                documentation describe those fields concretely.
            required:
                - _objecttype
                - _mask
            properties:
                _objecttype:
                    type: string
                    description: Name of the object type. Matches `{objecttype}` in the URL.
                _mask:
                    type: string
                    description: |
                        Name of the mask that shapes the object. The mask selects which fields
                        are present and whether each is writable or read-only.
                _system_object_id:
                    type: integer
                    description: |
                        Instance-wide unique ID of the object. Settable while the object is
                        version 1 (new), immutable afterwards.
                _global_object_id:
                    type: string
                    format: <_system_object_id>@<database uuid>
                    description: |
                        Globally unique object ID: the `_system_object_id` followed by
                        `@<database name>`.
                _uuid:
                    type: string
                    description: System-wide unique identifier for the object.
                _owner:
                    description: The owner of the object; may be a user or a group.
                    allOf:
                        - $ref: '#/components/schemas/WhoApi'
                _created:
                    type: string
                    format: date_iso8601
                    description: The datetime the object was created.
                '{objecttype}':
                    type: object
                    description: |
                        Content of the object, in a property named after the object type. Holds
                        `_id`, `_version` and the fields defined by the object type and selected
                        by the `_mask`.
                    properties:
                        _id:
                            type: integer
                            description: |
                                ID of the object, unique within the object type. Settable while the
                                object is version 1 (new), immutable afterwards.
                        _version:
                            type: integer
                            description: |
                                Version of the object. Starts at 1 and is incremented on every
                                update; an update must send the current version.
                    additionalProperties: true
            additionalProperties: true
        DbPostError:
            type: object
            description: |
                Error returned by `POST /db/{objecttype}` when the save cannot be processed.
                The `code` field of the response identifies which validation rejected the
                request — listed below are the most common stable codes; other validation
                errors from the save pipeline may also surface here.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code. Common codes for this endpoint:

                          * `UnknownObjecttype` — the object type in the URL is not defined in
                            the datamodel.
                          * `ReadOnlyMode` — the instance is in read-only mode and rejects
                            writes.
                          * `LookupFoundTooMany` — a lookup in the payload matched more than
                            one object; lookups must resolve to exactly one.
                          * `LookupNotFound` — a lookup in the payload matched no object.
                          * `DatabaseUniqueKeyViolation` — a uniqueness constraint was
                            violated (for example, a duplicate reference value).
                          * `SchemaInconsistent` — the payload does not match the object
                            type's schema (unexpected field, wrong type, …).

                        Other validation errors from the save pipeline may also surface here.
                    enum:
                        - UnknownObjecttype
                        - ReadOnlyMode
                        - LookupFoundTooMany
                        - LookupNotFound
                        - DatabaseUniqueKeyViolation
                        - SchemaInconsistent
                error:
                    type: string
                    description: |
                        Human-readable message, ending with a `Package` / `Code` footer.
                package:
                    type: string
                    description: |
                        Internal origin marker for **fylr** support; not part of the API
                        contract. Branch on `code`, not `package`.
                parameters:
                    type: object
                    additionalProperties: true
                    description: Machine-readable, code-specific details of the failure.
                realm:
                    type: string
                    enum:
                        - api
                    description: The realm the error originates from. Always `api`.
                statuscode:
                    type: integer
                    enum:
                        - 400
                    description: The HTTP status code, repeated here. Always `400`.
            example:
                code: UnknownObjecttype
                error: |-
                    Unknown Objecttype pictures

                    Package: api
                    Code: UnknownObjecttype
                package: api
                parameters:
                    objecttype: pictures
                    realm: api
                    statuscode: 400
                realm: api
                statuscode: 400
        DbDeleteError:
            type: object
            description: |
                Error returned by `DELETE /db/{objecttype}` when the delete cannot be
                processed. The `code` field identifies which validation rejected the
                request — listed below are the most common stable codes; other
                delete-validation errors may also surface here.
            required:
                - code
                - error
                - package
                - parameters
                - realm
                - statuscode
            properties:
                code:
                    type: string
                    description: |
                        Stable, machine-readable error code. Common codes for this endpoint:

