                  in: query
                  schema:
                    type: string
                    format: json
                  description: Array of custom produce config definitions as used in `POST /api/v1/eas/{fileId}`.
                - name: priority
                  in: query
                  schema:
                    type: number
                    format: int64
                    default: 0
                  description: When adding the renditions job to the file worker queue a priority is used. Set `2` for interactive, `4` for highest and `0` for normal.
                - name: collection
                  in: query
                  schema:
                    type: number
                    format: int64
                  description: |
                    Collection is the id of a collection the uploaded files should be linked into.
                    This works like the hotfolder upload into a collection. The collection needs
                    to be configured as upload collection. The `_linked_objects` property will be
                    set in the response with informations about the created or updated objects the
                    files have been linked to.
                - name: check_for_duplicates
                  in: query
                  description: |
