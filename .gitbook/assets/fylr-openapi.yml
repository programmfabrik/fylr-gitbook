                    The object #4711 [picture] needs right "Write" (write)

                    Package: ferrors
                    Code: ObjectInsufficientRights
                package: ferrors
                parameters:
                    objecttype: picture
                    systemobjectid: 4711
                    right: write
                    rightdisplayname: Write
                    realm: api
                    statuscode: 403
                realm: api
                statuscode: 403
