                        identifies the specific validation failure.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TaskError'
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "403":
                    description: |
                        The authenticated user lacks the `system.task` system right (and is
                        not `system.root`). Raised with code `SystemRightRequired`
                        (`parameters.rights` lists the rights that would have satisfied the
                        check).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
    /task/{taskId}/log:
        x-path: /task
        description: |
            Access the log of a specific task.
        get:
            parameters:
                - name: taskId
                  in: path
                  description: The ID of the task.
                  required: true
                  schema:
                    type: number
                    format: int64
                - name: offset
                  in: query
                  description: Request the given `offset` of the log.
                  schema:
                    type: number
                    format: int64
                - name: limit
                  in: query
                  description: Request using the given `limit`. Default is 100.
                  schema:
                    type: number
                    format: int64
            responses:
                "200":
                    description: |
                        Task runners can write log entries. This endpoint can be used to retrieve them.
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        idx:
                                            type: number
                                            format: int
                                            description: |
                                                Index of the log entry, starts at `0`.
                                        timestamp:
                                            type: string
                                            format: datetime
                                            description: |
                                                UTC time of the entry.
                                        level:
                                            type: string
                                            enum:
                                                - debug
                                                - info
                                                - warning
                                                - error
                                            description: |
                                                Severity of the log entry.
                                        msg:
                                            type: string
                                            description: |
                                                Message of the log entry.
                                        status_percent:
                                            type: number
                                            format: int64
                                            description: |
                                                The current status in percent, can be `null`. If set (per task module), the task runner updates the `status_percent` of the task to the latest data.
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/UnauthorizedError'
                "403":
                    description: |
                        The authenticated user is neither the task's creator nor a
                        `system.root` user. Tasks are user-specific; only the user who
                        created a task (or a `system.root` user) can access it. A user
                        without the `system.task` system right also receives a `403`.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/TaskForbiddenError'
                "404":
                    description: |
                        No task with this id exists. The id was not loadable. Raised with
                        code `ObjectNotFound` (`parameters.object` carries a `task <id>`
                        token, e.g. `task 7`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/NotFoundError'
