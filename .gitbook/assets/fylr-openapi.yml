                                                    type: object
                                                    properties:
                                                        de-DE:
                                                            type: string
                                                        en-US:
                                                            type: string
                                                    example:
                                                        de-DE: Deutscher text
                                                        en-US: English text
                                                create_object:
                                                    nullable: true
                                                    description: |
