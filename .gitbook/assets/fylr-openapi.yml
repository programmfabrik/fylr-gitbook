    /task:
        x-path: /task
        description: |
            Use this endpoint to store & retrieve tasks. A task is a configuration to
            run a task module with pre-configured parameters. The tasks are executed in
            the background. Tasks can be scheduled to run periodically.

            Tasks are user specific. Like exports, tasks are run under as the user who created the task. When listing tasks, only the creating user can see his tasks.

            Every task operation requires the system right `system.task` (a
            `system.root` user is also accepted). An unauthenticated request returns
            `401` with code `UserRequired`; an authenticated user lacking `system.task`
            (and not `system.root`) returns `403` with code `SystemRightRequired`.
            The id-addressed operations `GET /task/{taskId}/log`,
            `POST /task/{taskId}/cancel` and `DELETE /task/{taskId}` load the task by
            id and then reject a caller who is neither the task's owner nor a
            `system.root` user with `403` code `InsufficientRights`. The list and
            `GET /task/{taskId}` instead filter by the session user, so another
            user's tasks are simply not returned (an unknown id yields `404`).
        get:
            parameters:
                - name: offset
                  in: query
                  description: Request the given `offset` of the log.
                  schema:
                    type: number
                    format: int64
                - name: limit
                  in: query
                  description: Request using the given `limit`. Default is 100.
                  schema:
                    type: number
                    format: int64
            responses:
                "200":
                    description: Retrieve a list of tasks
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    limit:
                                        type: number
                                        format: int64
                                        description: |
                                            The limit of the request.
                                    offset:
                                        type: number
                                        format: int64
                                        description: |
                                            The offset of the request.
                                    count:
                                        type: number
                                        format: int64
                                        description: |
                                            The total count of the tasks of the session user.
                                    objects:
                                        type: array
                                        items:
                                            type: object
                                            properties:
                                                _basetype:
                                                    type: string
                                                    enum:
                                                        - task
                                                created_at:
                                                    type: string
                                                    format: datetime
                                                    description: |
                                                        UTC time of when the task was created.
                                                updated_at:
                                                    type: string
                                                    format: datetime
                                                    description: |
                                                        UTC time of when the task was updated.
                                                task:
                                                    type: object
                                                    properties:
                                                        _id:
                                                            type: number
                                                            format: int64
                                                            description: |
                                                                ID of the task. This is issued by the server.
                                                        _version:
                                                            type: number
                                                            format: int64
                                                            description: |
                                                                Version of the task. The version must be incremented when saving a new
                                                                version of the task. While the task is running, the server may perform
                                                                updates on the task object without incrementing the version.
                                                        task_module:
                                                            type: string
                                                            description: |
                                                                Name of the task module to run the task. Retrieve a list with `/api/v1/task/modules`.
                                                        task_params:
                                                            type: object
                                                            additionalProperties: true
                                                            description: |
                                                                The task properties. The schema for this is defined by the task module.
                                                        task_timeout_sec:
                                                            type: number
                                                            format: int
                                                            description: |
                                                                When the task is run, this timeout is set. In case of a timeout the task will be in state `error`. Use `0` for no timeout.
                                                        description:
                                                            type: string
                                                            description: |
                                                                A user provided description of the task.
                                                        next_run_at:
                                                            type: string
                                                            format: datetime
                                                            description: |
                                                                The UTC time when the task will be started. It is possible that the task is run later that the given time (if other tasks are currently running), but not before. Set this to `null` to not execute this task. If a task is scheduled, the scheduler will update this property after the task has run.
                                                        frontend_prefs:
                                                            type: object
                                                            additionalProperties: true
                                                            description: |
                                                                Provided by API using Apps. The top level key of the map should reflect the name of your App. Apps are required to store unknown keys (and data) along with their own contribution.
                                                        email:
                                                            type: object
                                                            properties:
                                                                recipients:
                                                                    type: array
                                                                    items:
                                                                        type: object
                                                                        properties:
                                                                            email:
                                                                                type: string
                                                                                format: email
                                                                                description: |
                                                                                    The email address of the recipient. Mails are send using the `To:` email header.
                                                                            problems_only:
                                                                                type: boolean
                                                                                description: |
                                                                                    If set, emails are only sent if the task finished with a state other than `done`.
                                                        schedules:
                                                            type: array
                                                            items:
                                                                type: object
                                                                description: |
                                                                    A schedule sets criterias to repeatedly start task or jobs. All defined criterias need to be met in order for a schedule to run.
                                                                properties:
                                                                    days_of_month:
                                                                        type: array
                                                                        items:
                                                                            type: number
                                                                            format: int
                                                                            description: |
                                                                                The day of the month when this schedule should run.
                                                                    weekdays:
                                                                        type: array
                                                                        items:
                                                                            type: string
                                                                            enum:
                                                                                - sunday
                                                                                - monday
                                                                                - tuesday
                                                                                - wednesday
                                                                                - thursday
                                                                                - friday
                                                                                - saturday
                                                                        description: |
                                                                            The weekday when this schedule should run.
                                                                    hours:
                                                                        type: array
                                                                        items:
                                                                            type: number
                                                                            format: int
                                                                            description: |
                                                                                The hour when this schedule should run. Range `0`-`23`.
                                                                    minutes:
                                                                        type: array
                                                                        items:
                                                                            type: number
                                                                            format: int
                                                                            description: |
                                                                                The minute when this schedule should run. Range `0`-`59`.
                                                                    timezone:
                                                                        type: string
                                                                        description: |
                                                                            The timezone this schedule should be run in. Valid names are in [IANA format](https://www.iana.org/time-zones).
                                                        state:
                                                            type: object
                                                            readOnly: true
                                                            additionalProperties: true
                                                            description: |
                                                                Stores the state of a task. This can be used by the task module to continue interrupted work or otherwise. The data is provided over the API, so frontends may use it.
                                                        status:
                                                            type: string
                                                            readOnly: true
                                                            enum:
                                                                - new
                                                                - running
                                                                - done
                                                                - canceled
                                                                - error
                                                            description: |
                                                                `status` is set by the **fylr** task runner.
                                                        status_percent:
                                                            type: number
                                                            readOnly: true
                                                            format: int
                                                            minimum: 0
                                                            maximum: 100
                                                            description: |
                                                                If supported by the task runner, a number from `0` to `100` (percent) indicating the progress of a task in state `running`. This can be `null` if the task module has not started updating this yet, or it is not supported by the task module. Frontends should only show and use this if it is not `null`.
                                                            nullable: true
                                                        status_msg:
                                                            type: string
                                                            readOnly: true
                                                            description: |
                                                                If the status is `error` or `canceled`, the status message gives more information.
                                                        run_started_at:
                                                            type: string
                                                            format: datetime
                                                            readOnly: true
                                                            description: |
                                                                UTC time when the last run of the task was started. It is set to `null` when the task re-starts.
                                                        run_canceled_at:
                                                            type: string
                                                            format: datetime
                                                            readOnly: true
                                                            description: |
                                                                UTC time when the last run of the task was canceled. It is set to `null` when the task re-starts.
                                                        run_finished_at:
                                                            type: string
                                                            format: datetime
                                                            readOnly: true
                                                            description: |
                                                                UTC time when the last run of the task has finished. It is set to `null` when the task re-starts.
                                                _user:
                                                    type: object
                                                    readOnly: true
                                                    description: |
                                                        The user that created the task. The task is run as this user. This is a
                                                        flat user object; only the creating user (or a `system.root` user) can
                                                        retrieve the task.
                                                    properties:
                                                        _id:
                                                            type: number
                                                            format: int64
                                                            description: |
                                                                The id of the user. It is automatically assigned.
                                                        _version:
                                                            type: number
                                                            format: int64
                                                            description: |
                                                                The version of the user record.
                                                        _generated_displayname:
                                                            type: string
                                                            description: |
                                                                The generated displayname of the user. This uses `login` and `email`.
                                            example:
                                                task:
                                                    _id: 1
                                                    _version: 2
                                                    task_module: sleep
                                                    description: henk is super
                                                    task_params:
                                                        runtime: 5
                                                    task_timeout_sec: 100
                                                    next_run_at: "2026-05-30T12:00:10Z"
                                                    status: new
                                                _user:
                                                    _generated_displayname: root
                "401":
                    description: |
                        No authenticated user. The request must carry a valid access token.
                    content:
                        application/json:
                            schema:
