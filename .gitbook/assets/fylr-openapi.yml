                        `objecttype`, `systemobjectid`, `right` and `rightdisplayname`;
                        `SystemRightRequired` carries `rights`.
                realm:
                    type: string
                    enum:
                        - api
                    description: The realm the error originates from. Always `api`.
                statuscode:
                    type: integer
                    enum:
                        - 403
                    description: The HTTP status code, repeated here. Always `403`.
            example:
                code: ObjectInsufficientRights
