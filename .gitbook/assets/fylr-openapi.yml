                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PluginError'
        post:
            summary: Update an installed plugin.
            description: |
                Updates the plugin identified by `{id}`. The body `id` must match
                the path `{id}`. Use this to enable/disable a plugin or refresh it
                from its source. Fails with `code: ReadOnlyMode` when the instance
                is read-only.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/PluginManageApi'
            responses:
                "200":
                    description: The updated plugin.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PluginManageApi'
                "400":
                    description: |
                        The body `id` does not match the path `{id}`, the instance is
                        read-only (`code: ReadOnlyMode`), or the payload could not be
                        parsed.
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/PluginError'
                "403":
                    description: |
                        The user holds neither `system.root` nor `system.plugin`
                        (`code: SystemRightRequired`).
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ForbiddenError'
                "404":
                    description: |
